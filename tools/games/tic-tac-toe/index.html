<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A big, tap-to-play tic-tac-toe board for the classroom smart board — each tap drops the next X or O automatically.">
<meta name="theme-color" content="#1f3d35">
<title>Tic-Tac-Toe</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23e0982e'/%3E%3C/svg%3E">
<style>
  :root{
    --app-bg:#e9edf0; --panel:#fff; --panel-2:#f4f6f8; --room-bg:#f7f8f6;
    --ink:#16241f; --muted:#67756f; --line:#d8dee2; --grid-line:rgba(31,61,53,.07);
    --board:#1f3d35; --board-2:#173029; --board-line:#2c5247;
    --accent:#e0982e; --accent-soft:#fbe6c8; --accent-deep:#b9781f;
    --danger:#c43d35; --danger-soft:#f7e0de; --together:#2f6f9f; --together-soft:#dde9f3;
    --ok:#3f9e6b;
    --shadow:0 1px 2px rgba(20,40,33,.06),0 6px 18px rgba(20,40,33,.06);
    --shadow-sm:0 1px 2px rgba(20,40,33,.10); --radius:12px;
    --sans:ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    /* player colors */
    --x:#2f6f9f;   /* blue X */
    --o:#c43d35;   /* red O */
  }
  *{box-sizing:border-box;} html,body{height:100%;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--app-bg);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;
    overflow:hidden;}
  button{font-family:inherit;}
  :focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:6px;}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ── toolbar ── */
  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:11px 20px;
    background:var(--panel);border-bottom:1px solid var(--line);flex:none;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:13px;color:var(--ink);white-space:nowrap;}
  .brand .mark{width:16px;height:16px;border-radius:4px;background:var(--accent);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);flex:none;}
  .brand small{font-weight:500;letter-spacing:.02em;text-transform:none;color:var(--muted);font-size:11px;}
  .spacer{flex:1;}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:11px 18px;
    border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;display:inline-flex;
    align-items:center;gap:8px;transition:background .12s,border-color .12s,transform .05s;}
  .btn:hover{background:var(--panel-2);} .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--board);border-color:var(--board);color:#fff;}
  .btn.primary:hover{background:var(--board-2);}
  .btn .ic{font-size:18px;line-height:1;}

  /* ── scoreboard ── */
  .scorebar{display:flex;align-items:stretch;justify-content:center;gap:14px;flex:none;
    padding:14px 20px;background:var(--room-bg);border-bottom:1px solid var(--line);}
  .score{display:flex;align-items:center;gap:14px;background:var(--panel);border:2px solid var(--line);
    border-radius:14px;padding:10px 22px;min-width:240px;transition:border-color .15s,box-shadow .15s;}
  .score.turn{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .score .glyph{font-size:42px;font-weight:800;line-height:1;font-family:var(--mono);}
  .score.x .glyph{color:var(--x);}
  .score.o .glyph{color:var(--o);}
  .score .meta{display:flex;flex-direction:column;gap:2px;}
  .score .name{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  .score .wins{font-family:var(--mono);font-size:34px;font-weight:700;line-height:1;color:var(--ink);}
  .vs{display:flex;align-items:center;font-size:13px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);}

  /* ── stage / board ── */
  .stage{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:20px;gap:16px;position:relative;}
  .status{font-size:clamp(18px,3.4vh,30px);font-weight:700;letter-spacing:.02em;
    min-height:1.2em;text-align:center;}
  .status b.x{color:var(--x);} .status b.o{color:var(--o);}

  .board{
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    gap:clamp(8px,1.4vmin,16px);
    width:min(82vw, calc(100vh - 320px), 88vh);
    aspect-ratio:1/1;
    background:var(--board);padding:clamp(8px,1.4vmin,16px);
    border-radius:24px;box-shadow:0 10px 34px rgba(20,40,33,.28);}
  .cell{
    border:none;background:var(--panel);border-radius:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:800;line-height:1;
    font-size:clamp(48px,16vmin,180px);
    color:var(--ink);position:relative;overflow:hidden;
    transition:background .12s,transform .06s;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  .cell:hover:not(.filled):not(:disabled){background:var(--accent-soft);}
  .cell:active:not(.filled){transform:scale(.97);}
  .cell.filled{cursor:default;}
  .cell.x{color:var(--x);}
  .cell.o{color:var(--o);}
  .cell .glyph{animation:drop .22s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes drop{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:none;}}
  .cell.win{background:var(--accent-soft);box-shadow:inset 0 0 0 4px var(--accent);}
  .cell.dim{opacity:.4;}

  /* preview of whose mark drops next */
  .cell:hover:not(.filled):not(:disabled)::after{
    content:attr(data-next);position:absolute;opacity:.22;
    font-family:var(--mono);font-weight:800;
    color:var(--ink);pointer-events:none;}
  .board.next-x .cell:hover:not(.filled)::after{color:var(--x);}
  .board.next-o .cell:hover:not(.filled)::after{color:var(--o);}

  /* ── segmented control (toolbar settings) ── */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .seg button{border:none;background:#fff;padding:8px 13px;cursor:pointer;font-size:13px;font-weight:700;
    color:var(--muted);font-family:var(--mono);}
  .seg button.active{background:var(--board);color:#fff;}
  .seg .lab{display:flex;align-items:center;padding:0 10px;font-size:10.5px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);background:var(--panel-2);}
  .seg-input{width:54px;border:none;border-left:1px solid var(--line);background:#fff;
    padding:8px 6px;font-family:var(--mono);font-weight:700;font-size:13px;color:var(--ink);text-align:center;}
  .seg-input::placeholder{color:var(--muted);font-weight:600;}
  .seg-input:focus{outline:none;background:var(--accent-soft);}
  .seg-input.active{background:var(--board);color:#fff;}
  .seg-input.active::placeholder{color:rgba(255,255,255,.7);}
  .seg-input::-webkit-outer-spin-button,.seg-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .seg-input{-moz-appearance:textfield;}

  /* ── turn-timer pill ── */
  .turn-timer{display:inline-flex;align-items:baseline;gap:1px;font-family:var(--mono);font-weight:800;
    padding:5px 16px;border-radius:999px;background:var(--panel);border:2px solid var(--line);
    color:var(--ink);font-size:clamp(15px,2.4vh,20px);line-height:1.3;}
  .turn-timer .tt-unit{font-size:.72em;color:var(--muted);font-weight:700;margin-left:1px;}
  .turn-timer.low{border-color:var(--danger);color:var(--danger);background:var(--danger-soft);}
  .turn-timer.low .tt-unit{color:var(--danger);}
  .turn-timer[hidden]{display:none;}

  @media (prefers-reduced-motion:reduce){
    .cell .glyph{animation:none;} .btn:active{transform:none;} .cell:active{transform:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="toolbar">
    <div class="brand"><span class="mark"></span>Tic-Tac-Toe <small>tap to play</small></div>
    <div class="spacer"></div>
    <div class="seg" id="timerSeg"><span class="lab">Turn timer</span>
      <button data-sec="0" class="active">Off</button>
      <button data-sec="5">5s</button>
      <button data-sec="10">10s</button>
      <button data-sec="15">15s</button>
      <button data-sec="30">30s</button>
      <input type="number" id="timerCustom" class="seg-input" min="1" max="600" placeholder="…s"
             inputmode="numeric" aria-label="Custom turn timer in seconds" title="Custom seconds"></div>
    <button class="btn" id="fsBtn" aria-pressed="false" title="Toggle full screen"><span class="ic">⛶</span><span class="fs-label">Full screen</span></button>
    <button class="btn" id="tournamentBtn"><span class="ic">🏆</span>Tournament</button>
    <button class="btn" id="undoBtn"><span class="ic">↶</span>Undo</button>
    <button class="btn" id="resetScoreBtn"><span class="ic">⟲</span>Reset scores</button>
    <button class="btn primary" id="newBtn"><span class="ic">＋</span>New round</button>
  </header>

  <section class="scorebar">
    <div class="score x turn" id="scoreX">
      <span class="glyph">X</span>
      <div class="meta"><span class="name">Player X</span><span class="wins" id="winsX">0</span></div>
    </div>
    <div class="vs">vs</div>
    <div class="score o" id="scoreO">
      <span class="glyph">O</span>
      <div class="meta"><span class="name">Player O</span><span class="wins" id="winsO">0</span></div>
    </div>
  </section>

  <main class="stage">
    <div class="status" id="status"><b class="x">X</b> to move</div>
    <div class="turn-timer" id="turnTimer" hidden><span class="tt-num">0</span><span class="tt-unit">s</span></div>
    <div class="board next-x" id="board" role="grid" aria-label="Tic-tac-toe board"></div>
  </main>
</div>

<!-- Tournament mode — inlined from tools/games/_shared/tournament.js; re-propagate on change -->
<script>
/* ============================================================================
   Tournament mode — canonical, dependency-free single-elimination module.

   CENTRAL SOURCE OF TRUTH. This suite keeps no linked scripts (every tool is a
   self-contained single file — see STYLE_GUIDE §0), so each 2-player game
   INLINES this block verbatim inside its own <script>. When this file changes,
   re-propagate it into every game that uses it (npm-free: see README in this
   folder). The marker comments below delimit the inlined region.

   A game wires it up once, after this has defined window.Tournament:

     Tournament.setup({
       game: 'Super Tic-Tac-Toe',
       sides: [ {name:'Blue', color:'var(--x)'}, {name:'Red', color:'var(--o)'} ],
       button: '#tournamentBtn',                 // toolbar button that opens it
       onMatchStart: function(a, b){ newGame(); } // a→sides[0], b→sides[1]
     });

   When a game ends, the game reports the result (no-ops unless a match is live):

     Tournament.reportWinner(0|1);   // index into `sides` of the winning side
     Tournament.reportDraw();        // replays the current match
============================================================================ */
/* <tournament-module> */
(function(){
  if(window.Tournament) return;

  var cfg = null;        // game config from setup()
  var T   = null;        // active tournament, or null
  var bannerEl = null, overlayEl = null, modalEl = null;
  var pendingCount = 0;  // chosen player count on the setup step

  /* ---------- styles (injected once; reuses each game's design tokens) ---------- */
  var CSS =
  '.tm-banner{display:flex;align-items:center;gap:12px 16px;flex-wrap:wrap;flex:none;'
    +'padding:9px 20px;background:var(--accent-soft);border-bottom:1px solid var(--line);font-size:14px;}'
  +'.tm-banner[hidden]{display:none;}'
  +'.tm-title{font-weight:800;letter-spacing:.06em;text-transform:uppercase;font-size:12px;'
    +'color:var(--accent-deep);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}'
  +'.tm-vs{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;font-weight:600;color:var(--ink);}'
  +'.tm-dot{width:12px;height:12px;border-radius:50%;display:inline-block;vertical-align:-1px;'
    +'box-shadow:inset 0 -2px 2px rgba(0,0,0,.28),inset 0 1px 1px rgba(255,255,255,.4);}'
  +'.tm-spacer{flex:1;}'
  +'.tm-btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:7px 13px;'
    +'border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;}'
  +'.tm-btn:hover{background:var(--panel-2);}'
  +'.tm-btn.primary{background:var(--board);border-color:var(--board);color:#fff;}'
  +'.tm-btn.primary:hover{background:var(--board-2);}'
  +'.tm-btn[disabled]{opacity:.45;cursor:not-allowed;}'
  /* overlay + modal */
  +'.tm-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;'
    +'padding:18px;background:rgba(16,27,23,.55);}'
  +'.tm-overlay[hidden]{display:none;}'
  +'.tm-modal{background:var(--panel);color:var(--ink);border-radius:16px;width:min(720px,96vw);'
    +'max-height:92vh;overflow:auto;padding:22px 24px;box-shadow:0 24px 64px rgba(20,40,33,.42);'
    +'font-family:var(--sans);}'
  +'.tm-modal h2{margin:0 0 4px;font-size:21px;}'
  +'.tm-sub{margin:0 0 16px;color:var(--muted);font-size:13.5px;line-height:1.5;}'
  +'.tm-count{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}'
  +'.tm-count button{min-width:46px;padding:9px 0;border:1px solid var(--line);background:#fff;'
    +'border-radius:9px;cursor:pointer;font-family:var(--mono);font-weight:700;font-size:15px;color:var(--ink);}'
  +'.tm-count button.active{background:var(--board);color:#fff;border-color:var(--board);}'
  +'.tm-names{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:6px;}'
  +'.tm-field{display:flex;align-items:center;gap:8px;}'
  +'.tm-field .n{font-family:var(--mono);font-size:11px;color:var(--muted);width:18px;text-align:right;}'
  +'.tm-field input{flex:1;min-width:0;border:1px solid var(--line);border-radius:8px;background:var(--panel-2);'
    +'padding:9px 11px;font-size:14px;font-family:var(--sans);color:var(--ink);}'
  +'.tm-field input:focus{outline:none;border-color:var(--accent);}'
  +'.tm-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:18px;}'
  /* bracket */
  +'.tm-bracket{display:flex;gap:16px;overflow:auto;padding:4px 2px 8px;}'
  +'.tm-round{display:flex;flex-direction:column;justify-content:space-around;gap:14px;min-width:158px;}'
  +'.tm-round h3{margin:0 0 2px;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;'
    +'color:var(--muted);text-align:center;}'
  +'.tm-match{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel-2);}'
  +'.tm-match.current{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}'
  +'.tm-slot{display:flex;align-items:center;gap:7px;padding:8px 11px;font-size:13.5px;'
    +'border-bottom:1px solid var(--line);min-height:36px;}'
  +'.tm-slot:last-child{border-bottom:none;}'
  +'.tm-slot.win{background:var(--accent-soft);font-weight:700;}'
  +'.tm-slot.tbd{color:var(--muted);font-style:italic;}'
  +'.tm-slot b{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}'
  +'.tm-champ{display:flex;align-items:center;justify-content:center;text-align:center;border-radius:10px;'
    +'border:2px solid var(--accent);background:var(--accent-soft);padding:12px;font-weight:800;min-height:48px;}'
  +'.tm-champ.empty{border-style:dashed;border-color:var(--line);background:var(--panel-2);color:var(--muted);font-weight:600;}';

  function injectCSS(){
    if(document.getElementById('tm-css')) return;
    var s=document.createElement('style'); s.id='tm-css'; s.textContent=CSS; document.head.appendChild(s);
  }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];}); }

  /* ---------- bracket maths (single elimination, 2-8 players) ---------- */
  function nextPow2(n){ var p=1; while(p<n) p*=2; return p; }
  // standard bracket slot order so top seeds meet bottom seeds (and byes spread out)
  function seedSlots(n){ var m=[1,2]; while(m.length<n){ var s=m.length*2+1, x=[]; for(var k=0;k<m.length;k++){ x.push(m[k]); x.push(s-m[k]); } m=x; } return m; }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)), t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function firstTwoPaired(slots){   // are entrants #1 and #2 in the same opening match?
    for(var i=0;i<slots.length;i+=2){ var a=slots[i], b=slots[i+1];
      if(a&&b&&((a.id===0&&b.id===1)||(a.id===1&&b.id===0))) return true; }
    return false;
  }
  function build(names){
    var N=names.length, B=nextPow2(N);
    var players=names.map(function(nm,i){ return {id:i, name:nm}; });
    var seq=seedSlots(B), slots, order, seedOf;
    // Random bracket each time. For 4+ players, keep the first two entered apart in
    // round 1 (re-draw if they collide) so they aren't repeatedly matched first.
    for(var tries=0; tries<200; tries++){
      order=shuffle(players.slice());                   // random seeding
      seedOf={}; order.forEach(function(p,i){ seedOf[i+1]=p; });
      slots=seq.map(function(seed){ return seedOf[seed] || null; });  // null = bye
      if(N<4 || !firstTwoPaired(slots)) break;
    }
    var rounds=[], r0=[];
    for(var i=0;i<B;i+=2) r0.push({a:slots[i], b:slots[i+1], winner:null, round:0});
    rounds.push(r0);
    var size=r0.length, r=1;
    while(size>1){
      var arr=[];
      for(var j=0;j<size;j+=2) arr.push({a:null, b:null, winner:null, round:r, srcA:j, srcB:j+1});
      rounds.push(arr); size=arr.length; r++;
    }
    var st={players:players, rounds:rounds, current:null, awaiting:false, champion:null};
    recompute(st); st.current=findCurrent(st);
    return st;
  }
  function recompute(st){
    var R=st.rounds, r, i, m;
    for(i=0;i<R[0].length;i++){ m=R[0][i]; if(!m.winner){ if(m.a&&!m.b) m.winner=m.a; else if(m.b&&!m.a) m.winner=m.b; } }
    for(r=1;r<R.length;r++) for(i=0;i<R[r].length;i++){ m=R[r][i]; m.a=R[r-1][m.srcA].winner||null; m.b=R[r-1][m.srcB].winner||null; }
  }
  function findCurrent(st){ var R=st.rounds,r,i,m; for(r=0;r<R.length;r++) for(i=0;i<R[r].length;i++){ m=R[r][i]; if(m.a&&m.b&&!m.winner) return m; } return null; }
  function roundName(r,total){ var fe=total-1-r; return fe===0?'Final':fe===1?'Semifinal':fe===2?'Quarterfinal':('Round '+(r+1)); }

  /* ---------- banner ---------- */
  function ensureBanner(){
    if(bannerEl) return;
    var tb=document.querySelector('.toolbar');
    bannerEl=document.createElement('div'); bannerEl.className='tm-banner'; bannerEl.hidden=true;
    if(tb && tb.parentNode) tb.insertAdjacentElement('afterend', bannerEl);
    else document.body.insertBefore(bannerEl, document.body.firstChild);
    bannerEl.addEventListener('click', function(e){
      var b=e.target.closest('[data-act]'); if(!b) return; act(b.getAttribute('data-act'));
    });
  }
  function dot(i){ return '<span class="tm-dot" style="background:'+cfg.sides[i].color+'"></span>'; }
  function matchInline(m){
    return '<span class="tm-vs"><b>'+esc(m.a.name)+'</b>'+dot(0)+cfg.sides[0].name
         +' &nbsp;vs&nbsp; <b>'+esc(m.b.name)+'</b>'+dot(1)+cfg.sides[1].name+'</span>';
  }
  function renderBanner(){
    ensureBanner();
    if(!T){ bannerEl.hidden=true; return; }
    bannerEl.hidden=false;
    var h;
    if(T.champion){
      h='<span class="tm-title">🏆 Champion</span>'
       +'<span class="tm-vs"><b>'+esc(T.champion.name)+'</b>&nbsp;wins the tournament!</span>'
       +'<span class="tm-spacer"></span>'
       +'<button class="tm-btn" data-act="bracket">Bracket</button>'
       +'<button class="tm-btn primary" data-act="new">New tournament</button>'
       +'<button class="tm-btn" data-act="exit">Exit</button>';
    }else if(T.awaiting && T.current){
      h='<span class="tm-title">🏆 '+roundName(T.current.round,T.rounds.length)+'</span>'
       +matchInline(T.current)
       +'<span class="tm-spacer"></span>'
       +'<button class="tm-btn" data-act="bracket">Bracket</button>'
       +'<button class="tm-btn" data-act="exit">Exit</button>';
    }else if(T.current){
      h='<span class="tm-title">🏆 '+roundName(T.current.round,T.rounds.length)+'</span>'
       +'<span class="tm-vs">Next up — '+esc(T.current.a.name)+' vs '+esc(T.current.b.name)+'</span>'
       +'<span class="tm-spacer"></span>'
       +'<button class="tm-btn primary" data-act="play">▶ Play match</button>'
       +'<button class="tm-btn" data-act="bracket">Bracket</button>'
       +'<button class="tm-btn" data-act="exit">Exit</button>';
    }else{ bannerEl.hidden=true; return; }
    bannerEl.innerHTML=h;
  }

  /* ---------- modal ---------- */
  function ensureModal(){
    if(overlayEl) return;
    overlayEl=document.createElement('div'); overlayEl.className='tm-overlay'; overlayEl.hidden=true;
    modalEl=document.createElement('div'); modalEl.className='tm-modal';
    overlayEl.appendChild(modalEl); document.body.appendChild(overlayEl);
    overlayEl.addEventListener('click', function(e){ if(e.target===overlayEl) hideModal(); });
    modalEl.addEventListener('click', function(e){ var b=e.target.closest('[data-act]'); if(b) act(b.getAttribute('data-act'), b); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape' && !overlayEl.hidden) hideModal(); });
  }
  function showModal(){ ensureModal(); overlayEl.hidden=false; }
  function hideModal(){ if(overlayEl) overlayEl.hidden=true; }

  function setupStep(){
    ensureModal();
    var counts=''; for(var n=2;n<=8;n++) counts+='<button data-act="count" data-n="'+n+'"'+(n===pendingCount?' class="active"':'')+'>'+n+'</button>';
    modalEl.innerHTML=
      '<h2>'+(cfg.game?esc(cfg.game)+' — ':'')+'Tournament</h2>'
     +'<p class="tm-sub">Single elimination with a random bracket. Choose how many players, then enter their names.</p>'
     +'<div class="tm-count">'+counts+'</div>'
     +'<div class="tm-names" id="tmNames"></div>'
     +'<div class="tm-actions"><button class="tm-btn" data-act="close">Cancel</button>'
     +'<button class="tm-btn primary" data-act="start" id="tmStart"'+(pendingCount?'':' disabled')+'>Start tournament</button></div>';
    if(pendingCount) renderNameFields(pendingCount);
    showModal();
  }
  function renderNameFields(n, keep){
    var host=document.getElementById('tmNames'); if(!host) return;
    var prev = keep ? currentNames() : [];
    var html=''; for(var i=0;i<n;i++){ var v=esc(prev[i]!=null?prev[i]:('Player '+(i+1)));
      html+='<div class="tm-field"><span class="n">'+(i+1)+'</span><input type="text" maxlength="18" value="'+v+'" aria-label="Player '+(i+1)+' name"></div>'; }
    host.innerHTML=html;
  }
  function currentNames(){
    return Array.prototype.map.call(modalEl.querySelectorAll('#tmNames input'), function(inp,i){ var v=(inp.value||'').trim(); return v||('Player '+(i+1)); });
  }

  function bracketStep(){
    ensureModal();
    var R=T.rounds, body='<div class="tm-bracket">';
    for(var r=0;r<R.length;r++){
      body+='<div class="tm-round"><h3>'+roundName(r,R.length)+'</h3>';
      for(var i=0;i<R[r].length;i++) body+=matchBox(R[r][i]);
      body+='</div>';
    }
    body+='<div class="tm-round"><h3>Champion</h3>'+(T.champion
            ?'<div class="tm-champ">🏆 '+esc(T.champion.name)+'</div>'
            :'<div class="tm-champ empty">—</div>')+'</div>';
    body+='</div>';
    var actions='<div class="tm-actions">';
    if(T.champion) actions+='<button class="tm-btn primary" data-act="new">New tournament</button>';
    else if(T.current) actions+='<button class="tm-btn primary" data-act="play">▶ Play this match</button>';
    actions+='<button class="tm-btn" data-act="close">Close</button></div>';
    modalEl.innerHTML='<h2>Bracket</h2><p class="tm-sub">'
      +(T.champion?'Tournament complete.':(T.current?'Up next: <b>'+esc(T.current.a.name)+'</b> vs <b>'+esc(T.current.b.name)+'</b>.':''))
      +'</p>'+body+actions;
    showModal();
  }
  function matchBox(m){
    var cls='tm-match'+((m===T.current && !T.champion)?' current':'');
    return '<div class="'+cls+'">'+slot(m,'a',0)+slot(m,'b',1)+'</div>';
  }
  function slot(m,key,side){
    var p=m[key], win=m.winner && p && m.winner.id===p.id;
    if(p===null) return '<div class="tm-slot tbd">'+(m.round===0?'— bye —':'—')+'</div>';
    return '<div class="tm-slot'+(win?' win':'')+'">'+dot(side)+'<b>'+esc(p.name)+'</b></div>';
  }

  /* ---------- flow ---------- */
  function act(a, el){
    if(a==='count'){ var n=el?+el.getAttribute('data-n'):0;
      if(n){ pendingCount=n;
        Array.prototype.forEach.call(modalEl.querySelectorAll('.tm-count button'),function(b){ b.classList.toggle('active', +b.getAttribute('data-n')===n); });
        renderNameFields(n, true); var s=document.getElementById('tmStart'); if(s) s.disabled=false; } return; }
    if(a==='start'){ var names=currentNames(); T=build(names); renderBanner(); bracketStep(); return; }
    if(a==='play'){ if(T && T.current){ startMatch(T.current); } return; }
    if(a==='bracket'){ bracketStep(); return; }
    if(a==='close'){ hideModal(); return; }
    if(a==='new'){ pendingCount=0; setupStep(); return; }
    if(a==='exit'){ if(window.confirm('End the current tournament?')){ T=null; hideModal(); renderBanner(); } return; }
  }
  function startMatch(m){
    T.current=m; T.awaiting=true; hideModal(); renderBanner();
    if(cfg && typeof cfg.onMatchStart==='function') cfg.onMatchStart(m.a, m.b);
  }

  /* ---------- public API ---------- */
  window.Tournament = {
    setup: function(config){
      cfg=config||{}; if(!cfg.sides || cfg.sides.length!==2) throw new Error('Tournament needs exactly 2 sides');
      injectCSS(); ensureBanner();
      if(cfg.button){ var btn=document.querySelector(cfg.button); if(btn) btn.addEventListener('click', function(){ Tournament.open(); btn.blur&&btn.blur(); }); }
    },
    open: function(){ if(!cfg) return; if(T) bracketStep(); else { if(!pendingCount) pendingCount=0; setupStep(); } },
    reportWinner: function(side){
      if(!T || !T.awaiting || !T.current) return;
      var m=T.current; m.winner = side===0 ? m.a : m.b; T.awaiting=false;
      recompute(T); T.current=findCurrent(T);
      if(!T.current) T.champion = T.rounds[T.rounds.length-1][0].winner;
      renderBanner();
      if(overlayEl && !overlayEl.hidden) bracketStep();
    },
    reportDraw: function(){
      if(!T || !T.awaiting || !T.current) return;
      // single elimination needs a decisive game — replay the same match
      if(cfg && typeof cfg.onMatchStart==='function') cfg.onMatchStart(T.current.a, T.current.b);
    },
    active: function(){ return !!T; }
  };
})();
/* </tournament-module> */
</script>
<script>
(function(){
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8], // rows
    [0,3,6],[1,4,7],[2,5,8], // cols
    [0,4,8],[2,4,6]          // diagonals
  ];

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const winsXEl = document.getElementById('winsX');
  const winsOEl = document.getElementById('winsO');
  const scoreXEl = document.getElementById('scoreX');
  const scoreOEl = document.getElementById('scoreO');

  let cells = Array(9).fill('');   // '', 'X', 'O'
  let turn = 'X';
  let over = false;
  let history = [];                // indices played, for undo
  let wins = {X:0, O:0};

  // Build the 9 cells once.
  const cellEls = [];
  for(let i=0;i<9;i++){
    const b = document.createElement('button');
    b.className = 'cell';
    b.setAttribute('role','gridcell');
    b.dataset.i = i;
    b.addEventListener('click', ()=>play(i));
    boardEl.appendChild(b);
    cellEls.push(b);
  }

  function render(){
    cellEls.forEach((el,i)=>{
      const v = cells[i];
      el.classList.toggle('filled', !!v);
      el.classList.remove('x','o','win','dim');
      el.disabled = over || !!v;
      if(v){
        el.classList.add(v.toLowerCase());
        el.innerHTML = '<span class="glyph">'+v+'</span>';
        el.setAttribute('aria-label', 'Cell '+(i+1)+', '+v);
      }else{
        el.innerHTML = '';
        el.dataset.next = turn;
        el.setAttribute('aria-label', 'Cell '+(i+1)+', empty');
      }
    });
    boardEl.classList.toggle('next-x', turn==='X');
    boardEl.classList.toggle('next-o', turn==='O');
    scoreXEl.classList.toggle('turn', !over && turn==='X');
    scoreOEl.classList.toggle('turn', !over && turn==='O');
    document.getElementById('undoBtn').disabled = history.length===0;
  }

  function play(i){
    if(over || cells[i]) return;
    cells[i] = turn;
    history.push(i);

    const line = winningLine();
    if(line){
      over = true;
      wins[turn]++;
      winsXEl.textContent = wins.X;
      winsOEl.textContent = wins.O;
      render();
      line.forEach(k=>cellEls[k].classList.add('win'));
      cellEls.forEach((el,k)=>{ if(!line.includes(k)) el.classList.add('dim'); });
      const w = turn;
      statusEl.innerHTML = '<b class="'+w.toLowerCase()+'">'+w+'</b> wins!';
      startTurnTimer();
      if(window.Tournament) Tournament.reportWinner(w==='X'?0:1);
      return;
    }

    if(cells.every(Boolean)){
      over = true;
      render();
      statusEl.textContent = "Cat's game — it's a draw";
      startTurnTimer();
      if(window.Tournament) Tournament.reportDraw();
      return;
    }

    turn = turn==='X' ? 'O' : 'X';
    render();
    statusEl.innerHTML = '<b class="'+turn.toLowerCase()+'">'+turn+'</b> to move';
    startTurnTimer();
  }

  function winningLine(){
    for(const [a,b,c] of WINS){
      if(cells[a] && cells[a]===cells[b] && cells[a]===cells[c]) return [a,b,c];
    }
    return null;
  }

  function undo(){
    if(!history.length) return;
    const i = history.pop();
    cells[i] = '';
    over = false;
    // whoever's mark we just removed is up again
    turn = (history.length % 2 === 0) ? 'X' : 'O';
    render();
    statusEl.innerHTML = '<b class="'+turn.toLowerCase()+'">'+turn+'</b> to move';
    startTurnTimer();
  }

  function newRound(){
    cells = Array(9).fill('');
    history = [];
    over = false;
    turn = 'X';
    render();
    statusEl.innerHTML = '<b class="x">X</b> to move';
    startTurnTimer();
  }

  function resetScores(){
    wins = {X:0, O:0};
    winsXEl.textContent = '0';
    winsOEl.textContent = '0';
    newRound();
  }

  document.getElementById('newBtn').addEventListener('click', newRound);
  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('resetScoreBtn').addEventListener('click', resetScores);

  /* ----- full screen ----- */
  const fsBtn = document.getElementById('fsBtn');
  function fsOn(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
  function toggleFs(){
    if(fsOn()){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
    else{ const el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen).call(el); }
  }
  function syncFs(){
    const on=fsOn();
    fsBtn.setAttribute('aria-pressed', on?'true':'false');
    fsBtn.querySelector('.fs-label').textContent = on?'Exit full screen':'Full screen';
  }
  fsBtn.addEventListener('click', toggleFs);
  document.addEventListener('fullscreenchange', syncFs);
  document.addEventListener('webkitfullscreenchange', syncFs);

  /* ===== Reusable turn timer (drop-in, dependency-free) =====
     const t = createTurnTimer({onTick, onExpire});
       t.setDuration(seconds)  // 0 disables the timer
       t.start()               // (re)start the countdown for a turn
       t.stop()                // halt (e.g. on game over)
     onTick(remainingSec|null, durationSec) fires while counting; null = off/cleared.
     onExpire() fires once when the countdown hits 0. */
  function createTurnTimer({onTick, onExpire}={}){
    let duration = 0, deadline = 0, iv = null;
    function clear(){ if(iv){ clearInterval(iv); iv = null; } }
    function tick(){
      const remMs = Math.max(0, deadline - Date.now());
      if(onTick) onTick(Math.ceil(remMs/1000), duration);
      if(remMs<=0){ clear(); if(onExpire) onExpire(); }
    }
    return {
      setDuration(sec){ duration = Math.max(0, Math.floor(sec)||0); },
      getDuration(){ return duration; },
      start(){
        clear();
        if(duration<=0){ if(onTick) onTick(null, 0); return; }
        deadline = Date.now() + duration*1000;
        if(onTick) onTick(duration, duration);
        iv = setInterval(tick, 200);
      },
      stop(){ clear(); }
    };
  }

  const ttEl  = document.getElementById('turnTimer');
  const ttNum = ttEl.querySelector('.tt-num');
  const turnTimer = createTurnTimer({
    onTick(remSec, dur){
      if(remSec===null){ ttEl.hidden = true; return; }
      ttEl.hidden = false;
      ttNum.textContent = remSec;
      ttEl.classList.toggle('low', dur>0 && remSec<=Math.max(3, Math.ceil(dur/4)));
    },
    onExpire(){ autoMove(); }
  });

  // (Re)start the countdown for the player to move — or clear it when the round is over.
  function startTurnTimer(){
    // don't run the clock on the very first move — players may still be settling in
    if(over || history.length===0){ turnTimer.stop(); ttEl.hidden = true; return; }
    turnTimer.start();   // start() clears the pill itself when the timer is Off
  }

  // Time's up: play a random empty cell, with no strategy at all.
  function autoMove(){
    if(over) return;
    const empties = [];
    cells.forEach((v,i)=>{ if(!v) empties.push(i); });
    if(!empties.length) return;
    play(empties[Math.floor(Math.random()*empties.length)]);
  }

  // turn timer — presets + a custom seconds field
  const timerCustom = document.getElementById('timerCustom');
  function selectTimer(sec, srcBtn){
    turnTimer.setDuration(sec);
    document.querySelectorAll('#timerSeg button').forEach(x=>x.classList.toggle('active', x===srcBtn));
    timerCustom.classList.toggle('active', srcBtn===null);
    startTurnTimer();                // apply immediately to the current turn
  }
  document.querySelectorAll('#timerSeg button').forEach(btn=>{
    btn.addEventListener('click', ()=> selectTimer(+btn.dataset.sec, btn));
  });
  function applyCustomTimer(){
    let n = parseInt(timerCustom.value, 10);
    if(!Number.isFinite(n) || n<1) return;          // ignore empty / invalid
    n = Math.min(600, n);
    timerCustom.value = n;
    selectTimer(n, null);                           // null source → custom is the active choice
  }
  timerCustom.addEventListener('change', applyCustomTimer);
  timerCustom.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); applyCustomTimer(); timerCustom.blur(); } });
  timerCustom.addEventListener('focus', ()=> timerCustom.select());

  // Keyboard: 1-9 play the matching cell (top-left to bottom-right), R = new round, U = undo, F = full screen.
  document.addEventListener('keydown', e=>{
    if(/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)) return;
    if(e.key>='1' && e.key<='9'){ play(Number(e.key)-1); }
    else if(e.key==='r' || e.key==='R'){ newRound(); }
    else if(e.key==='u' || e.key==='U'){ undo(); }
    else if(e.key==='f' || e.key==='F'){ toggleFs(); }
  });

  if(window.Tournament) Tournament.setup({
    game:'Tic-Tac-Toe',
    sides:[{name:'Blue (X)', color:'var(--x)'}, {name:'Red (O)', color:'var(--o)'}],
    button:'#tournamentBtn',
    onMatchStart:function(){ newRound(); }
  });

  render();
  startTurnTimer();
})();
</script>
</body>
</html>
