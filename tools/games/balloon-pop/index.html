<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A friendly word-guessing game for the classroom smart board — type a secret word (hidden as you type), then the class guesses letters before the balloons pop.">
<meta name="theme-color" content="#1f3d35">
<title>Balloon Pop</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23e0982e'/%3E%3C/svg%3E">
<style>
  :root{
    --app-bg:#e9edf0; --panel:#fff; --panel-2:#f4f6f8; --room-bg:#f7f8f6;
    --ink:#16241f; --muted:#67756f; --line:#d8dee2; --grid-line:rgba(31,61,53,.07);
    --board:#1f3d35; --board-2:#173029; --board-line:#2c5247;
    --accent:#e0982e; --accent-soft:#fbe6c8; --accent-deep:#b9781f;
    --danger:#c43d35; --danger-soft:#f7e0de; --together:#2f6f9f; --together-soft:#dde9f3;
    --ok:#3f9e6b;
    --shadow:0 1px 2px rgba(20,40,33,.06),0 6px 18px rgba(20,40,33,.06);
    --shadow-sm:0 1px 2px rgba(20,40,33,.10); --radius:12px;
    --sans:ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;} html,body{height:100%;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--app-bg);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;overflow:hidden;}
  button{font-family:inherit;}
  input{font-family:inherit;color:var(--ink);}
  :focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:6px;}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ── toolbar ── */
  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:11px 20px;
    background:var(--panel);border-bottom:1px solid var(--line);flex:none;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:13px;color:var(--ink);white-space:nowrap;}
  .brand .mark{width:16px;height:16px;border-radius:4px;background:var(--accent);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);flex:none;}
  .brand small{font-weight:500;letter-spacing:.02em;text-transform:none;color:var(--muted);font-size:11px;}
  .spacer{flex:1;}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:11px 18px;
    border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;display:inline-flex;
    align-items:center;gap:8px;transition:background .12s,border-color .12s,transform .05s;}
  .btn:hover{background:var(--panel-2);} .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--board);border-color:var(--board);color:#fff;}
  .btn.primary:hover{background:var(--board-2);}
  .btn[disabled]{opacity:.45;cursor:not-allowed;}
  .btn .ic{font-size:18px;line-height:1;}

  .view{flex:1;min-height:0;display:none;}
  .view.show{display:flex;}

  /* ── setup view ── */
  #setup{align-items:center;justify-content:center;padding:24px;}
  .setup-card{width:min(680px,94vw);background:var(--panel);border:1px solid var(--line);
    border-radius:18px;box-shadow:var(--shadow);padding:clamp(22px,4vh,40px);
    display:flex;flex-direction:column;gap:18px;}
  .setup-card h1{margin:0;font-size:clamp(22px,4vh,32px);letter-spacing:-.01em;}
  .setup-card .lead{margin:0;color:var(--muted);font-size:15px;line-height:1.55;}
  .field{display:flex;flex-direction:column;gap:7px;}
  .field label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  .secret-row{display:flex;gap:10px;}
  .secret-row input{flex:1;border:2px solid var(--line);border-radius:12px;background:var(--panel-2);
    padding:14px 16px;font-size:clamp(20px,3.4vh,28px);font-family:var(--mono);letter-spacing:.18em;}
  .secret-row input:focus{outline:none;border-color:var(--accent);}
  .clue-input{border:1px solid var(--line);border-radius:10px;background:var(--panel-2);padding:11px 13px;font-size:16px;}
  .clue-input:focus{outline:none;border-color:var(--accent);}
  .peek{border:1px solid var(--line);background:var(--panel);border-radius:12px;cursor:pointer;
    padding:0 16px;font-size:20px;color:var(--muted);}
  .peek:hover{background:var(--panel-2);} .peek.on{color:var(--board);border-color:var(--board-line);}
  .hide-note{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
  .err{color:var(--danger);font-size:13px;font-weight:600;min-height:1.2em;}
  .setup-card .go{align-self:flex-start;font-size:17px;padding:13px 26px;}

  /* ── play view ── */
  #play{flex-direction:column;}
  .playtop{flex:none;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;
    padding:14px 26px 0;}
  .clue-chip{font-size:clamp(15px,2.6vh,22px);font-weight:600;color:var(--ink);max-width:50%;}
  .clue-chip span{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);display:block;margin-bottom:2px;}
  .lives{display:flex;align-items:center;gap:10px;font-size:clamp(14px,2.4vh,18px);font-weight:700;color:var(--muted);}
  .lives b{font-family:var(--mono);color:var(--danger);}

  .balloons{flex:none;display:flex;align-items:flex-end;justify-content:center;gap:clamp(10px,2.4vw,34px);
    padding:10px 26px 4px;min-height:clamp(90px,16vh,150px);}
  .balloon{position:relative;width:clamp(46px,7vw,86px);height:clamp(58px,9vw,108px);
    transition:transform .18s;transform-origin:bottom center;}
  .balloon .body{width:100%;height:84%;border-radius:50% 50% 48% 48%;position:relative;
    box-shadow:inset -6px -8px 0 rgba(0,0,0,.08), 0 4px 10px rgba(20,40,33,.14);}
  .balloon .body::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);
    border-left:6px solid transparent;border-right:6px solid transparent;border-top:9px solid currentColor;}
  .balloon .string{position:absolute;left:50%;bottom:0;width:2px;height:16%;background:var(--muted);
    transform:translateX(-50%);opacity:.5;}
  .balloon.float{animation:bob 3s ease-in-out infinite;}
  .balloon.float.b1{animation-delay:-.3s;} .balloon.float.b2{animation-delay:-1.1s;}
  .balloon.float.b3{animation-delay:-1.7s;} .balloon.float.b4{animation-delay:-2.3s;}
  .balloon.float.b5{animation-delay:-.8s;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-7px) rotate(1.5deg);}}
  .balloon.popped{animation:pop .34s ease forwards;}
  @keyframes pop{40%{transform:scale(1.28);}100%{transform:scale(.2);opacity:0;}}
  .balloon.gone{visibility:hidden;}

  .stage{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(14px,3vh,30px);padding:8px 20px;}
  .msg{font-size:clamp(18px,3.4vh,30px);font-weight:700;min-height:1.3em;text-align:center;}
  .msg.win{color:var(--ok);} .msg.lose{color:var(--danger);}

  .word{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(8px,1.4vw,16px);
    max-width:96vw;}
  .wgap{width:clamp(16px,2.6vw,34px);} /* space between words */
  .slot{display:inline-flex;align-items:center;justify-content:center;
    min-width:clamp(34px,5.2vw,70px);font-family:var(--mono);font-weight:800;
    font-size:clamp(34px,7vh,84px);line-height:1.1;color:var(--ink);
    border-bottom:6px solid var(--board);padding:0 4px;}
  .slot.punct{border-bottom-color:transparent;color:var(--muted);}
  .slot .lt{animation:reveal .22s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes reveal{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .slot.missed{color:var(--danger);border-bottom-color:var(--danger);}

  /* keyboard */
  .keyboard{flex:none;display:flex;flex-direction:column;align-items:center;gap:clamp(6px,1vh,10px);
    padding:6px 16px clamp(14px,2.4vh,24px);}
  .krow{display:flex;gap:clamp(5px,.8vw,10px);}
  .key{width:clamp(40px,5.6vw,76px);height:clamp(48px,7vh,76px);border:1px solid var(--line);
    background:var(--panel);border-radius:12px;cursor:pointer;font-family:var(--mono);font-weight:800;
    font-size:clamp(18px,3vh,30px);color:var(--ink);box-shadow:var(--shadow-sm);
    transition:background .1s,transform .05s,color .1s,border-color .1s;}
  .key:hover:not(:disabled){background:var(--accent-soft);border-color:var(--accent);}
  .key:active:not(:disabled){transform:translateY(2px);}
  .key.hit{background:var(--ok);border-color:var(--ok);color:#fff;}
  .key.miss{background:var(--panel-2);color:var(--muted);border-style:dashed;opacity:.6;}
  .key:disabled{cursor:default;}

  @media (prefers-reduced-motion:reduce){
    .balloon.float{animation:none;} .slot .lt{animation:none;}
    .btn:active,.key:active{transform:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="toolbar">
    <div class="brand"><span class="mark"></span>Balloon Pop <small>word guessing game</small></div>
    <div class="spacer"></div>
    <button class="btn" id="restartBtn" style="display:none"><span class="ic">↺</span>Same word</button>
    <button class="btn primary" id="newBtn"><span class="ic">＋</span>New word</button>
  </header>

  <!-- SETUP -->
  <section class="view show" id="setup">
    <div class="setup-card">
      <h1>Set a secret word</h1>
      <p class="lead">One person types a word or short phrase. It stays hidden so the class can't peek — then everyone guesses letters before the balloons pop.</p>

      <div class="field">
        <label for="secret">Secret word or phrase</label>
        <div class="secret-row">
          <input id="secret" type="password" autocomplete="off" autocapitalize="characters"
                 spellcheck="false" placeholder="• • • • • •" aria-label="Secret word, hidden">
          <button class="peek" id="peekBtn" type="button" title="Hold to reveal for yourself" aria-label="Show or hide the word">👁</button>
        </div>
        <div class="hide-note">🔒 Hidden as you type. Tap 👁 to check it yourself before starting.</div>
      </div>

      <div class="field">
        <label for="clue">Clue for guessers (optional)</label>
        <input id="clue" class="clue-input" type="text" autocomplete="off" spellcheck="false"
               placeholder="e.g. a kind of animal">
      </div>

      <div class="err" id="err"></div>
      <button class="btn primary go" id="startBtn">Start game →</button>
    </div>
  </section>

  <!-- PLAY -->
  <section class="view" id="play">
    <div class="playtop">
      <div class="clue-chip" id="clueChip"></div>
      <div class="lives"><span>Balloons left</span> <b id="livesNum">6</b> / 6</div>
    </div>
    <div class="balloons" id="balloons"></div>
    <div class="stage">
      <div class="msg" id="msg"></div>
      <div class="word" id="word"></div>
    </div>
    <div class="keyboard" id="keyboard"></div>
  </section>
</div>

<script>
(function(){
  const MAX = 6;
  const BALLOON_COLORS = ['#c43d35','#e0982e','#3f9e6b','#2f6f9f','#b9781f','#1f3d35'];
  const ROWS = ['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];

  // elements
  const $ = id=>document.getElementById(id);
  const setupView=$('setup'), playView=$('play');
  const secretIn=$('secret'), clueIn=$('clue'), errEl=$('err');
  const balloonsEl=$('balloons'), wordEl=$('word'), msgEl=$('msg'),
        kbEl=$('keyboard'), clueChip=$('clueChip'), livesNum=$('livesNum');
  const restartBtn=$('restartBtn'), newBtn=$('newBtn');

  // state
  let secret='', clue='', guessed=new Set(), wrong=0, status='setup';

  /* ----- setup ----- */
  let revealed=false;
  $('peekBtn').addEventListener('click', ()=>{
    revealed=!revealed;
    secretIn.type = revealed ? 'text' : 'password';
    $('peekBtn').classList.toggle('on', revealed);
    secretIn.focus();
  });
  secretIn.addEventListener('keydown', e=>{ if(e.key==='Enter') startGame(); });
  clueIn.addEventListener('keydown', e=>{ if(e.key==='Enter') startGame(); });
  $('startBtn').addEventListener('click', startGame);

  function startGame(){
    const raw = secretIn.value.trim();
    if(!/[a-zA-Z]/.test(raw)){ errEl.textContent='Please enter a word with at least one letter.'; return; }
    if(raw.length>40){ errEl.textContent='Keep it under 40 characters.'; return; }
    errEl.textContent='';
    secret = raw.toUpperCase();
    clue = clueIn.value.trim();
    guessed = new Set();
    wrong = 0;
    status = 'playing';
    showPlay();
  }

  function showSetup(){
    status='setup';
    setupView.classList.add('show'); playView.classList.remove('show');
    restartBtn.style.display='none';
    secretIn.value=''; clueIn.value=''; errEl.textContent='';
    revealed=false; secretIn.type='password'; $('peekBtn').classList.remove('on');
    secretIn.focus();
  }

  /* ----- play ----- */
  function showPlay(){
    setupView.classList.remove('show'); playView.classList.add('show');
    restartBtn.style.display='';
    buildBalloons();
    buildKeyboard();
    clueChip.innerHTML = clue ? '<span>Clue</span>'+escapeHtml(clue) : '';
    render();
  }

  function buildBalloons(){
    balloonsEl.innerHTML='';
    for(let i=0;i<MAX;i++){
      const b=document.createElement('div');
      b.className='balloon float b'+i;
      b.style.color=BALLOON_COLORS[i%BALLOON_COLORS.length];
      b.innerHTML='<div class="body" style="background:'+BALLOON_COLORS[i%BALLOON_COLORS.length]+'"></div><div class="string"></div>';
      balloonsEl.appendChild(b);
    }
  }

  function buildKeyboard(){
    kbEl.innerHTML='';
    ROWS.forEach(row=>{
      const r=document.createElement('div'); r.className='krow';
      row.split('').forEach(ch=>{
        const k=document.createElement('button');
        k.className='key'; k.textContent=ch; k.dataset.k=ch;
        k.addEventListener('click', ()=>guess(ch));
        r.appendChild(k);
      });
      kbEl.appendChild(r);
    });
  }

  function guess(ch){
    if(status!=='playing') return;
    ch=ch.toUpperCase();
    if(guessed.has(ch)) return;
    guessed.add(ch);
    if(!secret.includes(ch)){
      // pop a balloon
      const idx = MAX-1-wrong;           // pop from the right
      wrong++;
      const bEl = balloonsEl.children[idx];
      if(bEl){ bEl.classList.remove('float'); bEl.classList.add('popped');
        setTimeout(()=>bEl.classList.add('gone'),340); }
    }
    checkEnd();
    render();
  }

  function isWon(){
    for(const c of secret){ if(/[A-Z]/.test(c) && !guessed.has(c)) return false; }
    return true;
  }

  function checkEnd(){
    if(isWon()) status='won';
    else if(wrong>=MAX) status='lost';
  }

  function render(){
    livesNum.textContent = MAX - wrong;
    livesNum.style.color = (MAX-wrong)<=2 ? 'var(--danger)' : 'var(--accent-deep)';

    // word
    wordEl.innerHTML='';
    for(const c of secret){
      if(c===' '){ const g=document.createElement('span'); g.className='wgap'; wordEl.appendChild(g); continue; }
      const slot=document.createElement('span'); slot.className='slot';
      if(/[A-Z]/.test(c)){
        if(guessed.has(c)) slot.innerHTML='<span class="lt">'+c+'</span>';
        else if(status==='lost'){ slot.classList.add('missed'); slot.textContent=c; }
        else slot.innerHTML='&nbsp;';
      }else{ slot.classList.add('punct'); slot.textContent=c; }
      wordEl.appendChild(slot);
    }

    // keyboard states
    kbEl.querySelectorAll('.key').forEach(k=>{
      const ch=k.dataset.k; const used=guessed.has(ch);
      k.classList.toggle('hit', used && secret.includes(ch));
      k.classList.toggle('miss', used && !secret.includes(ch));
      k.disabled = used || status!=='playing';
    });

    // message
    msgEl.className='msg';
    if(status==='won'){ msgEl.classList.add('win'); msgEl.textContent='🎉 Solved it! Every balloon survived'+(wrong?' but '+wrong:'')+(wrong? (wrong===1?' pop.':' pops.'):'.'); }
    else if(status==='lost'){ msgEl.classList.add('lose'); msgEl.textContent='💥 All balloons popped — the word was revealed.'; }
    else msgEl.textContent='Guess a letter';
  }

  function restartSame(){
    if(!secret) return;
    guessed=new Set(); wrong=0; status='playing';
    buildBalloons(); buildKeyboard(); render();
  }

  function escapeHtml(s){ return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  newBtn.addEventListener('click', showSetup);
  restartBtn.addEventListener('click', restartSame);

  // physical keyboard for guessing
  document.addEventListener('keydown', e=>{
    if(status!=='playing') return;
    if(document.activeElement===secretIn || document.activeElement===clueIn) return;
    if(/^[a-zA-Z]$/.test(e.key)) guess(e.key);
  });

  showSetup();
})();
</script>
</body>
</html>
