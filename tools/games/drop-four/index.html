<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A big, tap-to-play four-in-a-row game for the classroom smart board — drop your discs down the columns and connect four before your opponent. Works offline.">
<meta name="theme-color" content="#1f3d35">
<title>Drop Four</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23e0982e'/%3E%3C/svg%3E">
<style>
  :root{
    --app-bg:#e9edf0; --panel:#fff; --panel-2:#f4f6f8; --room-bg:#f7f8f6;
    --ink:#16241f; --muted:#67756f; --line:#d8dee2; --grid-line:rgba(31,61,53,.07);
    --board:#1f3d35; --board-2:#173029; --board-line:#2c5247;
    --accent:#e0982e; --accent-soft:#fbe6c8; --accent-deep:#b9781f;
    --danger:#c43d35; --danger-soft:#f7e0de; --together:#2f6f9f; --together-soft:#dde9f3;
    --ok:#3f9e6b;
    --shadow:0 1px 2px rgba(20,40,33,.06),0 6px 18px rgba(20,40,33,.06);
    --shadow-sm:0 1px 2px rgba(20,40,33,.10); --radius:12px;
    --sans:ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    /* player colours */
    --p1:#c43d35;   /* red  */
    --p2:#e0982e;   /* amber/yellow */
  }
  *{box-sizing:border-box;} html,body{height:100%;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--app-bg);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;overflow:hidden;}
  button{font-family:inherit;}
  :focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:6px;}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ── toolbar ── */
  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:11px 20px;
    background:var(--panel);border-bottom:1px solid var(--line);flex:none;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:13px;color:var(--ink);white-space:nowrap;}
  .brand .mark{width:16px;height:16px;border-radius:4px;background:var(--accent);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);flex:none;}
  .brand small{font-weight:500;letter-spacing:.02em;text-transform:none;color:var(--muted);font-size:11px;}
  .spacer{flex:1;}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:11px 18px;
    border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;display:inline-flex;
    align-items:center;gap:8px;transition:background .12s,border-color .12s,transform .05s;}
  .btn:hover{background:var(--panel-2);} .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--board);border-color:var(--board);color:#fff;}
  .btn.primary:hover{background:var(--board-2);}
  .btn[disabled]{opacity:.45;cursor:not-allowed;}
  .btn .ic{font-size:18px;line-height:1;}

  /* ── scoreboard ── */
  .scorebar{display:flex;align-items:stretch;justify-content:center;gap:14px;flex:none;
    padding:13px 20px;background:var(--room-bg);border-bottom:1px solid var(--line);}
  .score{display:flex;align-items:center;gap:14px;background:var(--panel);border:2px solid var(--line);
    border-radius:14px;padding:9px 22px;min-width:230px;transition:border-color .15s,box-shadow .15s;}
  .score.turn{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .score .chip{width:38px;height:38px;border-radius:50%;flex:none;box-shadow:inset 0 -3px 5px rgba(0,0,0,.28),inset 0 2px 3px rgba(255,255,255,.35);}
  .score.p1 .chip{background:radial-gradient(circle at 36% 30%, #e2776e, var(--p1) 58%, #9e2d26);}
  .score.p2 .chip{background:radial-gradient(circle at 36% 30%, #f2c479, var(--p2) 58%, var(--accent-deep));}
  .score .meta{display:flex;flex-direction:column;gap:2px;}
  .score .name{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  .score .wins{font-family:var(--mono);font-size:32px;font-weight:700;line-height:1;color:var(--ink);}
  .vs{display:flex;align-items:center;font-size:13px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);}

  /* ── stage ── */
  .stage{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:14px 18px;gap:clamp(10px,2vh,18px);}
  .status{font-size:clamp(18px,3.2vh,28px);font-weight:700;min-height:1.2em;text-align:center;}
  .status b.p1{color:var(--p1);} .status b.p2{color:var(--accent-deep);}
  .status .sub{color:var(--muted);font-weight:600;}

  /* ── board ── */
  .board{
    width:min(92vw, calc(68vh * 7 / 6));
    aspect-ratio:7 / 6;
    background:var(--board);border-radius:18px;padding:clamp(8px,1.5vmin,18px);
    display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);
    gap:clamp(4px,1vmin,12px);overflow:hidden;
    box-shadow:0 12px 36px rgba(20,40,33,.30), inset 0 0 0 2px var(--board-line);}
  .cell{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;
    -webkit-tap-highlight-color:transparent;transition:background .1s;}
  .cell.colhover{background:rgba(255,255,255,.06);border-radius:8px;}
  .board.over .cell{cursor:default;}
  .disc{width:84%;aspect-ratio:1/1;border-radius:50%;background:#eceeec;
    box-shadow:inset 0 4px 7px rgba(0,0,0,.30), inset 0 -2px 3px rgba(255,255,255,.4);}
  .disc.p1{background:radial-gradient(circle at 36% 30%, #e2776e, var(--p1) 58%, #9e2d26);
    box-shadow:inset 0 -5px 8px rgba(0,0,0,.30), inset 0 3px 4px rgba(255,255,255,.34);}
  .disc.p2{background:radial-gradient(circle at 36% 30%, #f2c479, var(--p2) 58%, var(--accent-deep));
    box-shadow:inset 0 -5px 8px rgba(0,0,0,.30), inset 0 3px 4px rgba(255,255,255,.40);}
  .disc.ghost{opacity:.45;}
  .cell.drop .disc{animation:drop4 .42s linear both;}
  @keyframes drop4{
    0%{ transform:translateY(calc(var(--fall,6) * -118%)); animation-timing-function:cubic-bezier(.45,0,.9,.55); }
    68%{ transform:translateY(0); }
    81%{ transform:translateY(-7%); animation-timing-function:ease-in; }
    100%{ transform:translateY(0); }
  }
  .cell.win .disc{box-shadow:0 0 0 4px rgba(255,255,255,.92), 0 0 16px rgba(255,255,255,.6),
    inset 0 -5px 8px rgba(0,0,0,.28);animation:winpulse 1s ease-in-out infinite;}
  @keyframes winpulse{0%,100%{box-shadow:0 0 0 4px rgba(255,255,255,.92),0 0 14px rgba(255,255,255,.5);}
    50%{box-shadow:0 0 0 5px rgba(255,255,255,1),0 0 22px rgba(255,255,255,.8);}}
  .board.over .cell:not(.win) .disc{opacity:.5;}

  @media (prefers-reduced-motion:reduce){
    .cell.drop .disc{animation:none;} .cell.win .disc{animation:none;} .btn:active{transform:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="toolbar">
    <div class="brand"><span class="mark"></span>Drop Four <small>connect four to win</small></div>
    <div class="spacer"></div>
    <button class="btn" id="fsBtn" aria-pressed="false" title="Toggle full screen"><span class="ic">⛶</span><span class="fs-label">Full screen</span></button>
    <button class="btn" id="soundBtn" aria-pressed="false"><span class="ic">🔈</span>Sound</button>
    <button class="btn" id="undoBtn"><span class="ic">↶</span>Undo</button>
    <button class="btn" id="resetScoreBtn"><span class="ic">⟲</span>Reset scores</button>
    <button class="btn primary" id="newBtn"><span class="ic">＋</span>New round</button>
  </header>

  <section class="scorebar">
    <div class="score p1 turn" id="scoreP1">
      <span class="chip"></span>
      <div class="meta"><span class="name">Red</span><span class="wins" id="winsP1">0</span></div>
    </div>
    <div class="vs">vs</div>
    <div class="score p2" id="scoreP2">
      <span class="chip"></span>
      <div class="meta"><span class="name">Yellow</span><span class="wins" id="winsP2">0</span></div>
    </div>
  </section>

  <main class="stage">
    <div class="status" id="status"><b class="p1">Red</b> to move <span class="sub">— drop a disc</span></div>
    <div class="board" id="board" aria-label="Drop Four board"></div>
  </main>
</div>

<script>
(function(){
  const COLS=7, ROWS=6;

  const boardEl=document.getElementById('board');
  const statusEl=document.getElementById('status');
  const winsP1El=document.getElementById('winsP1'), winsP2El=document.getElementById('winsP2');
  const scoreP1El=document.getElementById('scoreP1'), scoreP2El=document.getElementById('scoreP2');
  const undoBtn=document.getElementById('undoBtn');
  const $ = id=>document.getElementById(id);

  // state
  let board, turn, over, history, winCells, hoverCol, lastDrop;
  let wins={P1:0, P2:0};
  const NAME={P1:'Red', P2:'Yellow'};
  const CLS ={P1:'p1', P2:'p2'};

  // build cells once  (row 0 = top, row 5 = bottom)
  const cellEls=[];
  for(let r=0;r<ROWS;r++){
    const row=[];
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');
      cell.className='cell'; cell.dataset.r=r; cell.dataset.c=c;
      const disc=document.createElement('div'); disc.className='disc';
      cell.appendChild(disc);
      cell.addEventListener('click', ()=>drop(c));
      cell.addEventListener('mouseenter', ()=>{ hoverCol=c; render(); });
      boardEl.appendChild(cell);
      row.push(cell);
    }
    cellEls.push(row);
  }
  boardEl.addEventListener('mouseleave', ()=>{ hoverCol=null; render(); });

  function reset(){
    board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    turn='P1'; over=false; history=[]; winCells=[]; hoverCol=null; lastDrop=null;
    render();
  }

  function lowestEmpty(c){
    for(let r=ROWS-1;r>=0;r--) if(board[r][c]===null) return r;
    return -1;
  }

  function drop(c){
    if(over) return;
    const r=lowestEmpty(c);
    if(r<0) return;                       // column full
    board[r][c]=turn;
    history.push({r,c});
    lastDrop={r,c};
    sfx('drop', r);

    const line=winningLine(r,c,turn);
    if(line){
      over=true; winCells=line; wins[turn]++;
      winsP1El.textContent=wins.P1; winsP2El.textContent=wins.P2;
      render(); sfx('win'); return;
    }
    if(board.every(row=>row.every(v=>v!==null))){
      over=true; render(); statusEl.innerHTML="It's a draw <span class=\"sub\">— board full</span>"; return;
    }
    turn = turn==='P1' ? 'P2' : 'P1';
    render();
  }

  // collect the run of ≥4 through (r,c) for `player`, or null
  function winningLine(r,c,player){
    const dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(const [dr,dc] of dirs){
      const cells=[[r,c]];
      for(let s=1;s<4;s++){ const nr=r+dr*s, nc=c+dc*s; if(at(nr,nc)===player) cells.push([nr,nc]); else break; }
      for(let s=1;s<4;s++){ const nr=r-dr*s, nc=c-dc*s; if(at(nr,nc)===player) cells.push([nr,nc]); else break; }
      if(cells.length>=4) return cells;
    }
    return null;
  }
  function at(r,c){ return (r>=0&&r<ROWS&&c>=0&&c<COLS) ? board[r][c] : null; }

  function undo(){
    if(!history.length) return;
    const {r,c}=history.pop();
    board[r][c]=null;
    over=false; winCells=[]; lastDrop=null;
    // whoever's disc we just removed is up again
    turn = (history.length % 2 === 0) ? 'P1' : 'P2';
    render();
  }

  function render(){
    const winSet = new Set(winCells.map(([r,c])=>r+'-'+c));
    boardEl.classList.toggle('over', over);

    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const cell=cellEls[r][c], disc=cell.firstChild, v=board[r][c];
      let cls='cell';
      if(!over && hoverCol===c) cls+=' colhover';
      if(winSet.has(r+'-'+c)) cls+=' win';
      if(lastDrop && lastDrop.r===r && lastDrop.c===c){ cls+=' drop'; cell.style.setProperty('--fall', r+1); }
      else cell.style.removeProperty('--fall');
      cell.className=cls;

      // disc: filled, ghost-preview, or empty
      let dcls='disc';
      if(v){ dcls+=' '+CLS[v]; }
      else if(!over && hoverCol===c && r===lowestEmpty(c)){ dcls+=' '+CLS[turn]+' ghost'; }
      disc.className=dcls;
    }

    scoreP1El.classList.toggle('turn', !over && turn==='P1');
    scoreP2El.classList.toggle('turn', !over && turn==='P2');

    if(!over){
      const cls=CLS[turn];
      statusEl.innerHTML='<b class="'+cls+'">'+NAME[turn]+'</b> to move <span class="sub">— drop a disc</span>';
    }else if(winCells.length){
      const w=history.length? board[winCells[0][0]][winCells[0][1]] : turn;
      const cls=CLS[w];
      statusEl.innerHTML='<b class="'+cls+'">'+NAME[w]+'</b> connects four — wins!';
    }
    undoBtn.disabled = history.length===0;
  }

  function resetScores(){ wins={P1:0,P2:0}; winsP1El.textContent='0'; winsP2El.textContent='0'; reset(); }

  /* ----- full screen ----- */
  const fsBtn=$('fsBtn');
  function fsOn(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
  function toggleFs(){
    if(fsOn()){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
    else{ const el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen).call(el); }
  }
  function syncFs(){
    const on=fsOn();
    fsBtn.setAttribute('aria-pressed', on?'true':'false');
    fsBtn.querySelector('.fs-label').textContent = on?'Exit full screen':'Full screen';
  }
  fsBtn.addEventListener('click', ()=>{ toggleFs(); fsBtn.blur(); });
  document.addEventListener('fullscreenchange', syncFs);
  document.addEventListener('webkitfullscreenchange', syncFs);

  /* ----- sound (off by default; WebAudio blips, no files) ----- */
  let audioCtx=null, soundOn=false;
  function ensureAudio(){
    if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx=null; } }
    if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
  }
  function tone(freq,dur,type,gain,delay){
    if(!soundOn || !audioCtx) return;
    const t=audioCtx.currentTime + (delay||0);
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(gain||0.12, t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+dur+0.02);
  }
  function sfx(name, r){
    if(!soundOn) return;
    if(name==='drop'){ const f=300 - (r||0)*18; tone(f,0.09,'sine',0.16); tone(f*0.5,0.12,'triangle',0.1,0.02); }
    else if(name==='win'){ [523,659,784,1047].forEach((f,i)=>tone(f,0.16,'triangle',0.15,i*0.09)); }
  }
  $('soundBtn').addEventListener('click', ()=>{
    soundOn=!soundOn; ensureAudio();
    const b=$('soundBtn'); b.setAttribute('aria-pressed', soundOn);
    b.classList.toggle('primary', soundOn);
    b.querySelector('.ic').textContent = soundOn ? '🔊' : '🔈';
    b.blur();
  });

  // wiring
  $('newBtn').addEventListener('click', ()=>{ reset(); $('newBtn').blur(); });
  undoBtn.addEventListener('click', ()=>{ undo(); undoBtn.blur(); });
  $('resetScoreBtn').addEventListener('click', ()=>{ resetScores(); $('resetScoreBtn').blur(); });

  // keyboard: 1-7 drop in a column, U undo, R new round, F full screen
  document.addEventListener('keydown', e=>{
    if(/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)) return;
    if(e.key>='1' && e.key<='7'){ drop(Number(e.key)-1); }
    else if(e.key==='u'||e.key==='U'){ undo(); }
    else if(e.key==='r'||e.key==='R'){ reset(); }
    else if(e.key==='f'||e.key==='F'){ toggleFs(); }
  });

  reset();
})();
</script>
</body>
</html>
