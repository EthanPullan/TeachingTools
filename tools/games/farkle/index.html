<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Farkle — a two-player press-your-luck dice game for the classroom smart board. Roll six dice, set aside the ones that score, and bank before you Farkle.">
<meta name="theme-color" content="#1f3d35">
<title>Farkle</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23e0982e'/%3E%3C/svg%3E">
<style>
  :root{
    --app-bg:#e9edf0; --panel:#fff; --panel-2:#f4f6f8; --room-bg:#f7f8f6;
    --ink:#16241f; --muted:#67756f; --line:#d8dee2; --grid-line:rgba(31,61,53,.07);
    --board:#1f3d35; --board-2:#173029; --board-line:#2c5247;
    --accent:#e0982e; --accent-soft:#fbe6c8; --accent-deep:#b9781f;
    --danger:#c43d35; --danger-soft:#f7e0de; --together:#2f6f9f; --together-soft:#dde9f3;
    --ok:#3f9e6b;
    --shadow:0 1px 2px rgba(20,40,33,.06),0 6px 18px rgba(20,40,33,.06);
    --shadow-sm:0 1px 2px rgba(20,40,33,.10); --radius:12px;
    --sans:ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    /* player colours */
    --p1:#2f6f9f; --p1-soft:#dde9f3;
    --p2:#c43d35; --p2-soft:#f7e0de;
  }
  *{box-sizing:border-box;} html,body{height:100%;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--app-bg);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;overflow:hidden;}
  button{font-family:inherit;} input{font-family:inherit;color:var(--ink);}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:6px;}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ── toolbar ── */
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:9px 16px;
    background:var(--panel);border-bottom:1px solid var(--line);flex:none;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:13px;color:var(--ink);white-space:nowrap;}
  .brand .mark{width:16px;height:16px;border-radius:4px;background:var(--accent);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);flex:none;}
  .brand small{font-weight:500;letter-spacing:.02em;text-transform:none;color:var(--muted);font-size:11px;}
  .spacer{flex:1;}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:10px 15px;
    border-radius:9px;cursor:pointer;font-size:14px;font-weight:600;display:inline-flex;
    align-items:center;gap:7px;transition:background .12s,border-color .12s,transform .05s;white-space:nowrap;}
  .btn:hover{background:var(--panel-2);} .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--board);border-color:var(--board);color:#fff;}
  .btn.primary:hover{background:var(--board-2);}
  .btn[disabled]{opacity:.4;cursor:not-allowed;}
  .btn .ic{font-size:16px;line-height:1;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .seg button{border:none;background:#fff;padding:8px 13px;cursor:pointer;font-size:13px;font-weight:700;
    color:var(--muted);font-family:var(--mono);}
  .seg button.active{background:var(--board);color:#fff;}
  .seg .lab{display:flex;align-items:center;padding:0 10px;font-size:10.5px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);background:var(--panel-2);}

  /* ── scoreboard ── */
  .scorebar{display:flex;align-items:stretch;justify-content:center;gap:clamp(10px,2vw,22px);flex:none;
    padding:12px 18px;background:var(--room-bg);border-bottom:1px solid var(--line);}
  .score{display:flex;align-items:center;gap:14px;background:var(--panel);border:2px solid var(--line);
    border-radius:14px;padding:9px 18px;min-width:clamp(230px,30vw,340px);transition:border-color .15s,box-shadow .15s;}
  .score.turn.p1{border-color:var(--p1);box-shadow:0 0 0 3px var(--p1-soft);}
  .score.turn.p2{border-color:var(--p2);box-shadow:0 0 0 3px var(--p2-soft);}
  .score .glyph{width:46px;height:46px;flex:none;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:800;font-size:26px;color:#fff;}
  .score.p1 .glyph{background:var(--p1);} .score.p2 .glyph{background:var(--p2);}
  .score .meta{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1;}
  .score .pname{border:none;background:none;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);padding:2px 0;width:100%;border-radius:4px;}
  .score .pname:hover{color:var(--ink);} .score .pname:focus{outline:none;color:var(--ink);background:var(--panel-2);padding-left:5px;}
  .score .row{display:flex;align-items:baseline;gap:10px;}
  .score .total{font-family:var(--mono);font-size:clamp(30px,4.6vh,44px);font-weight:800;line-height:1;color:var(--ink);}
  .score .turn-add{font-family:var(--mono);font-size:clamp(14px,2.2vh,19px);font-weight:700;min-height:1em;}
  .score.p1 .turn-add{color:var(--p1);} .score.p2 .turn-add{color:var(--p2);}
  .vs{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .vs .target{font-family:var(--mono);font-size:11px;color:var(--accent-deep);}

  /* ── stage ── */
  .stage{flex:1;min-height:0;display:flex;flex-direction:column;align-items:stretch;padding:14px clamp(14px,3vw,40px) 16px;gap:12px;}
  .status{font-size:clamp(16px,2.8vh,26px);font-weight:700;text-align:center;min-height:1.3em;}
  .status b.p1{color:var(--p1);} .status b.p2{color:var(--p2);}
  .status .warn{color:var(--danger);}

  .tray-rim{flex:1;min-height:0;border-radius:24px;padding:clamp(10px,1.8vw,20px);position:relative;
    background:linear-gradient(150deg,#7a5530,#4a3018 55%,#34210f);
    box-shadow:0 20px 40px rgba(0,0,0,.32), inset 0 2px 3px rgba(255,255,255,.22), inset 0 -3px 6px rgba(0,0,0,.4);}
  .felt{position:absolute;inset:clamp(10px,1.8vw,20px);border-radius:15px;overflow:hidden;
    background:radial-gradient(120% 90% at 50% 30%, #338058 0%, #246048 45%, #163f30 100%);
    box-shadow:inset 0 0 50px rgba(0,0,0,.55), inset 0 3px 10px rgba(0,0,0,.4);}
  .felt::before{content:"";position:absolute;inset:0;opacity:.5;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1.4px);background-size:7px 7px;}
  .felt.farkle{animation:farkleFlash .42s ease 2;}
  @keyframes farkleFlash{50%{box-shadow:inset 0 0 70px rgba(196,61,53,.85), inset 0 0 0 4px rgba(196,61,53,.6);}}
  .dice{position:absolute;inset:0;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;
    gap:clamp(10px,1.8vw,22px);padding:clamp(18px,3.5vh,44px);overflow:auto;}
  .die{cursor:pointer;transform:rotate(var(--rot,0deg));transition:transform .12s,filter .12s;
    width:clamp(60px,8.6vw,124px);height:clamp(60px,8.6vw,124px);flex:none;position:relative;}
  .die svg{width:100%;height:100%;filter:drop-shadow(0 5px 7px rgba(0,0,0,.4));display:block;}
  .die.pick:hover{transform:rotate(var(--rot,0deg)) translateY(-4px) scale(1.04);}
  .die.sel{transform:rotate(0deg) translateY(-10px) scale(1.06);}
  .die.sel svg{filter:drop-shadow(0 8px 10px rgba(0,0,0,.4));}
  .die.sel::after{content:"";position:absolute;inset:-7px;border-radius:16px;
    box-shadow:0 0 0 4px var(--accent);pointer-events:none;}
  .die.roll{animation:tumble .72s both;}
  @keyframes tumble{
    0%{transform:translateY(-155%) rotate(-400deg) scale(.6);opacity:0;animation-timing-function:cubic-bezier(.45,.05,.95,.4);}
    20%{opacity:1;}
    52%{transform:translateY(9%) rotate(12deg) scale(1.1);animation-timing-function:cubic-bezier(.2,.85,.3,1);}
    70%{transform:translateY(-6%) rotate(-6deg) scale(.96);}
    86%{transform:translateY(3%) rotate(2deg) scale(1.01);}
    100%{transform:translateY(0) rotate(var(--rot,0deg)) scale(1);opacity:1;}
  }
  .felt.rollable{cursor:pointer;}
  .tray-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.62);font-size:clamp(15px,2.4vh,21px);font-weight:600;text-align:center;padding:30px;pointer-events:none;}

  /* kept-this-turn strip */
  .kept-bar{flex:none;display:flex;align-items:center;gap:12px;min-height:clamp(48px,8vh,72px);
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 14px;}
  .kept-bar .klabel{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
  .kept{flex:1;display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-width:0;}
  .kept .die{width:clamp(34px,4vw,52px);height:clamp(34px,4vw,52px);cursor:default;transform:none;opacity:.92;}
  .kept .die svg{filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));}
  .kept-empty{color:var(--muted);font-size:13px;font-style:italic;}
  .turn-tally{font-family:var(--mono);font-weight:800;font-size:clamp(18px,3vh,26px);color:var(--board);white-space:nowrap;}
  .turn-tally span{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;text-align:right;}

  /* controls */
  .controls{flex:none;display:flex;gap:clamp(8px,1.4vw,14px);justify-content:center;flex-wrap:wrap;}
  .controls .btn{font-size:clamp(15px,2.4vh,19px);padding:14px clamp(16px,2.4vw,30px);border-radius:12px;}
  .btn.go{background:var(--accent);border-color:var(--accent);color:#5a3d12;}
  .btn.go:hover{background:var(--accent-deep);border-color:var(--accent-deep);color:#fff;}
  .btn.bank{background:var(--ok);border-color:var(--ok);color:#fff;}
  .btn.bank:hover{filter:brightness(1.06);}

  /* winner overlay */
  .winner{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
    background:rgba(20,40,33,.55);backdrop-filter:blur(2px);}
  .winner.show{display:flex;animation:fade .2s ease both;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .winner-card{background:var(--panel);border-radius:22px;box-shadow:0 24px 60px rgba(0,0,0,.4);
    padding:clamp(26px,5vh,50px) clamp(30px,6vw,76px);text-align:center;max-width:92vw;border-top:8px solid var(--accent);
    animation:popcard .32s cubic-bezier(.2,.8,.3,1.2) both;}
  @keyframes popcard{from{opacity:0;transform:scale(.82) translateY(10px);}to{opacity:1;transform:none;}}
  .winner-card .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .winner-card .who{margin:8px 0 6px;font-size:clamp(34px,8vh,84px);font-weight:800;line-height:1.05;}
  .winner-card .who.p1{color:var(--p1);} .winner-card .who.p2{color:var(--p2);}
  .winner-card .sub{font-size:clamp(15px,2.4vh,20px);color:var(--muted);font-weight:600;}
  .winner-card .btn{margin-top:22px;font-size:16px;padding:12px 26px;}

  .confetti{position:fixed;inset:0;pointer-events:none;z-index:45;overflow:hidden;}
  .confetti i{position:absolute;top:-20px;width:10px;height:16px;border-radius:2px;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

  @media (max-width:880px){
    .scorebar{flex-wrap:wrap;} .vs{order:-1;width:100%;flex-direction:row;gap:8px;}
    .controls .btn{flex:1;justify-content:center;}
  }
  @media (prefers-reduced-motion:reduce){
    .die.roll{animation:none;} .felt.farkle{animation:none;} .confetti{display:none;}
    .btn:active{transform:none;} .winner.show,.winner-card{animation:none;}
  }
</style>
</head>
<body>
<!-- shared gradient defs for dice faces -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs id="diceDefs"></defs></svg>

<div class="app">
  <header class="toolbar">
    <div class="brand"><span class="mark"></span>Farkle <small>press your luck</small></div>
    <div class="spacer"></div>
    <button class="btn" id="fsBtn" aria-pressed="false" title="Toggle full screen"><span class="ic">⛶</span><span class="fs-label">Full screen</span></button>
    <div class="seg" id="targetSeg">
      <span class="lab">First to</span>
      <button data-t="2500">2,500</button>
      <button data-t="5000">5,000</button>
      <button data-t="10000" class="active">10,000</button>
    </div>
    <button class="btn" id="soundBtn" aria-pressed="false"><span class="ic">🔈</span>Sound</button>
    <button class="btn primary" id="newBtn"><span class="ic">＋</span>New game</button>
  </header>

  <section class="scorebar">
    <div class="score p1 turn" id="sc0">
      <span class="glyph">1</span>
      <div class="meta">
        <input class="pname" id="nm0" value="Player 1" maxlength="18" aria-label="Player 1 name">
        <div class="row"><span class="total" id="tot0">0</span><span class="turn-add" id="add0"></span></div>
      </div>
    </div>
    <div class="vs">vs<span class="target" id="targetLbl">to 10,000</span></div>
    <div class="score p2" id="sc1">
      <span class="glyph">2</span>
      <div class="meta">
        <input class="pname" id="nm1" value="Player 2" maxlength="18" aria-label="Player 2 name">
        <div class="row"><span class="total" id="tot1">0</span><span class="turn-add" id="add1"></span></div>
      </div>
    </div>
  </section>

  <main class="stage">
    <div class="status" id="status"></div>
    <div class="tray-rim">
      <div class="felt" id="felt">
        <div class="dice" id="tray"></div>
        <div class="tray-empty" id="trayEmpty"></div>
      </div>
    </div>
    <div class="kept-bar">
      <span class="klabel">Set aside</span>
      <div class="kept" id="kept"></div>
      <div class="turn-tally"><span>This turn</span><b id="turnTally">0</b></div>
    </div>
    <div class="controls">
      <button class="btn go" id="rollBtn"><span class="ic">🎲</span>Roll</button>
      <button class="btn" id="setBtn">Set aside &amp; roll</button>
      <button class="btn bank" id="bankBtn">Bank</button>
    </div>
  </main>
</div>

<!-- winner overlay -->
<div class="winner" id="winner">
  <div class="winner-card">
    <div class="eyebrow">Game over</div>
    <div class="who" id="winnerName">—</div>
    <div class="sub" id="winnerSub"></div>
    <button class="btn primary" id="winNew">Play again</button>
  </div>
</div>
<div class="confetti" id="confetti" aria-hidden="true"></div>

<script>
/* ===========================================================================
   FARKLE — a two-player press-your-luck dice game.

   The script is split into four self-contained modules so the engine can be
   reused for other dice games with different rules or special weighted dice:
     1. DICE ENGINE  — rendering + rolling of dice (faces/weights are data)
     2. RULESET      — pure scoring logic, fully described by a data object
     3. GAME STATE   — the turn/round state machine (no DOM)
     4. UI           — wires the modules to the DOM
   To make a variant, swap the RULESET object and the per-die specs; the
   engine, state machine and UI stay the same.
   =========================================================================== */
(function(){
  const $=id=>document.getElementById(id);

  /* =========================================================================
     1. DICE ENGINE
     ========================================================================= */
  const COLOR={4:'#2f6f9f',6:'#f1ead9',8:'#3f9e6b',10:'#c43d35',12:'#7a52a3',20:'#e0982e',100:'#4a7c9b'};
  const SHAPE={
    4:'50,8 92,86 8,86', 8:'50,6 90,50 50,94 10,50', 10:'50,6 88,40 50,96 12,40',
    12:'50,5 94,40 77,93 23,93 6,40', 20:'50,5 90,28 90,72 50,95 10,72 10,28', 100:'50,6 88,40 50,96 12,40'
  };
  const PIPS={
    1:[[50,50]], 2:[[33,33],[67,67]], 3:[[33,33],[50,50],[67,67]],
    4:[[33,33],[67,33],[33,67],[67,67]], 5:[[33,33],[67,33],[50,50],[33,67],[67,67]],
    6:[[33,32],[33,50],[33,68],[67,32],[67,50],[67,68]]
  };
  const clampc=v=>Math.max(0,Math.min(255,Math.round(v)));
  function shade(hex,amt){
    const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    if(amt>=0){ r+=(255-r)*amt; g+=(255-g)*amt; b+=(255-b)*amt; } else { r*=(1+amt); g*=(1+amt); b*=(1+amt); }
    return '#'+[clampc(r),clampc(g),clampc(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  (function buildDefs(){
    let s='';
    Object.keys(COLOR).forEach(t=>{
      s+=`<linearGradient id="g${t}" x1="0" y1="0" x2="1" y2="1">`
       + `<stop offset="0" stop-color="${shade(COLOR[t],0.34)}"/>`
       + `<stop offset="0.55" stop-color="${COLOR[t]}"/>`
       + `<stop offset="1" stop-color="${shade(COLOR[t],-0.28)}"/></linearGradient>`;
    });
    $('diceDefs').innerHTML=s;
  })();
  // A die is described by a spec: {sides, faces:[...], weights:[...]|null}.
  // Standard Farkle uses a uniform six-sided die; a variant could supply
  // custom faces or weights here without touching anything else.
  const D6={sides:6, faces:[1,2,3,4,5,6], weights:null};
  function rollDie(spec){
    const faces=spec.faces||[1,2,3,4,5,6], w=spec.weights;
    if(!w) return faces[Math.floor(Math.random()*faces.length)];
    const sum=w.reduce((a,b)=>a+b,0); let r=Math.random()*sum;
    for(let i=0;i<faces.length;i++){ r-=w[i]; if(r<0) return faces[i]; }
    return faces[faces.length-1];
  }
  function rndRot(){ return (Math.random()*22-11).toFixed(1)+'deg'; }
  function dieSVG(type, content){
    const stroke=shade(COLOR[type],-0.4); let inner='';
    if(type===6){
      inner=`<rect x="14" y="14" width="72" height="72" rx="13" fill="url(#g6)" stroke="${stroke}" stroke-width="2"/>`
          + `<ellipse cx="40" cy="34" rx="20" ry="10" fill="#fff" opacity="0.16"/>`;
      if(typeof content==='number'){
        const dark=shade(COLOR[6],-0.78);
        inner+=(PIPS[content]||[]).map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="7.4" fill="${dark}"/>`).join('');
      } else { inner+=`<text x="50" y="50" text-anchor="middle" dominant-baseline="central" font-weight="800" font-size="30" fill="${shade(COLOR[6],-0.7)}">${content}</text>`; }
      return `<svg viewBox="0 0 100 100">${inner}</svg>`;
    }
    inner=`<polygon points="${SHAPE[type]}" fill="url(#g${type})" stroke="${stroke}" stroke-width="2" stroke-linejoin="round"/>`
        + `<ellipse cx="44" cy="32" rx="18" ry="9" fill="#fff" opacity="0.14"/>`;
    const txt=String(content), fs=txt.length>=3?26:txt.length===2?34:40, cy=type===4?64:52;
    inner+=`<text x="50" y="${cy}" text-anchor="middle" dominant-baseline="central" font-weight="800" font-size="${fs}" fill="#fff" stroke="rgba(0,0,0,.18)" stroke-width="0.6" paint-order="stroke">${txt}</text>`;
    return `<svg viewBox="0 0 100 100">${inner}</svg>`;
  }

  /* =========================================================================
     2. RULESET — pure scoring, described entirely by data.
     ========================================================================= */
  const RULES_STANDARD={
    id:'standard', name:'Farkle', diceCount:6, target:10000,
    openingScore:0,   // minimum turn points needed to first get "on the board" (0 = off)
    hotDice:true,     // set aside all six → roll all six again, points carry
    finalRound:true,  // when a player hits the target the other gets one last turn
    singles:{1:100, 5:50},
    triple:{1:1000, 2:200, 3:300, 4:400, 5:500, 6:600}, // three of a kind, by face
    manyOfKind:{4:1000, 5:2000, 6:3000},                // four / five / six of a kind (flat)
    straight:1500,    // 1-2-3-4-5-6
    threePairs:1500
  };

  // Score a chosen set of dice values. Returns {points, valid} where `valid`
  // means every selected die is consumed by a scoring combo (Farkle requires
  // the dice you set aside to all score).
  function scoreSelection(values, R){
    const n=values.length;
    if(n===0) return {points:0, valid:false};
    const cnt={}; values.forEach(v=>cnt[v]=(cnt[v]||0)+1);
    // straight (needs all six distinct)
    if(n===6 && [1,2,3,4,5,6].every(f=>cnt[f]===1)) return {points:R.straight, valid:true};
    // three pairs (exactly three faces appearing twice)
    if(n===6){
      const counts=Object.values(cnt);
      if(counts.length===3 && counts.every(c=>c===2)) return {points:R.threePairs, valid:true};
    }
    let pts=0, used=0;
    for(let f=1;f<=6;f++){
      let c=cnt[f]||0; if(!c) continue;
      if(c>=3){
        pts += c>=4 ? R.manyOfKind[c] : R.triple[f];
        used += c; c=0;
      }
      if(c>0 && R.singles[f]){ pts += R.singles[f]*c; used += c; }
      // any remaining of a non-single face stay unused → selection invalid
    }
    return {points:pts, valid: used===n};
  }
  // Does this roll contain ANY scoring dice? (false ⇒ Farkle)
  function hasAnyScore(values, R){
    const cnt={}; values.forEach(v=>cnt[v]=(cnt[v]||0)+1);
    if(cnt[1]||cnt[5]) return true;                       // any 1 or 5
    for(let f=1;f<=6;f++){ if((cnt[f]||0)>=3) return true; } // any triple+
    if(values.length===6){
      if([1,2,3,4,5,6].every(f=>cnt[f]===1)) return true;   // straight
      const counts=Object.values(cnt);
      if(counts.length===3 && counts.every(c=>c===2)) return true; // three pairs
    }
    return false;
  }

  /* =========================================================================
     3. GAME STATE — turn/round machine (no DOM access).
     ========================================================================= */
  const RULES=RULES_STANDARD;
  const players=[
    {name:'Player 1', total:0, onBoard:false, dice:Array.from({length:RULES.diceCount},()=>D6)},
    {name:'Player 2', total:0, onBoard:false, dice:Array.from({length:RULES.diceCount},()=>D6)}
  ];
  let target=RULES.target;
  let cur=0;                 // current player index
  let turnPoints=0;          // points banked into the current turn so far
  let dice=[];               // [{id, spec, value, state:'idle'|'active'|'selected'|'kept', rot, fresh}]
  let phase='idle';          // idle | select | hotdice | farkle | over
  let finalTrigger=-1;       // index of first player to reach target (-1 = none)
  let farkleTimer=null;

  function startTurn(){
    turnPoints=0; phase='idle';
    dice=players[cur].dice.map((spec,i)=>({id:i, spec, value:0, state:'idle', rot:rndRot(), fresh:false}));
    render();
  }
  function newGame(){
    if(farkleTimer){ clearTimeout(farkleTimer); farkleTimer=null; }
    players.forEach(p=>{ p.total=0; p.onBoard=false; });
    cur=0; finalTrigger=-1; hideWinner();
    startTurn();
  }

  const activeDice=()=>dice.filter(d=>d.state==='active'||d.state==='selected');
  const selectedDice=()=>dice.filter(d=>d.state==='selected');

  // derived view of the current selection
  function selInfo(){
    const vals=selectedDice().map(d=>d.value);
    const res=scoreSelection(vals, RULES);
    return {count:vals.length, points:res.points, valid:res.valid && res.points>0};
  }

  function roll(){
    if(phase!=='idle' && phase!=='hotdice') return;
    ensureAudio();
    let n=0;
    dice.forEach(d=>{ if(d.state!=='kept'){ d.value=rollDie(d.spec); d.state='active'; d.fresh=true; n++; } });
    clack(Math.min(n,6));
    if(!hasAnyScore(activeDice().map(d=>d.value), RULES)){ phase='select'; render(); return farkle(); }
    phase='select'; render();
  }

  function toggleSelect(id){
    if(phase!=='select') return;
    const d=dice.find(x=>x.id===id); if(!d) return;
    if(d.state==='active') d.state='selected';
    else if(d.state==='selected') d.state='active';
    render();
  }

  function setAsideAndRoll(){
    if(phase!=='select') return;
    const s=selInfo(); if(!s.valid) return;
    turnPoints += s.points;
    dice.forEach(d=>{ if(d.state==='selected') d.state='kept'; });
    const remaining=dice.filter(d=>d.state==='active');
    if(remaining.length===0){            // hot dice — all six scored
      if(RULES.hotDice){ dice.forEach(d=>d.state='idle'); phase='hotdice'; render(); }
      else { bank(); }
      return;
    }
    ensureAudio();
    remaining.forEach(d=>{ d.value=rollDie(d.spec); d.fresh=true; });
    clack(Math.min(remaining.length,6));
    if(!hasAnyScore(remaining.map(d=>d.value), RULES)){ render(); return farkle(); }
    render();
  }

  function bank(){
    if(phase!=='select' && phase!=='hotdice') return;
    const s=selInfo();
    if(phase==='select' && s.count>0){
      if(!s.valid) return;               // can't bank an invalid pick
      turnPoints += s.points;
      dice.forEach(d=>{ if(d.state==='selected') d.state='kept'; });
    }
    if(turnPoints<=0) return;
    const p=players[cur];
    if(RULES.openingScore>0 && !p.onBoard && turnPoints<RULES.openingScore){
      // not enough to get on the board — points are lost
    } else {
      p.onBoard=true; p.total+=turnPoints;
      if(p.total>=target && finalTrigger<0) finalTrigger=cur;
    }
    endTurn();
  }

  function farkle(){
    phase='farkle';
    if($('felt')){ $('felt').classList.remove('farkle'); void $('felt').offsetWidth; $('felt').classList.add('farkle'); }
    render();
    farkleTimer=setTimeout(()=>{ turnPoints=0; endTurn(); }, 1500);
  }

  function endTurn(){
    if(farkleTimer){ clearTimeout(farkleTimer); farkleTimer=null; }
    // final round: if someone hit the target and the OTHER player just finished, game over
    if(finalTrigger>=0 && cur!==finalTrigger) return gameOver();
    cur=1-cur; startTurn();
  }

  function gameOver(){
    phase='over'; render();
    showWinner();
  }

  /* =========================================================================
     4. UI
     ========================================================================= */
  const fmt=n=>n.toLocaleString();
  const tag=i=>`<b class="p${i+1}">${escapeHtml(players[i].name||('Player '+(i+1)))}</b>`;
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function render(){
    // scoreboard
    for(let i=0;i<2;i++){
      $('tot'+i).textContent=fmt(players[i].total);
      $('sc'+i).classList.toggle('turn', cur===i && phase!=='over');
      const add=$('add'+i);
      add.textContent = (cur===i && turnPoints>0 && phase!=='over') ? ('+'+fmt(turnPoints)) : '';
    }
    // tray (active + selected dice) and kept strip
    $('felt').classList.toggle('rollable', phase==='idle'||phase==='hotdice');
    const tray=$('tray'); tray.innerHTML='';
    const inPlay=dice.filter(d=>d.state==='active'||d.state==='selected');
    $('trayEmpty').style.display = inPlay.length ? 'none' : 'flex';
    $('trayEmpty').innerHTML = phase==='idle'
      ? `${tag(cur)} — press <b>Roll</b> or tap the table to throw the dice`
      : (phase==='hotdice' ? `🔥 Hot dice! Tap the table or press <b>Roll</b> for all six again, or <b>Bank</b>` : '');
    inPlay.forEach((d,i)=>{
      const el=document.createElement('div');
      el.className='die pick'+(d.state==='selected'?' sel':'')+(d.fresh?' roll':'');
      el.style.setProperty('--rot', d.rot);
      if(d.fresh) el.style.animationDelay=(i%8*0.05)+'s';
      el.innerHTML=dieSVG(6, d.value);
      el.addEventListener('click',()=>toggleSelect(d.id));
      tray.appendChild(el);
      d.fresh=false;
    });
    const kept=$('kept'); kept.innerHTML='';
    const keptDice=dice.filter(d=>d.state==='kept');
    if(!keptDice.length){ kept.innerHTML='<span class="kept-empty">nothing set aside yet</span>'; }
    else keptDice.forEach(d=>{ const el=document.createElement('div'); el.className='die'; el.innerHTML=dieSVG(6,d.value); kept.appendChild(el); });

    const s=selInfo();
    $('turnTally').textContent=fmt(turnPoints + (s.valid?s.points:0));

    // controls
    const rollBtn=$('rollBtn'), setBtn=$('setBtn'), bankBtn=$('bankBtn');
    rollBtn.disabled = !(phase==='idle'||phase==='hotdice');
    rollBtn.querySelector('.ic').textContent = phase==='hotdice' ? '🔥' : '🎲';
    rollBtn.lastChild.nodeValue = phase==='hotdice' ? 'Roll again' : 'Roll';
    setBtn.disabled = !(phase==='select' && s.valid);
    setBtn.textContent = s.valid ? `Set aside +${fmt(s.points)} & roll` : 'Set aside & roll';
    const bankVal = turnPoints + (s.valid?s.points:0);
    const badPick = phase==='select' && s.count>0 && !s.valid;
    bankBtn.disabled = !((phase==='select'||phase==='hotdice') && bankVal>0 && !badPick);
    bankBtn.textContent = bankVal>0 ? `Bank ${fmt(bankVal)}` : 'Bank';

    // status line
    const st=$('status');
    if(phase==='idle') st.innerHTML=`${tag(cur)} — roll to start the turn`;
    else if(phase==='hotdice') st.innerHTML=`🔥 Hot dice, ${tag(cur)}! Roll all six again or bank ${fmt(turnPoints)}`;
    else if(phase==='farkle') st.innerHTML=`<span class="warn">💀 Farkle! ${tag(cur)} scores nothing this turn.</span>`;
    else if(phase==='over') st.innerHTML='';
    else { // select
      if(badPick) st.innerHTML=`<span class="warn">Those dice don’t all score — adjust your pick.</span>`;
      else if(s.count>0) st.innerHTML=`${tag(cur)}: keep going or bank. Selected <b>+${fmt(s.points)}</b>.`;
      else st.innerHTML=`${tag(cur)} — tap the dice that score, then set aside or bank`;
    }
  }

  /* winner overlay + confetti */
  function showWinner(){
    let wi;
    if(players[0].total>players[1].total) wi=0;
    else if(players[1].total>players[0].total) wi=1;
    else wi=-1;
    const w=$('winner');
    if(wi<0){
      $('winnerName').textContent='It’s a tie!';
      $('winnerName').className='who';
      $('winnerSub').textContent=`Both players have ${fmt(players[0].total)}. Play again to break it.`;
    } else {
      $('winnerName').textContent=(players[wi].name||('Player '+(wi+1)))+' wins!';
      $('winnerName').className='who p'+(wi+1);
      $('winnerSub').innerHTML=`${fmt(players[wi].total)} vs ${fmt(players[1-wi].total)} — first past ${fmt(target)}.`;
      burstConfetti();
    }
    w.classList.add('show');
  }
  function hideWinner(){ $('winner').classList.remove('show'); }
  function burstConfetti(){
    const wrap=$('confetti'); const colors=['#2f6f9f','#3f9e6b','#e0982e','#c43d35','#7a52a3','#b9781f'];
    for(let i=0;i<80;i++){
      const c=document.createElement('i');
      c.style.left=Math.random()*100+'vw';
      c.style.background=colors[i%colors.length];
      c.style.animationDuration=(2.4+Math.random()*1.8)+'s';
      c.style.animationDelay=(Math.random()*0.3)+'s';
      c.style.width=(7+Math.random()*7)+'px'; c.style.height=(10+Math.random()*8)+'px';
      c.style.transform='rotate('+(Math.random()*360)+'deg)';
      wrap.appendChild(c); setTimeout(()=>c.remove(),4600);
    }
  }

  /* sound (WebAudio noise 'clack', no files) */
  let actx=null, soundOn=false;
  function ensureAudio(){ if(soundOn && !actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
  function clack(n){
    if(!soundOn||!actx) return;
    for(let i=0;i<n;i++){
      const t=actx.currentTime+i*0.05+Math.random()*0.03, dur=0.05;
      const buf=actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate), data=buf.getChannelData(0);
      for(let s=0;s<data.length;s++){ data[s]=(Math.random()*2-1)*Math.pow(1-s/data.length,2); }
      const src=actx.createBufferSource(); src.buffer=buf;
      const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1400+Math.random()*900; bp.Q.value=1.2;
      const g=actx.createGain(); g.gain.value=0.18;
      src.connect(bp); bp.connect(g); g.connect(actx.destination); src.start(t);
    }
  }

  /* events */
  $('rollBtn').addEventListener('click',roll);
  $('felt').addEventListener('click',()=>{ if(phase==='idle'||phase==='hotdice') roll(); });
  $('setBtn').addEventListener('click',setAsideAndRoll);
  $('bankBtn').addEventListener('click',bank);
  $('newBtn').addEventListener('click',()=>{
    if((players[0].total>0||players[1].total>0||turnPoints>0||phase!=='idle') && phase!=='over'){
      if(!confirm('Start a new game? Current scores will be cleared.')) return;
    }
    newGame();
  });
  $('winNew').addEventListener('click',newGame);
  $('nm0').addEventListener('input',e=>{ players[0].name=e.target.value; render(); });
  $('nm1').addEventListener('input',e=>{ players[1].name=e.target.value; render(); });
  // prevent name fields from swallowing the space/enter shortcuts unintentionally — they only fire when not focused
  $('targetSeg').addEventListener('click',e=>{
    const b=e.target.closest('button[data-t]'); if(!b) return;
    const t=+b.dataset.t;
    if((players[0].total>0||players[1].total>0) && phase!=='over' && !confirm('Change the target and start a new game?')) return;
    target=t;
    [...$('targetSeg').querySelectorAll('button')].forEach(x=>x.classList.toggle('active',x===b));
    $('targetLbl').textContent='to '+fmt(t);
    newGame();
  });
  $('soundBtn').addEventListener('click',()=>{
    soundOn=!soundOn; ensureAudio();
    const b=$('soundBtn'); b.setAttribute('aria-pressed',soundOn); b.classList.toggle('primary',soundOn);
    b.querySelector('.ic').textContent = soundOn ? '🔊' : '🔈';
  });

  /* full screen */
  const fsBtn=$('fsBtn');
  function fsOn(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
  function toggleFs(){
    if(fsOn()){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
    else{ const el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen).call(el); }
  }
  function syncFs(){
    const on=fsOn();
    fsBtn.setAttribute('aria-pressed', on?'true':'false');
    fsBtn.querySelector('.fs-label').textContent = on?'Exit full screen':'Full screen';
  }
  fsBtn.addEventListener('click', toggleFs);
  document.addEventListener('fullscreenchange', syncFs);
  document.addEventListener('webkitfullscreenchange', syncFs);

  document.addEventListener('keydown',e=>{
    if(/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)) return;
    if(e.key==='f'||e.key==='F'){ toggleFs(); return; }
    if($('winner').classList.contains('show')){ if(e.key==='Enter'){ e.preventDefault(); newGame(); } return; }
    if(e.code==='Space'){ e.preventDefault();
      if(phase==='idle'||phase==='hotdice') roll();
      else if(phase==='select' && selInfo().valid) setAsideAndRoll();
    } else if(e.key==='Enter'){ e.preventDefault(); bank(); }
  });

  newGame();
})();
</script>
</body>
</html>
