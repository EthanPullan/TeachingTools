<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A big, tap-to-play Super (Ultimate) Tic-Tac-Toe board for the classroom smart board — your move sends the next player to a matching mini-board.">
<meta name="theme-color" content="#1f3d35">
<title>Super Tic-Tac-Toe</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23e0982e'/%3E%3C/svg%3E">
<style>
  :root{
    --app-bg:#e9edf0; --panel:#fff; --panel-2:#f4f6f8; --room-bg:#f7f8f6;
    --ink:#16241f; --muted:#67756f; --line:#d8dee2; --grid-line:rgba(31,61,53,.07);
    --board:#1f3d35; --board-2:#173029; --board-line:#2c5247;
    --accent:#e0982e; --accent-soft:#fbe6c8; --accent-deep:#b9781f;
    --danger:#c43d35; --danger-soft:#f7e0de; --together:#2f6f9f; --together-soft:#dde9f3;
    --ok:#3f9e6b;
    --shadow:0 1px 2px rgba(20,40,33,.06),0 6px 18px rgba(20,40,33,.06);
    --shadow-sm:0 1px 2px rgba(20,40,33,.10); --radius:12px;
    --sans:ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    /* player colors */
    --x:#2f6f9f;   /* blue X */
    --o:#c43d35;   /* red O */
  }
  *{box-sizing:border-box;} html,body{height:100%;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--app-bg);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;overflow:hidden;}
  button{font-family:inherit;}
  :focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:6px;}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ── toolbar ── */
  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:11px 20px;
    background:var(--panel);border-bottom:1px solid var(--line);flex:none;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:13px;color:var(--ink);white-space:nowrap;}
  .brand .mark{width:16px;height:16px;border-radius:4px;background:var(--accent);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);flex:none;}
  .brand small{font-weight:500;letter-spacing:.02em;text-transform:none;color:var(--muted);font-size:11px;}
  .spacer{flex:1;}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:11px 18px;
    border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;display:inline-flex;
    align-items:center;gap:8px;transition:background .12s,border-color .12s,transform .05s;}
  .btn:hover{background:var(--panel-2);} .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--board);border-color:var(--board);color:#fff;}
  .btn.primary:hover{background:var(--board-2);}
  .btn[disabled]{opacity:.45;cursor:not-allowed;}
  .btn .ic{font-size:18px;line-height:1;}

  /* ── status strip ── */
  .statusbar{display:flex;align-items:center;justify-content:center;gap:12px;flex:none;
    padding:12px 20px;background:var(--room-bg);border-bottom:1px solid var(--line);
    font-size:clamp(16px,2.6vh,24px);font-weight:700;}
  .turnchip{display:inline-flex;align-items:center;justify-content:center;
    width:1.7em;height:1.7em;border-radius:9px;font-family:var(--mono);font-weight:800;
    color:#fff;font-size:1em;}
  .turnchip.x{background:var(--x);} .turnchip.o{background:var(--o);}
  .status b.x{color:var(--x);} .status b.o{color:var(--o);}
  .status .sub{color:var(--muted);font-weight:600;}

  /* ── stage / mega board ── */
  .stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:18px;}
  .mega{
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    gap:clamp(6px,1.1vmin,12px);
    width:min(92vw, calc(100vh - 200px), 96vh);
    aspect-ratio:1/1;
    background:var(--board);padding:clamp(6px,1.1vmin,12px);
    border-radius:22px;box-shadow:0 10px 34px rgba(20,40,33,.28);}

  /* a mini board */
  .mini{position:relative;background:var(--panel);border-radius:12px;padding:clamp(4px,.7vmin,8px);
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    gap:clamp(3px,.55vmin,7px);
    box-shadow:0 0 0 3px transparent;transition:box-shadow .15s,background .15s;}
  /* the coloured box showing where the next move must go */
  .mini.active{box-shadow:0 0 0 4px var(--accent);background:var(--accent-soft);}
  .mega.next-x .mini.active{box-shadow:0 0 0 5px var(--x);background:rgba(47,111,159,.12);}
  .mega.next-o .mini.active{box-shadow:0 0 0 5px var(--o);background:rgba(196,61,53,.12);}
  .mini.decided{background:var(--panel-2);}

  /* translucent winner marker over a captured mini board */
  .mini .claim{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:800;line-height:1;pointer-events:none;
    font-size:min(28vmin,calc(96vh/3.4));z-index:2;
    animation:claimPop .28s cubic-bezier(.2,.7,.3,1) both;}
  .mini .claim.x{color:rgba(47,111,159,.42);}
  .mini .claim.o{color:rgba(196,61,53,.42);}
  @keyframes claimPop{from{opacity:0;transform:scale(.55);}to{opacity:1;transform:none;}}

  /* individual cells */
  .cell{border:none;background:var(--panel-2);border-radius:7px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:800;line-height:1;
    font-size:clamp(16px,5.4vmin,64px);color:var(--ink);
    transition:background .1s,transform .06s;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  .mini.active .cell.open:hover{background:#fff;}
  .mega.next-x .mini.active .cell.open:hover{box-shadow:inset 0 0 0 3px var(--x);}
  .mega.next-o .mini.active .cell.open:hover{box-shadow:inset 0 0 0 3px var(--o);}
  .cell:active.open{transform:scale(.94);}
  .cell.x{color:var(--x);} .cell.o{color:var(--o);}
  .cell:not(.open){cursor:default;}
  .cell .glyph{animation:drop .2s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes drop{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:none;}}
  /* preview of whose mark would drop */
  .mini.active .cell.open:hover::after{content:attr(data-next);opacity:.25;position:absolute;}
  .mega.next-x .mini.active .cell.open:hover::after{color:var(--x);}
  .mega.next-o .mini.active .cell.open:hover::after{color:var(--o);}

  @media (prefers-reduced-motion:reduce){
    .cell .glyph,.mini .claim{animation:none;} .btn:active,.cell:active{transform:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="toolbar">
    <div class="brand"><span class="mark"></span>Super Tic-Tac-Toe <small>ultimate · tap to play</small></div>
    <div class="spacer"></div>
    <button class="btn" id="undoBtn"><span class="ic">↶</span>Undo</button>
    <button class="btn primary" id="newBtn"><span class="ic">＋</span>New game</button>
  </header>

  <div class="statusbar">
    <span class="turnchip x" id="turnchip">X</span>
    <span class="status" id="status"><b class="x">X</b> to move <span class="sub">— play anywhere</span></span>
  </div>

  <main class="stage">
    <div class="mega next-x" id="mega" aria-label="Super tic-tac-toe board"></div>
  </main>
</div>

<script>
(function(){
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  const megaEl   = document.getElementById('mega');
  const statusEl = document.getElementById('status');
  const chipEl   = document.getElementById('turnchip');
  const undoBtn  = document.getElementById('undoBtn');

  // State
  let boards;        // 9 mini boards, each 9 cells: '', 'X', 'O'
  let winners;       // per mini board: '', 'X', 'O', 'D' (draw/full)
  let turn;          // 'X' | 'O'
  let active;        // forced mini-board index, or null = play anywhere
  let history;       // {b,c,prevActive} for undo

  // Build DOM once: 9 minis, each with 9 cells + a claim overlay.
  const cellEls = [];   // cellEls[b][c]
  const claimEls = [];  // claimEls[b]
  const miniEls = [];
  for(let b=0;b<9;b++){
    const mini = document.createElement('div');
    mini.className = 'mini';
    const claim = document.createElement('span');
    claim.className = 'claim';
    const row = [];
    for(let c=0;c<9;c++){
      const cell = document.createElement('button');
      cell.className = 'cell';
      cell.dataset.b = b; cell.dataset.c = c;
      cell.addEventListener('click', ()=>play(b,c));
      mini.appendChild(cell);
      row.push(cell);
    }
    mini.appendChild(claim);
    megaEl.appendChild(mini);
    cellEls.push(row); claimEls.push(claim); miniEls.push(mini);
  }

  function reset(){
    boards  = Array.from({length:9}, ()=>Array(9).fill(''));
    winners = Array(9).fill('');
    turn = 'X';
    active = null;     // first player may go anywhere
    history = [];
    render();
  }

  // Is this mini board still in play (not won, not full)?
  function playable(b){ return winners[b]===''; }

  function play(b,c){
    if(!playable(b)) return;
    if(active!==null && active!==b) return;   // must play in the forced board
    if(boards[b][c]) return;                  // cell taken

    history.push({b, c, prevActive: active});
    boards[b][c] = turn;

    // did this move capture the mini board?
    const line = miniWin(boards[b]);
    if(line){ winners[b] = turn; }
    else if(boards[b].every(Boolean)){ winners[b] = 'D'; }

    // the cell position c dictates the next forced board.
    active = playable(c) ? c : null;

    turn = turn==='X' ? 'O' : 'X';
    render();
  }

  function miniWin(cells){
    for(const ln of WINS){
      const [a,b2,c2]=ln;
      if(cells[a] && cells[a]===cells[b2] && cells[a]===cells[c2]) return ln;
    }
    return null;
  }

  function undo(){
    if(!history.length) return;
    const {b,c,prevActive} = history.pop();
    boards[b][c] = '';
    winners[b] = '';           // a move can only have created (not removed) a winner
    active = prevActive;
    turn = turn==='X' ? 'O' : 'X';
    render();
  }

  function render(){
    const anyOpen = winners.some((w,i)=>w==='');
    const forcedList = active!==null ? [active]
                     : Array.from({length:9},(_,i)=>i).filter(playable);

    megaEl.classList.toggle('next-x', turn==='X');
    megaEl.classList.toggle('next-o', turn==='O');

    for(let b=0;b<9;b++){
      const decided = winners[b] !== '';
      const isActive = anyOpen && forcedList.includes(b);
      miniEls[b].classList.toggle('active', isActive);
      miniEls[b].classList.toggle('decided', decided);

      // claim overlay (winners only — drawn boards get no marker)
      const cl = claimEls[b];
      if(decided && winners[b]!=='D'){
        cl.textContent = winners[b];
        cl.className = 'claim ' + winners[b].toLowerCase();
      }else{
        cl.textContent = '';
        cl.className = 'claim';
      }

      for(let c=0;c<9;c++){
        const v = boards[b][c];
        const cell = cellEls[b][c];
        const open = isActive && !v;
        cell.classList.toggle('x', v==='X');
        cell.classList.toggle('o', v==='O');
        cell.classList.toggle('open', open);
        cell.disabled = !open;
        if(v){ cell.innerHTML = '<span class="glyph">'+v+'</span>'; }
        else { cell.innerHTML=''; cell.dataset.next = turn; }
      }
    }

    chipEl.textContent = turn;
    chipEl.className = 'turnchip ' + turn.toLowerCase();
    const t = '<b class="'+turn.toLowerCase()+'">'+turn+'</b> to move';
    if(!anyOpen){
      statusEl.innerHTML = 'All boards decided <span class="sub">— press New game</span>';
    }else if(active===null){
      statusEl.innerHTML = t + ' <span class="sub">— play anywhere</span>';
    }else{
      statusEl.innerHTML = t + ' <span class="sub">— play in the highlighted board</span>';
    }
    undoBtn.disabled = history.length===0;
  }

  document.getElementById('newBtn').addEventListener('click', reset);
  undoBtn.addEventListener('click', undo);
  document.addEventListener('keydown', e=>{
    if(e.key==='u'||e.key==='U') undo();
    else if(e.key==='r'||e.key==='R') reset();
  });

  reset();
})();
</script>
</body>
</html>
