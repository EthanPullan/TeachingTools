<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A big, tap-to-play Super (Ultimate) Tic-Tac-Toe board for the classroom smart board — your move sends the next player to a matching mini-board.">
<meta name="theme-color" content="#1f3d35">
<title>Super Tic-Tac-Toe</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23e0982e'/%3E%3C/svg%3E">
<style>
  :root{
    --app-bg:#e9edf0; --panel:#fff; --panel-2:#f4f6f8; --room-bg:#f7f8f6;
    --ink:#16241f; --muted:#67756f; --line:#d8dee2; --grid-line:rgba(31,61,53,.07);
    --board:#1f3d35; --board-2:#173029; --board-line:#2c5247;
    --accent:#e0982e; --accent-soft:#fbe6c8; --accent-deep:#b9781f;
    --danger:#c43d35; --danger-soft:#f7e0de; --together:#2f6f9f; --together-soft:#dde9f3;
    --ok:#3f9e6b;
    --shadow:0 1px 2px rgba(20,40,33,.06),0 6px 18px rgba(20,40,33,.06);
    --shadow-sm:0 1px 2px rgba(20,40,33,.10); --radius:12px;
    --sans:ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    /* player colors */
    --x:#2f6f9f;   /* blue X */
    --o:#c43d35;   /* red O */
  }
  *{box-sizing:border-box;} html,body{height:100%;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--app-bg);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;overflow:hidden;}
  button{font-family:inherit;}
  :focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:6px;}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ── toolbar ── */
  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:11px 20px;
    background:var(--panel);border-bottom:1px solid var(--line);flex:none;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:13px;color:var(--ink);white-space:nowrap;}
  .brand .mark{width:16px;height:16px;border-radius:4px;background:var(--accent);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);flex:none;}
  .brand small{font-weight:500;letter-spacing:.02em;text-transform:none;color:var(--muted);font-size:11px;}
  .spacer{flex:1;}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:11px 18px;
    border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;display:inline-flex;
    align-items:center;gap:8px;transition:background .12s,border-color .12s,transform .05s;}
  .btn:hover{background:var(--panel-2);} .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--board);border-color:var(--board);color:#fff;}
  .btn.primary:hover{background:var(--board-2);}
  .btn[disabled]{opacity:.45;cursor:not-allowed;}
  .btn .ic{font-size:18px;line-height:1;}

  /* ── status strip ── */
  .statusbar{display:flex;align-items:center;justify-content:center;gap:12px;flex:none;
    padding:12px 20px;background:var(--room-bg);border-bottom:1px solid var(--line);
    font-size:clamp(16px,2.6vh,24px);font-weight:700;}
  .turnchip{display:inline-flex;align-items:center;justify-content:center;
    width:1.7em;height:1.7em;border-radius:9px;font-family:var(--mono);font-weight:800;
    color:#fff;font-size:1em;}
  .turnchip.x{background:var(--x);} .turnchip.o{background:var(--o);}
  .status b.x{color:var(--x);} .status b.o{color:var(--o);}
  .status .sub{color:var(--muted);font-weight:600;}

  /* ── stage / mega board ── */
  .stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:18px;}
  .mega{
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    gap:clamp(6px,1.1vmin,12px);
    width:min(92vw, calc(100vh - 200px), 96vh);
    aspect-ratio:1/1;
    background:var(--board);padding:clamp(6px,1.1vmin,12px);
    border-radius:22px;box-shadow:0 10px 34px rgba(20,40,33,.28);}

  /* a mini board */
  .mini{position:relative;background:var(--panel);border-radius:12px;padding:clamp(4px,.7vmin,8px);
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    gap:clamp(3px,.55vmin,7px);
    box-shadow:0 0 0 3px transparent;transition:box-shadow .15s,background .15s;}
  /* the coloured box showing where the next move must go */
  .mini.active{box-shadow:0 0 0 4px var(--accent);background:var(--accent-soft);}
  .mega.next-x .mini.active{box-shadow:0 0 0 5px var(--x);background:rgba(47,111,159,.12);}
  .mega.next-o .mini.active{box-shadow:0 0 0 5px var(--o);background:rgba(196,61,53,.12);}
  .mini.decided{background:var(--panel-2);}

  /* translucent winner marker over a captured mini board */
  .mini .claim{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:800;line-height:1;pointer-events:none;
    font-size:min(28vmin,calc(96vh/3.4));z-index:2;
    animation:claimPop .28s cubic-bezier(.2,.7,.3,1) both;}
  .mini .claim.x{color:rgba(47,111,159,.42);}
  .mini .claim.o{color:rgba(196,61,53,.42);}
  @keyframes claimPop{from{opacity:0;transform:scale(.55);}to{opacity:1;transform:none;}}

  /* individual cells */
  .cell{border:none;background:var(--panel-2);border-radius:7px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:800;line-height:1;
    font-size:clamp(16px,5.4vmin,64px);color:var(--ink);
    transition:background .1s,transform .06s;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  .mini.active .cell.open:hover{background:#fff;}
  .mega.next-x .mini.active .cell.open:hover{box-shadow:inset 0 0 0 3px var(--x);}
  .mega.next-o .mini.active .cell.open:hover{box-shadow:inset 0 0 0 3px var(--o);}
  .cell:active.open{transform:scale(.94);}
  .cell.x{color:var(--x);} .cell.o{color:var(--o);}
  .cell:not(.open){cursor:default;}
  .cell .glyph{animation:drop .2s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes drop{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:none;}}
  /* preview of whose mark would drop */
  .mini.active .cell.open:hover::after{content:attr(data-next);opacity:.25;position:absolute;}
  .mega.next-x .mini.active .cell.open:hover::after{color:var(--x);}
  .mega.next-o .mini.active .cell.open:hover::after{color:var(--o);}

  /* ── segmented controls (toolbar settings) ── */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .seg button{border:none;background:#fff;padding:8px 13px;cursor:pointer;font-size:13px;font-weight:700;
    color:var(--muted);font-family:var(--mono);}
  .seg button.active{background:var(--board);color:#fff;}
  .seg button:disabled{cursor:not-allowed;}
  .seg button:disabled:not(.active){opacity:.4;}
  .seg-input{width:54px;border:none;border-left:1px solid var(--line);background:#fff;
    padding:8px 6px;font-family:var(--mono);font-weight:700;font-size:13px;color:var(--ink);text-align:center;}
  .seg-input::placeholder{color:var(--muted);font-weight:600;}
  .seg-input:focus{outline:none;background:var(--accent-soft);}
  .seg-input.active{background:var(--board);color:#fff;}
  .seg-input.active::placeholder{color:rgba(255,255,255,.7);}
  .seg-input::-webkit-outer-spin-button,.seg-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .seg-input{-moz-appearance:textfield;}
  .seg .lab{display:flex;align-items:center;padding:0 10px;font-size:10.5px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);background:var(--panel-2);}

  /* ── turn-timer pill (in the status strip) ── */
  .turn-timer{display:inline-flex;align-items:baseline;gap:1px;font-family:var(--mono);font-weight:800;
    padding:3px 12px;border-radius:999px;background:var(--panel);border:2px solid var(--line);
    color:var(--ink);font-size:.78em;line-height:1.4;}
  .turn-timer .tt-unit{font-size:.72em;color:var(--muted);font-weight:700;margin-left:1px;}
  .turn-timer.low{border-color:var(--danger);color:var(--danger);background:var(--danger-soft);}
  .turn-timer.low .tt-unit{color:var(--danger);}
  .turn-timer[hidden]{display:none;}
  .turnchip.tie{background:var(--muted);}

  /* ── mega-board win state ── */
  .mini.megawin{box-shadow:0 0 0 5px var(--accent),0 0 26px rgba(224,152,46,.55);}
  .mega.over .mini{transition:opacity .25s,box-shadow .15s;}
  .mega.over .mini:not(.megawin){opacity:.5;}

  @media (prefers-reduced-motion:reduce){
    .cell .glyph,.mini .claim{animation:none;} .btn:active,.cell:active{transform:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="toolbar">
    <div class="brand"><span class="mark"></span>Super Tic-Tac-Toe <small>ultimate · tap to play</small></div>
    <div class="spacer"></div>
    <div class="seg" id="modeSeg"><span class="lab">Win by</span>
      <button data-mode="line" class="active">3 in a row</button>
      <button data-mode="most">5+ boards</button></div>
    <div class="seg" id="redirectSeg"><span class="lab">Won box</span>
      <button data-redirect="free" class="active" title="If you're sent to a board that's already won, play in any open board">Anywhere</button>
      <button data-redirect="forced" title="Always play in the board you're sent to, even if it's already won">Same box</button></div>
    <div class="seg" id="timerSeg"><span class="lab">Turn timer</span>
      <button data-sec="0" class="active">Off</button>
      <button data-sec="5">5s</button>
      <button data-sec="15">15s</button>
      <button data-sec="30">30s</button>
      <input type="number" id="timerCustom" class="seg-input" min="1" max="600" placeholder="…s"
             inputmode="numeric" aria-label="Custom turn timer in seconds" title="Custom seconds"></div>
    <button class="btn" id="fsBtn" aria-pressed="false" title="Toggle full screen"><span class="ic">⛶</span><span class="fs-label">Full screen</span></button>
    <button class="btn" id="undoBtn"><span class="ic">↶</span>Undo</button>
    <button class="btn primary" id="newBtn"><span class="ic">＋</span>New game</button>
  </header>

  <div class="statusbar">
    <span class="turnchip x" id="turnchip">X</span>
    <span class="status" id="status"><b class="x">X</b> to move <span class="sub">— play anywhere</span></span>
    <span class="turn-timer" id="turnTimer" hidden><span class="tt-num">0</span><span class="tt-unit">s</span></span>
  </div>

  <main class="stage">
    <div class="mega next-x" id="mega" aria-label="Super tic-tac-toe board"></div>
  </main>
</div>

<script>
(function(){
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  const MOST_TARGET = 5;   // "win by 5+ boards": first to capture 5 of the 9 big boxes

  const megaEl   = document.getElementById('mega');
  const statusEl = document.getElementById('status');
  const chipEl   = document.getElementById('turnchip');
  const undoBtn  = document.getElementById('undoBtn');

  // State
  let boards;        // 9 mini boards, each 9 cells: '', 'X', 'O'
  let winners;       // per mini board: '', 'X', 'O', 'D' (draw/full)
  let turn;          // 'X' | 'O'
  let active;        // forced mini-board index, or null = play anywhere
  let history;       // {b,c,prevActive} for undo
  let mode = 'line'; // 'line' = 3 big boxes in a row · 'most' = first to 5+ big boxes
  let forced = false;// false = sent to a won box → play anywhere · true = must still play in it
  let result;        // null while playing, else {winner:'X'|'O'|'D', line:number[]|null}

  // Build DOM once: 9 minis, each with 9 cells + a claim overlay.
  const cellEls = [];   // cellEls[b][c]
  const claimEls = [];  // claimEls[b]
  const miniEls = [];
  for(let b=0;b<9;b++){
    const mini = document.createElement('div');
    mini.className = 'mini';
    const claim = document.createElement('span');
    claim.className = 'claim';
    const row = [];
    for(let c=0;c<9;c++){
      const cell = document.createElement('button');
      cell.className = 'cell';
      cell.dataset.b = b; cell.dataset.c = c;
      cell.addEventListener('click', ()=>play(b,c));
      mini.appendChild(cell);
      row.push(cell);
    }
    mini.appendChild(claim);
    megaEl.appendChild(mini);
    cellEls.push(row); claimEls.push(claim); miniEls.push(mini);
  }

  function reset(){
    boards  = Array.from({length:9}, ()=>Array(9).fill(''));
    winners = Array(9).fill('');
    turn = 'X';
    active = null;     // first player may go anywhere
    history = [];
    result = null;
    render();
    startTurnTimer();
  }

  function boardFull(b){ return boards[b].every(Boolean); }
  // A board is "closed" (no token may be placed) when it's full — and, in the default
  // "play anywhere" mode, also once it has been won. In forced mode only full closes it.
  function closed(b){ return boardFull(b) || (!forced && winners[b]!==''); }
  function openForPlay(b){ return !closed(b); }
  function movesRemain(){ for(let b=0;b<9;b++) if(openForPlay(b)) return true; return false; }
  function boardCount(s){ let n=0; for(const w of winners) if(w===s) n++; return n; }

  function play(b,c){
    if(result) return;                        // game already decided
    if(closed(b)) return;                     // board full (or won, in play-anywhere mode)
    if(active!==null && active!==b) return;   // must play in the forced board
    if(boards[b][c]) return;                  // cell taken

    history.push({b, c, prevActive: active});
    boards[b][c] = turn;

    // a board can only be captured once — already-won boards keep their winner
    if(winners[b]===''){
      const line = miniWin(boards[b]);
      if(line){ winners[b] = turn; }
      else if(boardFull(b)){ winners[b] = 'D'; }
    }

    // did the player who just moved win the whole game (or has it ended)?
    result = evaluate(turn);

    // the cell position c dictates the next board; a closed target frees up play.
    active = closed(c) ? null : c;

    if(!result){ turn = turn==='X' ? 'O' : 'X'; }
    render();
    startTurnTimer();
  }

  function miniWin(cells){
    for(const ln of WINS){
      const [a,b2,c2]=ln;
      if(cells[a] && cells[a]===cells[b2] && cells[a]===cells[c2]) return ln;
    }
    return null;
  }

  // Decide whether the game is over. `mover` is the player who just moved.
  function evaluate(mover){
    if(mode==='line'){                         // three captured big boxes in a row
      for(const ln of WINS){
        const [a,b2,c2]=ln;
        if(winners[a]===mover && winners[b2]===mover && winners[c2]===mover)
          return {winner:mover, line:ln};
      }
    }else{                                     // 'most' — first to capture 5+ big boxes
      if(boardCount(mover) >= MOST_TARGET) return {winner:mover, line:null};
    }
    // no legal moves left → settle the game
    if(!movesRemain()){
      if(mode==='most'){
        const x=boardCount('X'), o=boardCount('O');
        if(x>o) return {winner:'X', line:null};
        if(o>x) return {winner:'O', line:null};
      }
      return {winner:'D', line:null};          // a line never formed / boards tied
    }
    return null;
  }

  function undo(){
    if(!history.length) return;
    const {b,c,prevActive} = history.pop();
    boards[b][c] = '';
    winners[b] = '';           // a move can only have created (not removed) a winner
    active = prevActive;
    if(result){
      result = null;           // the move we removed had ended the game; that player moves again
    }else{
      turn = turn==='X' ? 'O' : 'X';
    }
    render();
    startTurnTimer();
  }

  function render(){
    const over = !!result;
    const anyOpen = movesRemain();
    const forcedList = (!over && active!==null) ? [active]
                     : (!over ? Array.from({length:9},(_,i)=>i).filter(openForPlay) : []);
    const winLine = (result && result.line) ? result.line : [];
    syncLocks();

    megaEl.classList.toggle('next-x', !over && turn==='X');
    megaEl.classList.toggle('next-o', !over && turn==='O');
    megaEl.classList.toggle('over', over);

    for(let b=0;b<9;b++){
      const decided = winners[b] !== '';
      const isActive = !over && anyOpen && forcedList.includes(b);
      const isWinBox = over && (winLine.includes(b) ||
        (result.winner!=='D' && result.line===null && winners[b]===result.winner));
      miniEls[b].classList.toggle('active', isActive);
      miniEls[b].classList.toggle('decided', decided);
      miniEls[b].classList.toggle('megawin', isWinBox);

      // claim overlay (winners only — drawn boards get no marker)
      const cl = claimEls[b];
      if(decided && winners[b]!=='D'){
        cl.textContent = winners[b];
        cl.className = 'claim ' + winners[b].toLowerCase();
      }else{
        cl.textContent = '';
        cl.className = 'claim';
      }

      for(let c=0;c<9;c++){
        const v = boards[b][c];
        const cell = cellEls[b][c];
        const open = isActive && !v;
        cell.classList.toggle('x', v==='X');
        cell.classList.toggle('o', v==='O');
        cell.classList.toggle('open', open);
        cell.disabled = !open;
        if(v){ cell.innerHTML = '<span class="glyph">'+v+'</span>'; }
        else { cell.innerHTML=''; cell.dataset.next = turn; }
      }
    }

    if(over){
      if(result.winner==='D'){
        chipEl.textContent = '='; chipEl.className = 'turnchip tie';
        statusEl.innerHTML = "It's a draw <span class=\"sub\">— press New game</span>";
      }else{
        const w = result.winner, wl = w.toLowerCase();
        const how = mode==='line' ? 'three boards in a row' : boardCount(w)+' of 9 boards';
        chipEl.textContent = w; chipEl.className = 'turnchip ' + wl;
        statusEl.innerHTML = '<b class="'+wl+'">'+w+'</b> wins! <span class="sub">— '+how+'</span>';
      }
    }else{
      chipEl.textContent = turn;
      chipEl.className = 'turnchip ' + turn.toLowerCase();
      const t = '<b class="'+turn.toLowerCase()+'">'+turn+'</b> to move';
      if(active===null){
        statusEl.innerHTML = t + ' <span class="sub">— play anywhere</span>';
      }else{
        statusEl.innerHTML = t + ' <span class="sub">— play in the highlighted board</span>';
      }
    }
    undoBtn.disabled = history.length===0;
  }

  /* ===== Reusable turn timer (drop-in, dependency-free) =====
     const t = createTurnTimer({onTick, onExpire});
       t.setDuration(seconds)  // 0 disables the timer
       t.start()               // (re)start the countdown for a turn
       t.stop()                // halt (e.g. on game over)
     onTick(remainingSec|null, durationSec) fires while counting; null = off/cleared.
     onExpire() fires once when the countdown hits 0. */
  function createTurnTimer({onTick, onExpire}={}){
    let duration = 0, deadline = 0, iv = null;
    function clear(){ if(iv){ clearInterval(iv); iv = null; } }
    function tick(){
      const remMs = Math.max(0, deadline - Date.now());
      if(onTick) onTick(Math.ceil(remMs/1000), duration);
      if(remMs<=0){ clear(); if(onExpire) onExpire(); }
    }
    return {
      setDuration(sec){ duration = Math.max(0, Math.floor(sec)||0); },
      getDuration(){ return duration; },
      start(){
        clear();
        if(duration<=0){ if(onTick) onTick(null, 0); return; }
        deadline = Date.now() + duration*1000;
        if(onTick) onTick(duration, duration);
        iv = setInterval(tick, 200);
      },
      stop(){ clear(); }
    };
  }

  const ttEl  = document.getElementById('turnTimer');
  const ttNum = ttEl.querySelector('.tt-num');
  const turnTimer = createTurnTimer({
    onTick(remSec, dur){
      if(remSec===null){ ttEl.hidden = true; return; }
      ttEl.hidden = false;
      ttNum.textContent = remSec;
      ttEl.classList.toggle('low', dur>0 && remSec<=Math.max(3, Math.ceil(dur/4)));
    },
    onExpire(){ autoMove(); }
  });

  // (Re)start the countdown for whoever is to move — or clear it when the game is over.
  function startTurnTimer(){
    if(result){ turnTimer.stop(); ttEl.hidden = true; return; }
    turnTimer.start();   // start() clears the pill itself when the timer is Off
  }

  // Time's up: play a random legal move, with no strategy at all.
  function autoMove(){
    if(result) return;
    const consider = active!==null ? [active]
                   : Array.from({length:9},(_,i)=>i).filter(openForPlay);
    const legal = [];
    for(const b of consider){
      if(!openForPlay(b)) continue;
      for(let c=0;c<9;c++){ if(!boards[b][c]) legal.push([b,c]); }
    }
    if(!legal.length) return;
    const [b,c] = legal[Math.floor(Math.random()*legal.length)];
    play(b,c);
  }

  /* ----- full screen ----- */
  const fsBtn = document.getElementById('fsBtn');
  function fsActive(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
  function toggleFs(){
    if(fsActive()){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
    else{ const el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen).call(el); }
  }
  function syncFs(){
    const on=fsActive();
    fsBtn.setAttribute('aria-pressed', on?'true':'false');
    fsBtn.querySelector('.fs-label').textContent = on?'Exit full screen':'Full screen';
  }
  fsBtn.addEventListener('click', toggleFs);
  document.addEventListener('fullscreenchange', syncFs);
  document.addEventListener('webkitfullscreenchange', syncFs);

  /* ----- settings: win mode · play mode · turn timer ----- */
  // Win mode and play mode lock once the first token is played; New game frees them again.
  function syncLocks(){
    const locked = !!(history && history.length);
    document.querySelectorAll('#modeSeg button, #redirectSeg button')
            .forEach(b=>{ b.disabled = locked; });
  }
  document.querySelectorAll('#modeSeg button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(btn.disabled || btn.dataset.mode===mode) return;
      mode = btn.dataset.mode;
      document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.toggle('active', x===btn));
    });
  });
  document.querySelectorAll('#redirectSeg button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(btn.disabled) return;
      forced = btn.dataset.redirect==='forced';
      document.querySelectorAll('#redirectSeg button').forEach(x=>x.classList.toggle('active', x===btn));
    });
  });

  // turn timer — presets + a custom seconds field (always adjustable)
  const timerCustom = document.getElementById('timerCustom');
  function selectTimer(sec, srcBtn){
    turnTimer.setDuration(sec);
    document.querySelectorAll('#timerSeg button').forEach(x=>x.classList.toggle('active', x===srcBtn));
    timerCustom.classList.toggle('active', srcBtn===null);
    startTurnTimer();                // apply immediately to the current turn
  }
  document.querySelectorAll('#timerSeg button').forEach(btn=>{
    btn.addEventListener('click', ()=> selectTimer(+btn.dataset.sec, btn));
  });
  function applyCustomTimer(){
    let n = parseInt(timerCustom.value, 10);
    if(!Number.isFinite(n) || n<1) return;          // ignore empty / invalid
    n = Math.min(600, n);
    timerCustom.value = n;
    selectTimer(n, null);                           // null source → custom is the active choice
  }
  timerCustom.addEventListener('change', applyCustomTimer);
  timerCustom.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); applyCustomTimer(); timerCustom.blur(); } });
  timerCustom.addEventListener('focus', ()=> timerCustom.select());

  document.getElementById('newBtn').addEventListener('click', reset);
  undoBtn.addEventListener('click', undo);
  document.addEventListener('keydown', e=>{
    if(/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)) return;
    if(e.key==='u'||e.key==='U') undo();
    else if(e.key==='r'||e.key==='R') reset();
    else if(e.key==='f'||e.key==='F') toggleFs();
  });

  reset();
})();
</script>
</body>
</html>
