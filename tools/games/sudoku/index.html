<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A big, tap-to-play Sudoku board for the classroom smart board — drag to select cells, two colours of pencil notes, a built-in timer, and an on-screen number pad.">
<meta name="theme-color" content="#1f3d35">
<title>Sudoku</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23e0982e'/%3E%3C/svg%3E">
<style>
  :root{
    --app-bg:#e9edf0; --panel:#fff; --panel-2:#f4f6f8; --room-bg:#f7f8f6;
    --ink:#16241f; --muted:#67756f; --line:#d8dee2; --grid-line:rgba(31,61,53,.07);
    --board:#1f3d35; --board-2:#173029; --board-line:#2c5247;
    --accent:#e0982e; --accent-soft:#fbe6c8; --accent-deep:#b9781f;
    --danger:#c43d35; --danger-soft:#f7e0de; --together:#2f6f9f; --together-soft:#dde9f3;
    --ok:#3f9e6b;
    --shadow:0 1px 2px rgba(20,40,33,.06),0 6px 18px rgba(20,40,33,.06);
    --shadow-sm:0 1px 2px rgba(20,40,33,.10); --radius:12px;
    --sans:ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;

    /* ── Sudoku-specific tokens ── */
    --grid-soft:#cdd6da;    /* thin line between cells */
    --grid-strong:#8d9aa0;  /* thick line between 3×3 boxes + outer frame */
    --given:#16241f;        /* a clue printed by the puzzle (bold, immovable) */
    --user:#2f7d68;         /* a digit the player entered */
    --note-grey:#9aa4a3;    /* first pencil-note layer — light grey */
    --note-grey-dim:#bdc5c3; /* dimmer grey for a struck (eliminated) note */
    --note-blue:#1668cc;    /* second pencil-note layer — a vivid, visible blue */
    --sel:rgba(224,152,46,.22);   /* selected cell wash (amber) */
    --peer:rgba(31,61,53,.055);   /* row/col/box of the focused cell */
    --hl-cell:rgba(255,206,69,.34);  /* cells holding the highlighted digit (light yellow) */
    --hl-note:#ffe7a0;               /* little light-yellow mark behind a matching note */
    --note-strike:#c43d35;           /* red slash for struck (eliminated) notes */
    --tech:#7a4ea8;                  /* technique highlight (violet, distinct from selection) */
    --tech-key:rgba(122,78,168,.22); /* the cells a technique centres on */
    --tech-unit:rgba(122,78,168,.10);/* the row/col/box a technique lives in */
  }
  *{box-sizing:border-box;} html,body{height:100%;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--app-bg);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;overflow:hidden;}
  button,select{font-family:inherit;}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:6px;}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ── toolbar ── */
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:9px 16px;
    background:var(--panel);border-bottom:1px solid var(--line);flex:none;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:13px;color:var(--ink);white-space:nowrap;}
  .brand .mark{width:16px;height:16px;border-radius:4px;background:var(--accent);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);flex:none;}
  .brand small{font-weight:500;letter-spacing:.02em;text-transform:none;color:var(--muted);font-size:11px;}
  .spacer{flex:1;}

  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:9px 14px;
    border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;display:inline-flex;
    align-items:center;gap:7px;transition:background .12s,border-color .12s,transform .05s;white-space:nowrap;}
  .btn:hover{background:var(--panel-2);} .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--board);border-color:var(--board);color:#fff;}
  .btn.primary:hover{background:var(--board-2);}
  .btn[disabled]{opacity:.4;cursor:not-allowed;}
  .btn .ic{font-size:16px;line-height:1;}

  /* difficulty filter + puzzle picker */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex:none;}
  .seg button{border:none;background:#fff;padding:8px 13px;cursor:pointer;font-size:13px;font-weight:700;
    color:var(--muted);transition:background .12s,color .12s;}
  .seg button:hover{background:var(--panel-2);color:var(--ink);}
  .seg button.active{background:var(--board);color:#fff;}
  .seg .lab{display:flex;align-items:center;padding:0 11px;font-size:10.5px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:var(--panel-2);}
  select.picker{border:1px solid var(--line);border-radius:9px;background:var(--panel-2);
    padding:8px 10px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;max-width:170px;}

  /* ── status strip ── */
  .statusbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex:none;
    padding:9px 16px;background:var(--room-bg);border-bottom:1px solid var(--line);}
  .puz{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14px;}
  .puz .badge{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;padding:3px 9px;border-radius:20px;background:var(--panel);
    border:1px solid var(--line);color:var(--muted);}
  .puz .badge.hard{color:var(--danger);border-color:var(--danger-soft);background:var(--danger-soft);}
  .puz .badge.moderate{color:var(--together);border-color:var(--together-soft);background:var(--together-soft);}
  .puz .badge.expert{color:#7a4ea8;border-color:#e6dcf3;background:#efe8f8;}
  .puz .badge.evil{color:#fff;border-color:var(--board);background:var(--board);}
  .puz .badge.diabolic{color:#fff;border-color:var(--danger);background:var(--danger);}
  .puz .id{font-family:var(--mono);font-size:13px;color:var(--muted);font-weight:600;}
  .pill{font-family:var(--mono);font-size:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:20px;padding:3px 10px;color:var(--muted);}
  .pill.warn{color:var(--danger);border-color:var(--danger-soft);background:var(--danger-soft);}

  /* timer + pause */
  .timer{display:inline-flex;align-items:baseline;gap:1px;font-family:var(--mono);font-weight:800;
    padding:5px 15px;border-radius:999px;background:var(--panel);border:2px solid var(--line);
    color:var(--ink);font-size:clamp(15px,2.3vh,20px);line-height:1.3;}
  .timer.paused{border-color:var(--accent);color:var(--accent-deep);background:var(--accent-soft);}
  .icon-btn{border:1px solid var(--line);background:var(--panel);height:38px;min-width:38px;padding:0 10px;
    border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;
    font-size:15px;font-weight:600;color:var(--ink);transition:background .12s,border-color .12s,transform .05s;}
  .icon-btn:hover{background:var(--panel-2);} .icon-btn:active{transform:translateY(1px);}
  .icon-btn.on{background:var(--board);color:#fff;border-color:var(--board);}

  /* ── stage: board + pad ── */
  .stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;
    gap:clamp(12px,2.4vw,30px);padding:clamp(10px,2vh,22px);}

  .board-area{position:relative;flex:none;}
  .board{
    --bs:min( calc(100dvh - 184px), calc(100vw - 400px) );
    width:var(--bs);height:var(--bs);
    display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);
    background:var(--panel);border:3px solid var(--grid-strong);border-radius:12px;overflow:hidden;
    box-shadow:0 10px 34px rgba(20,40,33,.22);
    touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}

  .cell{position:relative;border-right:1px solid var(--grid-soft);border-bottom:1px solid var(--grid-soft);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:background .08s;background:transparent;}
  .cell.br3{border-right:2.5px solid var(--grid-strong);}   /* right edge of a 3×3 box */
  .cell.bb3{border-bottom:2.5px solid var(--grid-strong);}  /* bottom edge of a 3×3 box */
  .cell:nth-child(9n){border-right:none;}                   /* outer frame handles the far edges */
  .cell:nth-child(n+73){border-bottom:none;}

  /* highlight layers (painted under the digit) */
  .cell.peer{background:var(--peer);}
  .cell.hl-cell{background:var(--hl-cell);}
  .cell.sel{background:var(--sel);box-shadow:inset 0 0 0 2.5px var(--accent);z-index:1;}
  /* in Digit mode the selection recolours by count: 2 cells → blue, 3+ → grey */
  .cell.sel.sel-blue{background:rgba(47,111,159,.18);box-shadow:inset 0 0 0 2.5px var(--note-blue);}
  .cell.sel.sel-grey{background:rgba(141,154,160,.26);box-shadow:inset 0 0 0 2.5px #7e8b87;}
  /* technique highlight (violet): the unit it lives in, and the key cells it centres on */
  .cell.tech-unit{background:var(--tech-unit);}
  .cell.tech{background:var(--tech-key);box-shadow:inset 0 0 0 3px var(--tech);z-index:2;}

  /* the final digit */
  .cell .val{display:none;font-family:var(--mono);font-weight:600;line-height:1;
    font-size:clamp(20px,4.7vmin,54px);color:var(--user);pointer-events:none;}
  .cell.has-val .val{display:flex;}
  .cell.given .val{color:var(--given);font-weight:800;}
  .cell.bad .val{color:var(--danger);}

  /* the two pencil-note layers, laid out 1-9 in a fixed 3×3 grid */
  .cell .notes{display:grid;position:absolute;inset:7%;
    grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    pointer-events:none;}
  .cell.has-val .notes{display:none;}
  .cell .notes span{position:relative;display:flex;align-items:center;justify-content:center;line-height:1;
    font-family:var(--mono);font-weight:600;font-size:clamp(8px,1.7vmin,18px);}
  .cell .notes span.g{color:var(--note-grey);opacity:var(--grey-op,1);}  /* opacity = the "grey" slider */
  .cell .notes span.b{color:var(--note-blue);font-weight:800;}   /* blue note (kept even when struck) */
  .cell .notes span.dim{color:var(--note-grey-dim);opacity:var(--grey-op,1);}   /* struck-only base colour */
  /* strike = an additive red slash over whatever colour the note is, so a blue note can be struck */
  .cell .notes span.struck{opacity:var(--grey-op,1);}   /* the grey slider fades struck notes too */
  .cell .notes span.struck::after{content:'';position:absolute;left:4%;right:4%;top:50%;
    border-top:2px solid var(--note-strike);transform:rotate(-18deg);transform-origin:center;}
  .board.hide-struck .cell .notes span.struck{display:none;}   /* "red strikes" visibility toggle */
  .cell .notes span.hl{background:var(--hl-note);border-radius:3px;}  /* little light-yellow highlight */
  /* a note that auto-clean just removed — flashes red and fades so the player sees it go */
  .cell .notes span.flash{background:none;animation:noteflash .6s ease-out forwards;}
  @keyframes noteflash{
    0%{opacity:1;color:var(--note-strike);transform:scale(1.3);}
    35%{opacity:1;color:var(--note-strike);transform:scale(1.08);}
    100%{opacity:0;color:var(--note-strike);transform:scale(.55);}
  }
  /* auto-completed cell: its digit pops in (staggered by --ad for a cascade) with a green glow */
  .cell.just-auto .val{animation:autoPop .5s cubic-bezier(.2,.7,.3,1) var(--ad,0ms) both;}
  .cell.just-auto{animation:autoGlow .55s ease var(--ad,0ms) both;}
  @keyframes autoPop{0%{transform:scale(.2);opacity:0;}55%{transform:scale(1.2);opacity:1;}100%{transform:scale(1);opacity:1;}}
  @keyframes autoGlow{0%{box-shadow:inset 0 0 0 3px var(--ok);background:rgba(63,158,107,.20);}100%{box-shadow:inset 0 0 0 0 rgba(63,158,107,0);background:transparent;}}

  /* pause / solved cover — hides the board behind a frosted, opaque panel */
  /* ── Techniques menu (popover under the toolbar button) ── */
  .tech-wrap{position:relative;display:inline-flex;}
  .tech-wrap .caret{font-size:11px;color:var(--muted);margin-left:1px;}
  .tech-menu{position:absolute;top:calc(100% + 6px);right:0;z-index:30;min-width:230px;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
    padding:6px;display:flex;flex-direction:column;gap:3px;}
  .tech-menu[hidden]{display:none;}
  .tech-item{display:flex;flex-direction:column;gap:1px;text-align:left;border:none;background:none;
    border-radius:8px;padding:8px 10px;cursor:pointer;}
  .tech-item:hover{background:var(--panel-2);}
  .tech-item .ti-name{font-weight:700;font-size:13.5px;color:var(--ink);display:flex;align-items:center;gap:7px;}
  .tech-item .ti-num{font-family:var(--mono);font-size:11px;color:#fff;background:var(--tech);
    border-radius:6px;min-width:17px;height:17px;display:inline-flex;align-items:center;justify-content:center;}
  .tech-item .ti-sum{font-size:11.5px;color:var(--muted);line-height:1.35;}

  /* ── Technique result card (floats over the bottom of the board) ── */
  .tech-panel{position:absolute;left:10px;right:10px;bottom:10px;z-index:5;
    background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--tech);
    border-radius:12px;box-shadow:0 10px 30px rgba(20,40,33,.22);padding:11px 13px;
    animation:tin .18s ease both;}
  .tech-panel[hidden]{display:none;}
  .tech-panel.at-top{top:10px;bottom:auto;}   /* flip up so it never covers a low finding */
  .tech-panel.empty{border-left-color:var(--muted);}
  @keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .tp-head{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
  .tp-title{font-weight:800;font-size:14px;color:var(--tech);letter-spacing:.01em;}
  .tech-panel.empty .tp-title{color:var(--muted);}
  .tp-close{margin-left:auto;border:none;background:none;cursor:pointer;color:var(--muted);
    font-size:20px;line-height:1;padding:0 4px;border-radius:6px;}
  .tp-close:hover{color:var(--ink);background:var(--panel-2);}
  .tp-text{font-size:13px;color:var(--ink);line-height:1.5;}
  .tp-text b{font-family:var(--mono);color:var(--tech);font-weight:700;}

  .cover{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    border-radius:12px;z-index:6;text-align:center;padding:18px;}
  .cover.show{display:flex;}
  .cover.pause{cursor:pointer;background:rgba(233,237,240,.84);
    -webkit-backdrop-filter:blur(16px) saturate(1.05);backdrop-filter:blur(16px) saturate(1.05);}
  .cover.solved{background:rgba(23,48,41,.30);
    -webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);}
  .cover .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 18px 50px rgba(20,40,33,.30);padding:26px 30px;display:flex;flex-direction:column;
    align-items:center;gap:14px;max-width:88%;}
  .cover .big{font-size:clamp(22px,4vh,34px);font-weight:800;letter-spacing:.01em;display:flex;
    align-items:center;gap:10px;}
  .cover .big .em{font-size:1.25em;}
  .cover.pause .big{color:var(--board);}
  .cover.solved .big{color:var(--ok);}
  .cover .sub{color:var(--muted);font-size:14px;}
  .cover .sub b{font-family:var(--mono);color:var(--ink);font-weight:700;}
  .cover .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

  /* ── number pad ── */
  .pad{flex:none;width:min(340px,40vw);display:flex;flex-direction:column;gap:clamp(8px,1.4vh,14px);}
  .pad-modes{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .mode{border:1.5px solid var(--line);background:var(--panel);border-radius:11px;cursor:pointer;
    padding:9px 3px;display:flex;flex-direction:column;align-items:center;gap:5px;
    font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);
    transition:background .12s,border-color .12s,color .12s,transform .05s;}
  .mode:active{transform:translateY(1px);}
  .mode .dot{width:13px;height:13px;border-radius:50%;position:relative;}
  .mode[data-mode=digit] .dot{background:var(--user);}
  .mode[data-mode=grey]  .dot{background:var(--note-grey);}
  .mode[data-mode=blue]  .dot{background:var(--note-blue);}
  .mode[data-mode=strike] .dot{background:var(--note-grey);}
  .mode[data-mode=strike] .dot::after{content:'';position:absolute;left:-2px;right:-2px;top:50%;
    border-top:2px solid var(--note-strike);transform:rotate(-18deg);}
  .mode.active{color:#fff;}
  .mode.active[data-mode=digit]{background:var(--board);border-color:var(--board);}
  .mode.active[data-mode=grey]{background:var(--note-grey);border-color:var(--note-grey);}
  .mode.active[data-mode=blue]{background:var(--note-blue);border-color:var(--note-blue);}
  .mode.active[data-mode=strike]{background:var(--note-grey);border-color:var(--note-grey);}
  .mode.active .dot{background:#fff;box-shadow:inset 0 0 0 2px rgba(0,0,0,.12);}

  .pad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(7px,1.2vh,12px);}
  .num{position:relative;border:1px solid var(--line);background:var(--panel);border-radius:13px;cursor:pointer;
    aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:700;font-size:clamp(22px,4.6vmin,40px);color:var(--ink);
    box-shadow:var(--shadow-sm);transition:background .1s,border-color .1s,transform .06s,color .1s;}
  .num:hover{background:var(--panel-2);border-color:var(--grid-strong);}
  .num:active{transform:scale(.95);}
  .num .left{position:absolute;right:7px;bottom:5px;font-family:var(--mono);font-size:10.5px;font-weight:700;
    color:var(--muted);opacity:.8;}
  .num.done{color:var(--muted);background:var(--panel-2);}      /* all nine of this digit placed */
  .num.done .left{color:var(--ok);}
  /* pad takes on the active mode's accent so a tap's effect is obvious */
  .pad.m-grey .num:hover{border-color:var(--note-grey);}
  .pad.m-blue .num:hover{border-color:var(--note-blue);}
  .pad.m-strike .num:hover{border-color:var(--note-strike);}

  .pad-actions{display:grid;grid-template-columns:1fr 1fr;gap:clamp(7px,1.2vh,12px);}
  .pad-actions .btn{justify-content:center;padding:12px;font-size:15px;}
  .pad-actions .btn .ic{font-size:18px;}
  .pad-actions .wide{grid-column:1 / -1;}

  /* view options: red-strike visibility + grey-note opacity */
  .pad-opts{display:flex;flex-direction:column;gap:8px;padding-top:10px;border-top:1px solid var(--line);}
  .opt-row{display:flex;align-items:center;gap:10px;}
  .opt-lab{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    width:84px;flex:none;}
  .opt-toggle{border:1px solid var(--line);background:var(--panel-2);color:var(--muted);border-radius:20px;
    padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:background .12s,color .12s,border-color .12s;}
  .opt-toggle.on{background:var(--board);border-color:var(--board);color:#fff;}
  .opt-row input[type=range]{flex:1;accent-color:var(--note-grey);height:18px;}

  .hint{font-size:11.5px;color:var(--muted);line-height:1.45;text-align:center;}

  /* ── responsive: stack the pad under the board on narrow screens ── */
  @media (max-width:900px){
    .stage{flex-direction:column;gap:14px;}
    .board{--bs:min( calc(100dvh - 360px), 94vw );}
    .pad{width:min(440px,94vw);}
    .pad-grid{gap:8px;}
  }
  @media (max-width:680px){
    .toolbar .desk{display:none;}      /* trim long labels on phones */
    .statusbar{gap:8px;}
  }
  @media (prefers-reduced-motion:reduce){
    .num:active,.mode:active,.btn:active,.icon-btn:active{transform:none;}
    .cell .notes span.flash{animation:none;}
    .cell.just-auto,.cell.just-auto .val{animation:none;}
    *{scroll-behavior:auto;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="toolbar">
    <div class="brand"><span class="mark"></span>Sudoku <small class="desk">classroom · notes &amp; timer</small></div>

    <div class="seg" id="diffSeg">
      <span class="lab">Level</span>
      <button data-diff="all" class="active">All</button>
      <button data-diff="moderate">Moderate</button>
      <button data-diff="hard">Hard</button>
      <button data-diff="expert">Expert</button>
      <button data-diff="evil">Evil</button>
      <button data-diff="diabolic">Diabolic</button>
    </div>
    <button class="btn primary" id="newBtn"><span class="ic">＋</span>New puzzle</button>
    <select class="picker" id="picker" aria-label="Choose a specific puzzle"></select>

    <div class="spacer"></div>
    <div class="tech-wrap">
      <button class="btn" id="techBtn" aria-haspopup="true" aria-expanded="false"><span class="ic">🎓</span><span class="desk">Techniques</span><span class="caret">▾</span></button>
      <div class="tech-menu" id="techMenu" role="menu" hidden></div>
    </div>
    <button class="btn" id="restartBtn"><span class="ic">↺</span><span class="desk">Restart</span></button>
    <button class="btn" id="fsBtn" aria-pressed="false" title="Full screen (F)"><span class="ic">⛶</span><span class="desk fs-label">Full screen</span></button>
  </header>

  <div class="statusbar">
    <span class="puz">
      <span class="badge" id="puzBadge">—</span>
      <span class="id" id="puzId">#—</span>
    </span>
    <span class="pill" id="progress">0 / 81</span>
    <span class="pill warn" id="conflicts" hidden>0 conflicts</span>
    <div class="spacer"></div>
    <span class="timer" id="timer"><span id="tval">00:00</span></span>
    <button class="icon-btn" id="pauseBtn" title="Pause (P)" aria-label="Pause">⏸ <span class="desk">Pause</span></button>
  </div>

  <main class="stage">
    <div class="board-area">
      <div class="board" id="board" aria-label="Sudoku board"></div>
      <div class="cover" id="cover"></div>
      <div class="tech-panel" id="techPanel" hidden>
        <div class="tp-head">
          <span class="tp-title" id="tpTitle"></span>
          <button class="tp-close" id="tpClose" aria-label="Dismiss">×</button>
        </div>
        <div class="tp-text" id="tpText"></div>
      </div>
    </div>

    <section class="pad" id="pad" aria-label="Number pad">
      <div class="pad-modes" id="modes">
        <button class="mode active" data-mode="digit"><span class="dot"></span>Digit</button>
        <button class="mode" data-mode="grey"><span class="dot"></span>Grey</button>
        <button class="mode" data-mode="blue"><span class="dot"></span>Blue</button>
        <button class="mode" data-mode="strike"><span class="dot"></span>Strike</button>
      </div>
      <div class="pad-grid" id="padGrid"></div>
      <div class="pad-actions">
        <button class="btn" id="eraseBtn"><span class="ic">⌫</span>Erase</button>
        <button class="btn" id="undoBtn"><span class="ic">↶</span>Undo</button>
        <button class="btn wide" id="autoNoteBtn"><span class="ic">✎</span>Auto-note open cells (grey)</button>
      </div>
      <div class="pad-opts">
        <div class="opt-row">
          <span class="opt-lab">Red strikes</span>
          <button class="opt-toggle on" id="struckBtn" aria-pressed="true">Shown</button>
        </div>
        <div class="opt-row">
          <span class="opt-lab">Grey notes</span>
          <input type="range" id="greySlider" min="15" max="100" value="100" aria-label="Grey note opacity">
        </div>
      </div>
      <p class="hint">Drag to select several cells, then tap a number to note them at once. With nothing selected, a number <b>highlights</b> every match. Modes: <b>Digit · Grey · Blue · Strike</b>.</p>
    </section>
  </main>
</div>

<!-- Solving techniques: one self-registering file each (see techniques/README.md).
     Classic scripts on purpose so the folder still works opened straight off disk. -->
<script src="techniques/naked-single.js"></script>
<script src="techniques/hidden-pair.js"></script>

<script src="sudoku.js"></script>
</body>
</html>
