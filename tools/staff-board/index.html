<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A digital staff-room corkboard — pin sticky notes, checklists and a month calendar. Runs offline, saves to your browser.">
<meta name="theme-color" content="#1f3d35">
<title>Staff-Room Board</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23c0904f'/%3E%3Ccircle cx='8' cy='8' r='3' fill='%23c43d35'/%3E%3C/svg%3E">
<style>
  :root{
    --app-bg:#e9edf0; --panel:#fff; --panel-2:#f4f6f8; --room-bg:#f7f8f6;
    --ink:#16241f; --muted:#67756f; --line:#d8dee2; --grid-line:rgba(31,61,53,.07);
    --board:#1f3d35; --board-2:#173029; --board-line:#2c5247;
    --accent:#e0982e; --accent-soft:#fbe6c8; --accent-deep:#b9781f;
    --danger:#c43d35; --danger-soft:#f7e0de; --together:#2f6f9f; --together-soft:#dde9f3;
    --ok:#3f9e6b;
    --shadow:0 1px 2px rgba(20,40,33,.06),0 6px 18px rgba(20,40,33,.06);
    --shadow-sm:0 1px 2px rgba(20,40,33,.10); --radius:12px;
    --sans:ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;

    /* corkboard furniture (per-tool decorative palette) */
    --cork:#c19153; --cork-2:#b07f3f; --wood:#8a5a30; --wood-2:#6f471f;
    --paper-shadow:0 1px 1px rgba(40,24,8,.18),0 10px 18px rgba(40,24,8,.30);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--app-bg);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;overflow:hidden;}
  button{font-family:inherit;}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ---- toolbar ---- */
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 16px;
    background:var(--panel);border-bottom:1px solid var(--line);z-index:5;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:13px;color:var(--ink);white-space:nowrap;}
  .brand .mark{width:16px;height:16px;border-radius:4px;background:var(--accent);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);flex:none;}
  .brand small{font-weight:500;letter-spacing:.02em;text-transform:none;color:var(--muted);font-size:11px;}
  .spacer{flex:1;}

  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 13px;
    border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;
    align-items:center;gap:7px;transition:background .12s,border-color .12s,transform .05s;}
  .btn:hover{background:var(--panel-2);} .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--board);border-color:var(--board);color:#fff;}
  .btn.primary:hover{background:var(--board-2);}
  .btn.danger{color:var(--danger);border-color:var(--danger-soft);background:#fff;}
  .btn.danger:hover{background:var(--danger-soft);}
  .btn.small{padding:5px 9px;font-size:12px;border-radius:7px;}
  .btn[disabled]{opacity:.45;cursor:not-allowed;}
  .btn .ic{font-size:15px;line-height:1;}

  /* zoom / view controls */
  .zoom{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:9px;
    overflow:hidden;background:var(--panel);}
  .zoom button{border:none;background:none;cursor:pointer;color:var(--ink);font-weight:700;
    font-size:15px;line-height:1;padding:7px 10px;}
  .zoom button:hover{background:var(--panel-2);}
  .zoom .lvl{font-family:var(--mono);font-size:12px;font-weight:600;min-width:44px;text-align:center;
    border-left:1px solid var(--line);border-right:1px solid var(--line);}
  .zoom .fit,.zoom .fs{font-size:13px;}

  /* ---- board (scroll viewport) + surface (the zoomable cork) ----
     The board is a sizing/scroll box; the surface holds the cork + items and
     is scaled by the zoom. Sizing both in JS lets the canvas grow as needed
     and lets the scrollbars track the scaled content. */
  .board-wrap{flex:1;overflow:auto;position:relative;min-height:0;
    padding:14px;background:linear-gradient(var(--wood),var(--wood-2));}
  .board-wrap.dragging{cursor:grabbing;}
  .board{position:relative;width:100%;height:100%;}
  .surface{position:absolute;top:0;left:0;width:100%;height:100%;
    transform-origin:0 0;border-radius:6px;
    background-color:var(--cork);
    /* speckled cork grain from layered radial-gradients */
    background-image:
      radial-gradient(rgba(120,72,28,.30) 16%, transparent 17%),
      radial-gradient(rgba(86,50,18,.26) 14%, transparent 15%),
      radial-gradient(rgba(255,236,200,.20) 12%, transparent 13%),
      radial-gradient(rgba(150,98,42,.22) 11%, transparent 12%),
      radial-gradient(rgba(70,40,14,.18) 10%, transparent 11%);
    background-size:13px 13px, 17px 17px, 9px 9px, 21px 21px, 7px 7px;
    background-position:0 0, 8px 6px, 3px 7px, 11px 13px, 5px 2px;
    box-shadow:inset 0 0 0 1px rgba(70,40,14,.35),
      inset 0 0 38px rgba(54,30,10,.45), inset 0 0 120px rgba(54,30,10,.22);
  }

  /* ---- pinned card (paper) ---- */
  /* transform-origin:top-left keeps the top-left pinned while resizing the
     bottom-right corner, even with the slight pinned-paper rotation. */
  .card{position:absolute;top:0;left:0;border-radius:3px;
    box-shadow:var(--paper-shadow);transform:rotate(var(--rot,0deg));transform-origin:0 0;
    transition:box-shadow .12s;will-change:left,top;touch-action:none;}
  .card.lift{box-shadow:0 3px 4px rgba(40,24,8,.22),0 18px 30px rgba(40,24,8,.40);}
  .card .inner{position:relative;padding:18px 12px 12px;display:flex;flex-direction:column;
    height:100%;min-height:0;}

  /* resize grip — drag the bottom-right corner to resize */
  .rs{position:absolute;right:1px;bottom:1px;width:18px;height:18px;cursor:nwse-resize;
    z-index:3;opacity:0;transition:opacity .12s;touch-action:none;}
  .card:hover .rs,.card:focus-within .rs{opacity:.65;}
  .rs:hover{opacity:1;}
  .rs::after{content:"";position:absolute;right:3px;bottom:3px;width:8px;height:8px;
    border-right:2px solid rgba(40,24,8,.55);border-bottom:2px solid rgba(40,24,8,.55);}

  /* push pin = drag handle */
  .pin{position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    width:22px;height:22px;border:none;padding:0;border-radius:50%;cursor:grab;z-index:3;
    background:
      radial-gradient(circle at 36% 30%, rgba(255,255,255,.85), rgba(255,255,255,0) 42%),
      radial-gradient(circle at 50% 55%, var(--pin,#c43d35), var(--pin-deep,#8f2a24));
    box-shadow:0 3px 4px rgba(0,0,0,.4),inset 0 -2px 3px rgba(0,0,0,.30),
      inset 0 2px 3px rgba(255,255,255,.5);}
  .pin::after{content:"";position:absolute;left:50%;top:50%;width:5px;height:5px;
    border-radius:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 40% 40%, rgba(255,255,255,.7), rgba(0,0,0,.25));}
  .pin:active{cursor:grabbing;}
  .card.dragging-this .pin{cursor:grabbing;}

  /* remove (×) — appears on hover/focus */
  .x{position:absolute;top:3px;right:3px;width:22px;height:22px;border:none;border-radius:6px;
    background:rgba(255,255,255,.0);color:rgba(40,24,8,.55);cursor:pointer;font-size:17px;
    line-height:1;display:flex;align-items:center;justify-content:center;opacity:0;
    transition:opacity .12s,background .12s,color .12s;z-index:3;}
  .card:hover .x,.card:focus-within .x{opacity:1;}
  .x:hover{background:var(--danger-soft);color:var(--danger);}

  /* ---- sticky note ---- */
  .card.note{min-width:130px;min-height:110px;background:var(--note,#fff59d);
    background-image:linear-gradient(160deg, rgba(255,255,255,.35), rgba(0,0,0,.04));}
  .card.note .inner{padding:20px 13px 26px;}
  .note textarea{flex:1;width:100%;min-height:54px;border:none;background:transparent;resize:none;
    font-family:"Bradley Hand","Segoe Print",var(--sans);font-size:15px;line-height:1.5;
    color:#33270f;padding:0;}
  .note textarea:focus{outline:none;}
  .note textarea::placeholder{color:rgba(51,39,15,.4);}

  /* color swatches footer (notes) */
  .swatches{position:absolute;left:10px;bottom:7px;display:flex;gap:5px;opacity:0;
    transition:opacity .12s;}
  .card:hover .swatches,.card:focus-within .swatches{opacity:1;}
  .swatch{width:14px;height:14px;border-radius:50%;border:1px solid rgba(40,24,8,.25);
    cursor:pointer;padding:0;}
  .swatch.on{box-shadow:0 0 0 2px rgba(40,24,8,.55);}

  /* ---- paper cards (list / calendar / countdown) ---- */
  .card.paper{background:#fffdf7;background-image:linear-gradient(160deg,rgba(255,255,255,.5),rgba(0,0,0,.03));}
  .card.list{min-width:180px;min-height:120px;}
  .card .head{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex:none;}
  .card .head .title{flex:1;border:none;background:transparent;font-weight:700;font-size:13.5px;
    color:var(--ink);padding:2px 2px;border-radius:5px;letter-spacing:.01em;}
  .card .head .title:focus{outline:none;background:var(--panel-2);}
  .card .head .count{font-family:var(--mono);font-size:10.5px;color:var(--muted);
    background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:1px 7px;flex:none;}

  .checks{list-style:none;margin:0 0 6px;padding:0;display:flex;flex-direction:column;gap:3px;
    flex:1;min-height:0;overflow:auto;}
  .checks li{display:flex;align-items:center;gap:7px;padding:2px 2px;border-radius:6px;}
  .checks li:hover{background:rgba(40,24,8,.05);}
  .checks input[type=checkbox]{width:15px;height:15px;accent-color:var(--board);flex:none;cursor:pointer;}
  .checks .it{flex:1;border:none;background:transparent;font-size:13px;color:var(--ink);padding:1px 2px;border-radius:5px;}
  .checks .it:focus{outline:none;background:var(--panel-2);}
  .checks li.done .it{text-decoration:line-through;color:var(--muted);}
  .checks .rm{border:none;background:none;color:rgba(40,24,8,.4);cursor:pointer;font-size:15px;
    line-height:1;padding:0 3px;border-radius:5px;opacity:0;transition:opacity .12s;}
  .checks li:hover .rm{opacity:1;}
  .checks .rm:hover{color:var(--danger);background:var(--danger-soft);}
  .additem{display:flex;align-items:center;gap:6px;flex:none;}
  .additem input{flex:1;border:1px solid var(--line);border-radius:7px;padding:5px 8px;
    background:var(--panel-2);font-size:12.5px;}
  .additem .add{border:1px solid var(--line);background:var(--panel);border-radius:7px;cursor:pointer;
    width:28px;height:28px;flex:none;font-size:17px;line-height:1;color:var(--board);}
  .additem .add:hover{background:var(--panel-2);}

  /* ---- calendar ---- */
  .card.cal{min-width:252px;min-height:248px;}
  .cal-head{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex:none;}
  .cal-head .mtitle{flex:1;text-align:center;font-weight:700;font-size:13.5px;cursor:pointer;
    border:none;background:transparent;color:var(--ink);border-radius:6px;padding:3px;letter-spacing:.01em;}
  .cal-head .mtitle:hover{background:var(--panel-2);}
  .cal-nav{border:1px solid var(--line);background:var(--panel);border-radius:7px;cursor:pointer;
    width:26px;height:26px;flex:none;font-size:14px;line-height:1;color:var(--ink);}
  .cal-nav:hover{background:var(--panel-2);}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:none;}
  .cal-dow .dow{font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--muted);text-align:center;padding:2px 0 4px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);
    gap:2px;flex:1;min-height:0;}
  .cal-day{border:none;background:transparent;font-family:var(--mono);font-size:11.5px;
    color:var(--ink);min-height:24px;border-radius:6px;cursor:pointer;position:relative;
    display:flex;align-items:center;justify-content:center;padding:0;}
  .cal-day:hover{background:var(--panel-2);}
  .cal-day.dim{color:rgba(40,24,8,.3);}
  /* hardcoded school calendar: closed days shaded grey (like the source PDF) */
  .cal-day.closed{background:#e4ded2;color:rgba(40,24,8,.5);}
  .cal-day.closed:hover{background:#dcd5c6;}
  .cal-day.closed.dim{background:#eee9e0;color:rgba(40,24,8,.28);}
  /* first / last day of school — small green flag */
  .cal-day.school-hi{color:var(--ok);font-weight:700;}
  .cal-day.school-hi::before{content:"";position:absolute;top:3px;left:50%;transform:translateX(-50%);
    width:5px;height:5px;border-radius:50%;background:var(--ok);}
  .cal-day.today{box-shadow:inset 0 0 0 2px var(--accent);font-weight:700;}
  /* a day with a note gets an amber dot; click any day to add/edit a note */
  .cal-day.noted::after{content:"";position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
    width:5px;height:5px;border-radius:50%;background:var(--accent-deep);}
  .cal-hint{font-size:9.5px;color:var(--muted);margin-top:7px;flex:none;letter-spacing:.02em;}
  .cal-foot{display:flex;align-items:center;gap:8px;margin-top:6px;flex:none;
    font-size:10.5px;color:var(--muted);}
  .cal-foot .lab{letter-spacing:.06em;text-transform:uppercase;font-weight:700;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
  .seg button{border:none;background:#fff;padding:3px 9px;cursor:pointer;font-size:11px;font-weight:600;
    color:var(--muted);}
  .seg button.active{background:var(--board);color:#fff;}

  /* ---- day countdown ---- */
  .card.count{min-width:172px;min-height:132px;background:#fffdf7;
    background-image:linear-gradient(160deg,rgba(255,255,255,.5),rgba(0,0,0,.03));}
  .count .cbody{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;gap:2px;}
  .count .big{font-family:var(--mono);font-weight:700;font-size:46px;line-height:1;color:var(--board);}
  .count .big.past{color:var(--muted);}
  .count .unit{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .count .date{font-family:var(--mono);font-size:11.5px;color:var(--ink);margin-top:6px;}
  .count .foot{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4;flex:none;text-align:center;}

  /* ---- agenda (iPhone-style list of days with notes) ---- */
  .card.agenda{min-width:200px;min-height:150px;}
  .agenda-list{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;gap:1px;margin:0;padding:0;list-style:none;}
  .agenda-row{display:flex;gap:9px;align-items:flex-start;padding:6px 4px;border-radius:7px;cursor:pointer;
    border-top:1px solid var(--line);}
  .agenda-row:first-child{border-top:none;}
  .agenda-row:hover{background:var(--panel-2);}
  .agenda-row .ad{flex:none;width:42px;text-align:center;line-height:1.1;}
  .agenda-row .ad .dnum{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--ink);}
  .agenda-row .ad .dwd{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .agenda-row .ax{flex:1;min-width:0;}
  .agenda-row .ax .atx{font-size:12.5px;color:var(--ink);line-height:1.35;white-space:pre-wrap;overflow-wrap:anywhere;}
  .agenda-row .ax .amo{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--accent-deep);}
  .agenda-row.past{opacity:.5;}
  .agenda-row.istoday .ad .dnum{color:var(--accent-deep);}
  .agenda-empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--muted);font-size:12px;line-height:1.5;padding:10px;}

  /* ---- day-note popover (click a calendar day) ---- */
  .daypop{position:fixed;z-index:1200;width:208px;background:#fff59d;border-radius:6px;
    box-shadow:0 8px 26px rgba(40,24,8,.4),0 2px 4px rgba(40,24,8,.25);padding:10px 11px 9px;
    background-image:linear-gradient(160deg,rgba(255,255,255,.4),rgba(0,0,0,.04));}
  .daypop .dp-date{font-weight:700;font-size:12px;color:#33270f;margin-bottom:5px;letter-spacing:.02em;}
  .daypop textarea{width:100%;min-height:74px;border:none;background:transparent;resize:vertical;
    font-family:"Bradley Hand","Segoe Print",var(--sans);font-size:15px;line-height:1.45;color:#33270f;padding:0;}
  .daypop textarea:focus{outline:none;}
  .daypop textarea::placeholder{color:rgba(51,39,15,.4);}
  .daypop .dp-hint{font-size:9.5px;color:rgba(51,39,15,.55);margin-top:4px;text-align:right;}

  /* ---- empty hint ---- */
  .emptyhint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;color:rgba(255,255,255,.85);text-shadow:0 1px 2px rgba(40,24,8,.5);
    font-size:14px;line-height:1.7;pointer-events:none;}
  .emptyhint b{font-weight:700;}

  /* ---- toast ---- */
  .toast-wrap{position:fixed;left:50%;bottom:54px;transform:translateX(-50%);z-index:1000;
    display:flex;flex-direction:column;gap:8px;align-items:center;}
  .toast{background:var(--ink);color:#fff;padding:10px 15px;border-radius:10px;font-size:13px;
    box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:min(92vw,560px);
    border-left:3px solid var(--accent);animation:tin .2s ease both;}
  .toast.err{border-left-color:var(--danger);}
  .toast.ok{border-left-color:var(--ok);}
  @keyframes tin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  @keyframes pop{from{opacity:0;transform:rotate(var(--rot,0deg)) scale(.9);}to{opacity:1;}}
  .card.pop{animation:pop .26s cubic-bezier(.2,.7,.3,1);}

  @media (max-width:620px){
    .toolbar{gap:7px;} .brand small{display:none;}
    .btn .lbl{display:none;} .btn{padding:8px 10px;}
  }
  @media (prefers-reduced-motion:reduce){
    .card.pop{animation:none;} .btn:active{transform:none;} *{scroll-behavior:auto;}
  }
  @media print{
    .toolbar,.toast-wrap,.pin,.x,.swatches,.rs,.daypop{display:none !important;}
    body{overflow:visible;} .board-wrap{overflow:visible;background:#fff;padding:0;}
    .surface{box-shadow:none;background:#fff;transform:none !important;}
    .card{box-shadow:0 0 0 1px #ccc;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="toolbar">
    <div class="brand"><span class="mark"></span>Staff-Room Board <small>corkboard · notes &amp; lists</small></div>
    <div class="spacer"></div>
    <button class="btn" id="addNote"><span class="ic">📝</span><span class="lbl">Sticky note</span></button>
    <button class="btn" id="addList"><span class="ic">✓</span><span class="lbl">Checklist</span></button>
    <button class="btn" id="addCal"><span class="ic">📅</span><span class="lbl">Calendar</span></button>
    <button class="btn" id="addCount"><span class="ic">⏳</span><span class="lbl">Countdown</span></button>
    <button class="btn" id="addAgenda"><span class="ic">📋</span><span class="lbl">Agenda</span></button>
    <div class="zoom" role="group" aria-label="Zoom">
      <button id="zoomOut" title="Zoom out" aria-label="Zoom out">−</button>
      <button class="lvl" id="zoomLvl" title="Reset to 100%" aria-label="Reset zoom">100%</button>
      <button id="zoomIn" title="Zoom in" aria-label="Zoom in">+</button>
      <button class="fit" id="fitBtn" title="Fit everything on screen" aria-label="Fit to screen">⤢</button>
      <button class="fs" id="fsBtn" title="Fullscreen" aria-label="Toggle fullscreen">⛶</button>
    </div>
    <button class="btn small" id="exportBtn" title="Download this board as a file">Export</button>
    <button class="btn small" id="importBtn" title="Load a board file">Import</button>
    <button class="btn small danger" id="clearBtn" title="Clear the whole board">Clear</button>
    <input type="file" id="importFile" accept="application/json,.json" hidden>
  </header>

  <div class="board-wrap" id="boardWrap">
    <div class="board" id="board">
      <div class="surface" id="surface">
        <div class="emptyhint" id="emptyHint">
          <b>The board is empty.</b><br>
          Add a sticky note, checklist, calendar, countdown or agenda — or double-click the cork.
        </div>
      </div>
    </div>
  </div>
</div>

<!-- click a calendar day to write a note for it -->
<div id="dayPop" class="daypop" style="display:none">
  <div class="dp-date"></div>
  <textarea placeholder="Note for this day…" aria-label="Day note" rows="3"></textarea>
  <div class="dp-hint">Esc / click away to save</div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
/* =====================================================================
   Staff-Room Board — single-file, offline.

   A digital corkboard for the staff room: pin sticky notes, checklists,
   a month calendar and a day countdown to a cork surface and arrange them.

   • Items live on a zoomable, auto-growing cork SURFACE inside a scroll
     viewport. The surface stays viewport-sized by default and grows to fit
     items as they spread out; a zoom control scales everything so it reads
     well on a TV at any resolution (drag/resize math divides by the zoom).
   • The push pin doubles as a drag handle (grab the pin or the paper
     margins; click into text to edit). Drag near an edge to auto-pan and
     extend the board. Arrow keys nudge a focused pin. Drag the bottom-right
     corner to resize; content reflows to fit.
   • Click a calendar day to write a sticky note for it; an Agenda card
     lists every noted day chronologically (iPhone-style).
   • The calendar's first day of week follows the BROWSER/system default
     (Intl.Locale weekInfo) — Monday in much of the world, Sunday in the
     US etc. Each calendar's Auto/Sun/Mon toggle can override it.
   • The countdown counts INSTRUCTIONAL days remaining to the last day of
     school, using the hardcoded CBE 2026–27 calendar (holidays/breaks/PD
     days). A day that has begun no longer counts. Those closures are also
     shaded grey on the month calendar.
   • State auto-saves to this browser (localStorage). No network, no
     accounts. Export/Import moves a board between machines as a file.
   ===================================================================== */

const $ = id => document.getElementById(id);
const STORE_KEY = 'teachingtools.staffboard.v1';

const board    = $('board');
const boardWrap = $('boardWrap');
const surface  = $('surface');

/* ---- palettes ---- */
const NOTE_COLORS = ['#fff59d','#ffd3e0','#bfe3ff','#caf0c2','#ffd9a8','#e7d9ff'];
const PINS = [
  {c:'#c43d35', d:'#8f2a24'}, // red
  {c:'#2f6f9f', d:'#1f4d70'}, // blue
  {c:'#3f9e6b', d:'#2a6e49'}, // green
  {c:'#e0982e', d:'#b9781f'}, // amber
  {c:'#7a52c0', d:'#553a87'}, // violet
];

/* ---- CBE 2026–2027 Instructional Calendar (hardcoded from the official PDF) ----
   School runs Mon 31 Aug 2026 → Fri 25 Jun 2027 = 181 instructional days.
   The countdown counts instructional days only; a day that has already begun
   no longer counts (we start from tomorrow). To roll this forward to a new
   school year, edit SCHOOL_START / SCHOOL_END / SCHOOL_CLOSURES below. */
const SCHOOL_START = new Date(2026, 7, 31);   // 31 Aug 2026 — first day of school
const SCHOOL_END   = new Date(2027, 5, 25);   // 25 Jun 2027 — last day of school
const COUNTDOWN_TARGET = SCHOOL_END;          // the countdown's destination

// Closed / non-instructional days — single date or inclusive {from,to} range.
// (Aug 26–28 and Jun 28–29 sit outside the student instructional window, so
//  they only shade the calendar — they never affect the day count.)
const SCHOOL_CLOSURES = [
  { from:'2026-08-26', to:'2026-08-28', name:'Non-instruction days' },
  { from:'2026-09-07', name:'Labour Day' },
  { from:'2026-09-25', name:'Non-instruction day' },
  { from:'2026-09-30', name:'National Day for Truth and Reconciliation' },
  { from:'2026-10-12', name:'Thanksgiving Day' },
  { from:'2026-10-19', name:'Non-instruction day' },
  { from:'2026-11-11', to:'2026-11-15', name:'Fall Break' },            // incl. Remembrance Day
  { from:'2026-11-27', name:'Non-instruction day' },
  { from:'2026-12-19', to:'2027-01-03', name:'Winter Break' },
  { from:'2027-01-29', name:'System Professional Learning day' },
  { from:'2027-02-11', to:'2027-02-12', name:'Non-instruction days' },
  { from:'2027-02-15', name:'Family Day' },
  { from:'2027-02-26', name:'Non-instruction day' },
  { from:'2027-03-19', name:'Non-instruction day' },
  { from:'2027-03-20', to:'2027-03-29', name:'Spring Break' },          // incl. Good Friday
  { from:'2027-04-30', name:'MaatoomsiPookaiks / Professional Learning day' },
  { from:'2027-05-21', name:'Non-instruction day' },
  { from:'2027-05-24', name:'Victoria Day' },
  { from:'2027-06-28', to:'2027-06-29', name:'Non-instruction days' },
];
// Notable instructional days to highlight on the calendar.
const SCHOOL_HIGHLIGHTS = { '2026-7-31':'First day of school', '2027-5-25':'Last day of school' };

// dateKey uses a 0-based month so it matches the calendar grid's own keys.
const dkey = d => d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
const isoToDate = s => { const [Y,M,D]=s.split('-').map(Number); return new Date(Y,M-1,D); };
// Expand the closures into dateKey -> label.
const SCHOOL_CLOSED = (()=>{
  const m = new Map();
  for(const c of SCHOOL_CLOSURES){
    const a=isoToDate(c.from), b=c.to?isoToDate(c.to):isoToDate(c.from);
    for(let d=new Date(a); d<=b; d.setDate(d.getDate()+1)) m.set(dkey(d), c.name);
  }
  return m;
})();

// Is `d` a school instructional day? (in range, a weekday, not a closure)
function isInstructional(d){
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if(x < SCHOOL_START || x > SCHOOL_END) return false;
  const wd = x.getDay();
  if(wd===0 || wd===6) return false;
  return !SCHOOL_CLOSED.has(dkey(x));
}
// Instructional days remaining: strictly AFTER today (today has begun, so it's
// no longer counted), through the last day of school.
function instructionalDaysLeft(){
  const today = new Date(); today.setHours(0,0,0,0);
  let d = new Date(today); d.setDate(d.getDate()+1);     // start counting tomorrow
  if(d < SCHOOL_START) d = new Date(SCHOOL_START);
  let n = 0;
  for(; d <= SCHOOL_END; d.setDate(d.getDate()+1)) if(isInstructional(d)) n++;
  return n;
}

// Default + minimum sizes per item type (used by create + resize). h:null = grow
// to fit content until the user drags the corner.
const SIZE = {
  note:   { w:196, h:188, minW:130, minH:110 },
  list:   { w:236, h:null, minW:180, minH:120 },
  cal:    { w:308, h:300, minW:252, minH:248 },
  count:  { w:226, h:188, minW:172, minH:132 },
  agenda: { w:248, h:300, minW:200, minH:150 },
};

/* ---- state ---- */
let state = { items:[], z:10, seq:1, zoom:1 };
const els = new Map();           // id -> card element
let saveTimer = null;
let placeIx = 0;                 // cascade counter for new items

// live-update registries (cleaned up via item._reg on remove/rebuild)
const countdownEls = new Set();  // {render} — refreshed across midnight
const calEls       = new Set();  // {render} — re-render dots when notes change
const agendaEls    = new Set();  // {render} — re-list when notes change
function refreshCalendars(){ calEls.forEach(c=>c.render()); }
function refreshAgendas(){ agendaEls.forEach(a=>a.render()); }

/* ---------------- locale week start ---------------- */
// Returns 0..6 (0 = Sunday) for the browser/system's first day of week.
// This reads the browser locale (navigator.language) and asks Intl for that
// locale's week info — i.e. it follows whatever Sun/Mon convention the
// browser is set to, with no hardcoded preference.
function systemWeekStart(){
  const langs = (navigator.languages && navigator.languages.length)
    ? navigator.languages : [navigator.language || 'en-US'];
  for(const lang of langs){
    try{
      const loc = new Intl.Locale(lang);
      const wi = (typeof loc.getWeekInfo === 'function') ? loc.getWeekInfo() : loc.weekInfo;
      if(wi && wi.firstDay) return wi.firstDay % 7;   // CLDR 1..7 (Mon..Sun) -> 1..6,0
    }catch(e){}
  }
  // Fallback: infer a region and guess (most of the world starts Monday).
  const sundayFirst = ['US','CA','AU','NZ','JP','IL','KR','IN','ZA','BR','MX','PH','CO',
    'EG','SA','HK','TW','CN','ID','TH','PE','VE','CL','GT','PR','PA','CR','DO','HN','NI','BO','EC'];
  try{
    const region = new Intl.Locale(navigator.language || 'en-US').maximize().region;
    if(region && sundayFirst.includes(region)) return 0;
  }catch(e){}
  return 1; // Monday
}
const SYS_WEEK_START = systemWeekStart();

/* ---------------- persistence ---------------- */
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
    catch(e){ /* storage may be unavailable (private mode) — keep working in memory */ }
  }, 200);
}
function load(){
  let raw=null;
  try{ raw = localStorage.getItem(STORE_KEY); }catch(e){}
  if(raw){
    try{
      const s = JSON.parse(raw);
      if(s && Array.isArray(s.items)){
        state = Object.assign({items:[],z:10,seq:1,zoom:1}, s);
        state.zoom = clamp(state.zoom||1, ZOOM_MIN, ZOOM_MAX);
        return true;
      }
    }catch(e){}
  }
  return false;
}

/* ---------------- helpers ---------------- */
function uid(){ return 'i' + (state.seq++) + '_' + Math.random().toString(36).slice(2,6); }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function rand(a,b){ return a + Math.random()*(b-a); }
function pickPin(){ return PINS[Math.floor(Math.random()*PINS.length)]; }

function toast(msg, kind){
  const t = document.createElement('div');
  t.className = 'toast' + (kind ? ' '+kind : '');
  t.textContent = msg;
  $('toastWrap').appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3400);
}

function bringToFront(item, el){
  item.z = ++state.z;
  el.style.zIndex = item.z;
}

// A sensible spot for a new item: cascade diagonally near the top-left of
// whatever part of the board is currently in view.
function nextPos(){
  const i = placeIx++;
  const x = 24 + (i % 6) * 30 + Math.floor(i/6) * 12;
  const y = 24 + (i % 6) * 26 + boardWrap.scrollTop;
  return { x, y };
}

function updateEmpty(){
  $('emptyHint').style.display = state.items.length ? 'none' : 'block';
}

// Apply an item's stored size to its element (h:null => grow to fit content).
function applySize(item, el){
  const def = SIZE[item.type] || {};
  el.style.width  = (item.w || def.w || 200) + 'px';
  el.style.height = (item.h != null) ? item.h + 'px' : '';
}

/* ---------------- zoom + auto-growing canvas ---------------- */
const ZOOM_MIN = 0.4, ZOOM_MAX = 3, BIG = 100000;

// Screen point -> surface (board) coordinates, accounting for zoom + scroll.
function toSurface(clientX, clientY){
  const r = surface.getBoundingClientRect();
  const z = state.zoom || 1;
  return { x: (clientX - r.left)/z, y: (clientY - r.top)/z };
}
function applyZoom(){
  surface.style.transform = 'scale(' + (state.zoom||1) + ')';
  const lvl = $('zoomLvl'); if(lvl) lvl.textContent = Math.round((state.zoom||1)*100) + '%';
}
// Size the surface to hold every item (+ breathing room), never smaller than
// the viewport; size the scroll box to the scaled surface so scrollbars track
// it. "Current size by default, larger as needed."
function fitBoard(){
  const z = state.zoom || 1, pad = 160;
  let maxR = 0, maxB = 0;
  state.items.forEach(it=>{
    const el = els.get(it.id); if(!el) return;
    maxR = Math.max(maxR, it.x + el.offsetWidth);
    maxB = Math.max(maxB, it.y + el.offsetHeight);
  });
  const floorW = (boardWrap.clientWidth  - 28) / z;   // 28 = board-wrap padding
  const floorH = (boardWrap.clientHeight - 28) / z;
  const W = Math.max(floorW, maxR + pad);
  const H = Math.max(floorH, maxB + pad);
  surface.style.width  = W + 'px';
  surface.style.height = H + 'px';
  board.style.width    = (W * z) + 'px';
  board.style.height   = (H * z) + 'px';
}
function setZoom(z){
  state.zoom = clamp(z, ZOOM_MIN, ZOOM_MAX);
  applyZoom(); fitBoard(); save();
}
function fitToScreen(){
  let maxR = 200, maxB = 200;
  state.items.forEach(it=>{
    const el = els.get(it.id); if(!el) return;
    maxR = Math.max(maxR, it.x + el.offsetWidth);
    maxB = Math.max(maxB, it.y + el.offsetHeight);
  });
  const availW = boardWrap.clientWidth - 28, availH = boardWrap.clientHeight - 28;
  const z = clamp(Math.min(availW/(maxR+60), availH/(maxB+60)), ZOOM_MIN, 1);
  state.zoom = z; applyZoom(); fitBoard(); boardWrap.scrollTo(0,0); save();
}
function toggleFullscreen(){
  try{
    if(document.fullscreenElement) document.exitFullscreen();
    else if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
  }catch(e){}
}

/* ---------------- create items ---------------- */
function addNote(x, y, text, color){
  const pos = (x==null) ? nextPos() : {x,y};
  const item = { id:uid(), type:'note', x:pos.x, y:pos.y, w:SIZE.note.w, h:SIZE.note.h,
    rot:rand(-3.2,3.2), z:++state.z, pin:pickPin(),
    color: color || NOTE_COLORS[Math.floor(rand(0,NOTE_COLORS.length))], text: text || '' };
  state.items.push(item);
  mountCard(item, true);
  updateEmpty(); fitBoard(); save();
  return item;
}
function addList(){
  const pos = nextPos();
  const item = { id:uid(), type:'list', x:pos.x, y:pos.y, w:SIZE.list.w, h:SIZE.list.h,
    rot:rand(-2.4,2.4), z:++state.z, pin:pickPin(), title:'Checklist', items:[] };
  state.items.push(item);
  mountCard(item, true);
  updateEmpty(); fitBoard(); save();
  return item;
}
function addCal(){
  const pos = nextPos();
  const now = new Date();
  const item = { id:uid(), type:'cal', x:pos.x, y:pos.y, w:SIZE.cal.w, h:SIZE.cal.h,
    rot:rand(-2,2), z:++state.z, pin:pickPin(), year:now.getFullYear(), month:now.getMonth(),
    weekStart:null /* null = system/browser default */, dayNotes:{} };
  state.items.push(item);
  mountCard(item, true);
  updateEmpty(); fitBoard(); refreshAgendas(); save();
  return item;
}
function addCount(){
  const pos = nextPos();
  const item = { id:uid(), type:'count', x:pos.x, y:pos.y, w:SIZE.count.w, h:SIZE.count.h,
    rot:rand(-2.4,2.4), z:++state.z, pin:pickPin(), title:'Last day of school' };
  state.items.push(item);
  mountCard(item, true);
  updateEmpty(); fitBoard(); save();
  return item;
}
function addAgenda(){
  const pos = nextPos();
  const item = { id:uid(), type:'agenda', x:pos.x, y:pos.y, w:SIZE.agenda.w, h:SIZE.agenda.h,
    rot:rand(-2,2), z:++state.z, pin:pickPin(), title:'Agenda' };
  state.items.push(item);
  mountCard(item, true);
  updateEmpty(); fitBoard(); save();
  return item;
}

function removeItem(item){
  const el = els.get(item.id);
  if(el) el.remove();
  els.delete(item.id);
  if(item._reg){ item._reg.set.delete(item._reg.entry); item._reg=null; }
  const wasCal = item.type==='cal';
  state.items = state.items.filter(i=>i!==item);
  if(wasCal) refreshAgendas();
  updateEmpty(); fitBoard(); save();
}

/* ---------------- card scaffolding ---------------- */
function mountCard(item, animate){
  const el = document.createElement('div');
  el.className = 'card ' + (item.type==='note' ? 'note' : 'paper ' + item.type);
  if(animate) el.classList.add('pop');
  el.dataset.id = item.id;
  el.style.left = item.x + 'px';
  el.style.top  = item.y + 'px';
  el.style.zIndex = item.z;
  el.style.setProperty('--rot', (item.rot||0)+'deg');
  applySize(item, el);
  if(item.type==='note') el.style.setProperty('--note', item.color);

  const inner = document.createElement('div');
  inner.className = 'inner';

  // push pin (drag handle)
  const pin = document.createElement('button');
  pin.className = 'pin';
  pin.type = 'button';
  pin.setAttribute('aria-label','Move this item (drag, or use arrow keys)');
  pin.style.setProperty('--pin', item.pin.c);
  pin.style.setProperty('--pin-deep', item.pin.d);
  inner.appendChild(pin);

  // remove
  const x = document.createElement('button');
  x.className = 'x'; x.type='button'; x.innerHTML='&times;';
  x.setAttribute('aria-label','Remove this item');
  x.addEventListener('click', ()=> removeItem(item));
  inner.appendChild(x);

  // body
  if(item.type==='note')        buildNote(item, inner);
  else if(item.type==='list')   buildList(item, inner);
  else if(item.type==='cal')    buildCal(item, inner);
  else if(item.type==='count')  buildCount(item, inner);
  else if(item.type==='agenda') buildAgenda(item, inner);

  // resize grip (bottom-right corner)
  const rs = document.createElement('div');
  rs.className = 'rs';
  rs.setAttribute('aria-hidden','true');
  inner.appendChild(rs);

  el.appendChild(inner);
  surface.appendChild(el);
  els.set(item.id, el);

  attachDrag(item, el, pin);
  attachResize(item, el, rs);
  return el;
}

/* ---------------- sticky note ---------------- */
function buildNote(item, inner){
  const ta = document.createElement('textarea');
  ta.value = item.text || '';
  ta.placeholder = 'Write a note…';
  ta.rows = 5;
  ta.setAttribute('aria-label','Sticky note text');
  ta.addEventListener('input', ()=>{ item.text = ta.value; save(); });
  inner.appendChild(ta);

  // colour swatches
  const sw = document.createElement('div');
  sw.className = 'swatches';
  NOTE_COLORS.forEach(c=>{
    const b = document.createElement('button');
    b.className = 'swatch' + (c===item.color?' on':'');
    b.type='button'; b.style.background=c;
    b.setAttribute('aria-label','Note colour');
    b.addEventListener('click', ()=>{
      item.color = c;
      els.get(item.id).style.setProperty('--note', c);
      sw.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('on', s===b));
      save();
    });
    sw.appendChild(b);
  });
  inner.appendChild(sw);
}

/* ---------------- checklist ---------------- */
function buildList(item, inner){
  const head = document.createElement('div');
  head.className = 'head';
  const title = document.createElement('input');
  title.className='title'; title.value=item.title||''; title.placeholder='Checklist';
  title.setAttribute('aria-label','Checklist title');
  title.addEventListener('input', ()=>{ item.title=title.value; save(); });
  const count = document.createElement('span'); count.className='count';
  head.appendChild(title); head.appendChild(count);
  inner.appendChild(head);

  const ul = document.createElement('ul'); ul.className='checks';
  inner.appendChild(ul);

  const addRow = document.createElement('div'); addRow.className='additem';
  const inp = document.createElement('input');
  inp.placeholder='Add item…'; inp.setAttribute('aria-label','New checklist item');
  const addBtn = document.createElement('button'); addBtn.className='add'; addBtn.type='button';
  addBtn.innerHTML='+'; addBtn.setAttribute('aria-label','Add item');
  const doAdd = ()=>{
    const v = inp.value.trim(); if(!v) return;
    item.items.push({ text:v, done:false });
    inp.value=''; renderChecks();
    save(); inp.focus();
  };
  addBtn.addEventListener('click', doAdd);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); doAdd(); } });
  addRow.appendChild(inp); addRow.appendChild(addBtn);
  inner.appendChild(addRow);

  function renderChecks(){
    ul.innerHTML='';
    item.items.forEach((row, idx)=>{
      const li = document.createElement('li');
      if(row.done) li.classList.add('done');
      const cb = document.createElement('input'); cb.type='checkbox'; cb.checked=!!row.done;
      cb.setAttribute('aria-label','Mark done');
      cb.addEventListener('change', ()=>{ row.done=cb.checked; li.classList.toggle('done',row.done); updateCount(); save(); });
      const tx = document.createElement('input'); tx.className='it'; tx.value=row.text;
      tx.setAttribute('aria-label','Item text');
      tx.addEventListener('input', ()=>{ row.text=tx.value; save(); });
      tx.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); inp.focus(); } });
      const rm = document.createElement('button'); rm.className='rm'; rm.type='button'; rm.innerHTML='&times;';
      rm.setAttribute('aria-label','Remove item');
      rm.addEventListener('click', ()=>{ item.items.splice(idx,1); renderChecks(); save(); });
      li.appendChild(cb); li.appendChild(tx); li.appendChild(rm);
      ul.appendChild(li);
    });
    updateCount();
  }
  function updateCount(){
    const done = item.items.filter(i=>i.done).length;
    count.textContent = done + '/' + item.items.length;
  }
  renderChecks();
}

/* ---------------- calendar ---------------- */
function effWeekStart(item){ return (item.weekStart==null) ? SYS_WEEK_START : item.weekStart; }

function buildCal(item, inner){
  const head = document.createElement('div'); head.className='cal-head';
  const prev = document.createElement('button'); prev.className='cal-nav'; prev.type='button'; prev.innerHTML='&lsaquo;';
  prev.setAttribute('aria-label','Previous month');
  const title = document.createElement('button'); title.className='mtitle'; title.type='button';
  title.setAttribute('aria-label','Jump to current month');
  const next = document.createElement('button'); next.className='cal-nav'; next.type='button'; next.innerHTML='&rsaquo;';
  next.setAttribute('aria-label','Next month');
  head.appendChild(prev); head.appendChild(title); head.appendChild(next);
  inner.appendChild(head);

  const dow = document.createElement('div'); dow.className='cal-dow';
  inner.appendChild(dow);
  const grid = document.createElement('div'); grid.className='cal-grid';
  inner.appendChild(grid);

  const hint = document.createElement('div'); hint.className='cal-hint';
  hint.textContent = 'Grey = no school · CBE 2026–27';
  inner.appendChild(hint);

  const foot = document.createElement('div'); foot.className='cal-foot';
  const lab = document.createElement('span'); lab.className='lab'; lab.textContent='Week starts';
  const seg = document.createElement('div'); seg.className='seg';
  // Auto = follow the browser/system default; Sun/Mon force an override.
  const bAuto = document.createElement('button'); bAuto.type='button'; bAuto.textContent='Auto';
  const bSun = document.createElement('button'); bSun.type='button'; bSun.textContent='Sun';
  const bMon = document.createElement('button'); bMon.type='button'; bMon.textContent='Mon';
  bAuto.title = 'Use the browser/system default (' + (SYS_WEEK_START===0?'Sunday':'Monday') + ')';
  bAuto.addEventListener('click', ()=>{ item.weekStart=null; render(); save(); });
  bSun.addEventListener('click',  ()=>{ item.weekStart=0;    render(); save(); });
  bMon.addEventListener('click',  ()=>{ item.weekStart=1;    render(); save(); });
  seg.appendChild(bAuto); seg.appendChild(bSun); seg.appendChild(bMon);
  foot.appendChild(lab); foot.appendChild(seg);
  inner.appendChild(foot);

  prev.addEventListener('click', ()=>{ shift(-1); });
  next.addEventListener('click', ()=>{ shift(1); });
  title.addEventListener('click', ()=>{ const n=new Date(); item.year=n.getFullYear(); item.month=n.getMonth(); render(); save(); });

  function shift(d){
    let m = item.month + d, y = item.year;
    if(m<0){ m=11; y--; } else if(m>11){ m=0; y++; }
    item.month=m; item.year=y; render(); save();
  }

  function render(){
    const ws = effWeekStart(item);
    bAuto.classList.toggle('active', item.weekStart==null);
    bSun.classList.toggle('active', item.weekStart===0);
    bMon.classList.toggle('active', item.weekStart===1);

    title.textContent = new Intl.DateTimeFormat(undefined,{month:'long',year:'numeric'})
      .format(new Date(item.year, item.month, 1));

    // weekday header (localized short names)
    dow.innerHTML='';
    const dfmt = new Intl.DateTimeFormat(undefined,{weekday:'short'});
    for(let i=0;i<7;i++){
      const wd=(ws+i)%7;
      const d=document.createElement('div'); d.className='dow';
      // 2023-01-01 was a Sunday → date 1+wd has weekday `wd`
      d.textContent = dfmt.format(new Date(2023,0,1+wd)).slice(0,2);
      dow.appendChild(d);
    }
    // day cells (6 weeks)
    grid.innerHTML='';
    const first = new Date(item.year, item.month, 1);
    const lead = (first.getDay() - ws + 7) % 7;
    const start = new Date(item.year, item.month, 1 - lead);
    const today = new Date(); today.setHours(0,0,0,0);
    for(let i=0;i<42;i++){
      const d = new Date(start); d.setDate(start.getDate()+i);
      const cell = document.createElement('button');
      cell.className='cal-day'; cell.type='button'; cell.textContent=d.getDate();
      const inMonth = d.getMonth()===item.month;
      if(!inMonth) cell.classList.add('dim');
      if(+d===+today) cell.classList.add('today');
      const key = dkey(d);
      const noteText = item.dayNotes && item.dayNotes[key];
      if(noteText) cell.classList.add('noted');
      // hardcoded school calendar: shade closures grey, flag first/last day
      const closedName = SCHOOL_CLOSED.get(key);
      const highlight  = SCHOOL_HIGHLIGHTS[key];
      if(closedName) cell.classList.add('closed');
      if(highlight)  cell.classList.add('school-hi');
      let label = d.toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'});
      if(noteText) label += ' — note: ' + noteText;
      else if(closedName) label += ' — ' + closedName;
      else if(highlight) label += ' — ' + highlight;
      cell.setAttribute('aria-label', label);
      const tip = noteText || closedName || highlight;
      if(tip) cell.title = tip;
      const cd = new Date(d);
      cell.addEventListener('click', ()=> openDayNote(item, key, cd, cell));
      grid.appendChild(cell);
    }
  }
  render();
  const entry = { render };
  calEls.add(entry);
  item._reg = { set: calEls, entry };   // re-render dots when notes change
}

/* ---------------- day-note popover (click a calendar day) ---------------- */
let dayPop = null;   // { item, key }
function openDayNote(calItem, key, dateObj, anchor){
  closeDayNote();
  if(!calItem.dayNotes) calItem.dayNotes = {};
  const pop = $('dayPop');
  const ta = pop.querySelector('textarea');
  pop.querySelector('.dp-date').textContent =
    dateObj.toLocaleDateString(undefined,{weekday:'long', day:'numeric', month:'long'});
  ta.value = calItem.dayNotes[key] || '';
  dayPop = { item:calItem, key };
  pop.style.display = 'block';
  // fixed positioning = screen space, so the popover is zoom-independent
  const r = anchor.getBoundingClientRect();
  const pw = pop.offsetWidth, ph = pop.offsetHeight;
  pop.style.left = clamp(r.left, 8, window.innerWidth  - pw - 8) + 'px';
  let top = r.bottom + 6;
  if(top + ph > window.innerHeight - 8) top = Math.max(8, r.top - ph - 6);
  pop.style.top = top + 'px';
  ta.focus(); ta.select();
  ta.oninput = ()=>{
    if(ta.value.trim()) dayPop.item.dayNotes[dayPop.key] = ta.value;
    else delete dayPop.item.dayNotes[dayPop.key];
    refreshAgendas(); save();
  };
  setTimeout(()=> document.addEventListener('pointerdown', dayPopOutside, true), 0);
}
function dayPopOutside(e){ if(!e.target.closest('#dayPop')) closeDayNote(); }
function closeDayNote(){
  if(!dayPop) return;
  const ta = $('dayPop').querySelector('textarea');
  if(ta.value.trim()) dayPop.item.dayNotes[dayPop.key] = ta.value.trim();
  else delete dayPop.item.dayNotes[dayPop.key];
  dayPop = null; ta.oninput = null;
  $('dayPop').style.display = 'none';
  document.removeEventListener('pointerdown', dayPopOutside, true);
  refreshCalendars(); refreshAgendas(); save();
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && dayPop) closeDayNote(); });

/* ---------------- agenda (iPhone-style list of days with notes) ---------------- */
function collectAgenda(){
  const out = [];
  state.items.forEach(it=>{
    if(it.type!=='cal' || !it.dayNotes) return;
    for(const key in it.dayNotes){
      const text = it.dayNotes[key];
      if(!text) continue;
      const [Y,M,D] = key.split('-').map(Number);
      out.push({ date:new Date(Y,M,D), key, text, cal:it });
    }
  });
  out.sort((a,b)=> a.date - b.date);
  return out;
}
function buildAgenda(item, inner){
  const head = document.createElement('div'); head.className='head';
  const title = document.createElement('input');
  title.className='title'; title.value=item.title||''; title.placeholder='Agenda';
  title.setAttribute('aria-label','Agenda title');
  title.addEventListener('input', ()=>{ item.title=title.value; save(); });
  head.appendChild(title);
  inner.appendChild(head);

  const list = document.createElement('div'); list.className='agenda-list';
  inner.appendChild(list);

  function render(){
    const entries = collectAgenda();
    list.innerHTML='';
    if(!entries.length){
      const e=document.createElement('div'); e.className='agenda-empty';
      e.textContent='No day notes yet. Click a day on a calendar to jot one down.';
      list.appendChild(e); return;
    }
    const today = new Date(); today.setHours(0,0,0,0);
    const wdF = new Intl.DateTimeFormat(undefined,{weekday:'short'});
    const moF = new Intl.DateTimeFormat(undefined,{month:'short'});
    entries.forEach(en=>{
      const row=document.createElement('div'); row.className='agenda-row';
      if(en.date < today) row.classList.add('past');
      if(+en.date===+today) row.classList.add('istoday');
      const ad=document.createElement('div'); ad.className='ad';
      ad.innerHTML='<div class="dwd"></div><div class="dnum"></div>';
      ad.querySelector('.dwd').textContent = wdF.format(en.date);
      ad.querySelector('.dnum').textContent = en.date.getDate();
      const ax=document.createElement('div'); ax.className='ax';
      const mo=document.createElement('div'); mo.className='amo';
      mo.textContent = moF.format(en.date)+' '+en.date.getFullYear();
      const tx=document.createElement('div'); tx.className='atx'; tx.textContent = en.text;
      ax.appendChild(mo); ax.appendChild(tx);
      row.appendChild(ad); row.appendChild(ax);
      row.title = 'Click to edit this note';
      row.addEventListener('click', ()=> openDayNote(en.cal, en.key, en.date, row));
      list.appendChild(row);
    });
  }
  render();
  const entry={render};
  agendaEls.add(entry);
  item._reg={ set:agendaEls, entry };
}

/* ---------------- day countdown (instructional days) ---------------- */
function buildCount(item, inner){
  const head = document.createElement('div'); head.className='head';
  const title = document.createElement('input');
  title.className='title'; title.value=item.title||''; title.placeholder='Countdown';
  title.setAttribute('aria-label','Countdown title');
  title.addEventListener('input', ()=>{ item.title=title.value; save(); });
  head.appendChild(title);
  inner.appendChild(head);

  const body = document.createElement('div'); body.className='cbody';
  const big = document.createElement('div'); big.className='big';
  const unit = document.createElement('div'); unit.className='unit';
  body.appendChild(big); body.appendChild(unit);
  inner.appendChild(body);

  const foot = document.createElement('div'); foot.className='foot';
  foot.textContent = 'instructional days · CBE 2026–27';
  inner.appendChild(foot);

  function render(){
    const n = instructionalDaysLeft();
    const today = new Date(); today.setHours(0,0,0,0);
    big.classList.toggle('past', n === 0);
    if(n > 0){ big.textContent = n; unit.textContent = (n===1 ? 'school day to go' : 'school days to go'); }
    else { big.textContent = '🎉'; unit.textContent = (today >= SCHOOL_END ? 'school’s out!' : 'last day — school’s out!'); }
  }
  render();
  // keep this card's number live while the board is open (see the ticker below)
  const entry = { render };
  countdownEls.add(entry);
  item._reg = { set: countdownEls, entry };
}

/* ---------------- dragging ---------------- */
function attachDrag(item, el, pin){
  let downX=0,downY=0,offX=0,offY=0,moved=false,dragging=false;
  let lastX=0,lastY=0,zoomAtDown=1,panRAF=0;

  // place the item under the (possibly stationary) pointer, in surface coords
  function applyFromPointer(){
    const p = toSurface(lastX, lastY);
    item.x = Math.round(clamp(p.x - offX, 0, BIG));
    item.y = Math.round(clamp(p.y - offY, 0, BIG));
    el.style.left=item.x+'px'; el.style.top=item.y+'px';
    fitBoard();
  }
  // auto-pan the viewport when dragging near an edge (lets the canvas grow)
  function panLoop(){
    if(!dragging){ panRAF=0; return; }
    const wr = boardWrap.getBoundingClientRect(), EDGE=48, MAX=22;
    let sx=0, sy=0;
    if(lastX > wr.right-EDGE)     sx =  MAX*Math.min(1,(lastX-(wr.right-EDGE))/EDGE);
    else if(lastX < wr.left+EDGE) sx = -MAX*Math.min(1,((wr.left+EDGE)-lastX)/EDGE);
    if(lastY > wr.bottom-EDGE)    sy =  MAX*Math.min(1,(lastY-(wr.bottom-EDGE))/EDGE);
    else if(lastY < wr.top+EDGE)  sy = -MAX*Math.min(1,((wr.top+EDGE)-lastY)/EDGE);
    if(sx||sy){
      boardWrap.scrollLeft = Math.max(0, boardWrap.scrollLeft + sx);
      boardWrap.scrollTop  = Math.max(0, boardWrap.scrollTop  + sy);
      applyFromPointer();
    }
    panRAF = requestAnimationFrame(panLoop);
  }

  el.addEventListener('pointerdown', e=>{
    if(e.button!=null && e.button!==0) return;
    const t = e.target;
    if(t.closest('.x') || t.closest('.rs')) return;               // delete / resize handle themselves
    // Edit controls handle their own pointer events; the pin (and bare
    // paper chrome) start a drag.
    if(t.closest('input,textarea,select,.swatch,.cal-day,.cal-nav,.mtitle,.add,.rm,.seg') && !t.closest('.pin')) return;

    bringToFront(item, el);
    moved=false; dragging=true; zoomAtDown = state.zoom||1;
    downX=e.clientX; downY=e.clientY; lastX=e.clientX; lastY=e.clientY;
    const r = el.getBoundingClientRect();
    offX = (e.clientX - r.left)/zoomAtDown; offY = (e.clientY - r.top)/zoomAtDown;
    el.setPointerCapture(e.pointerId);
    el.classList.add('lift','dragging-this');
    boardWrap.classList.add('dragging');
    e.preventDefault();

    const move = ev=>{
      if(!dragging) return;
      lastX=ev.clientX; lastY=ev.clientY;
      if(!moved && Math.abs(ev.clientX-downX)+Math.abs(ev.clientY-downY) > 3){
        moved=true; if(!panRAF) panRAF=requestAnimationFrame(panLoop);
      }
      if(moved) applyFromPointer();
    };
    const up = ()=>{
      dragging=false;
      if(panRAF){ cancelAnimationFrame(panRAF); panRAF=0; }
      el.releasePointerCapture(e.pointerId);
      el.removeEventListener('pointermove', move);
      el.removeEventListener('pointerup', up);
      el.removeEventListener('pointercancel', up);
      el.classList.remove('lift','dragging-this');
      boardWrap.classList.remove('dragging');
      if(moved){ fitBoard(); save(); }
    };
    el.addEventListener('pointermove', move);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
  });

  // keyboard nudging when the pin is focused
  pin.addEventListener('keydown', e=>{
    const step = e.shiftKey ? 1 : 12;
    let dx=0,dy=0;
    if(e.key==='ArrowLeft') dx=-step; else if(e.key==='ArrowRight') dx=step;
    else if(e.key==='ArrowUp') dy=-step; else if(e.key==='ArrowDown') dy=step; else return;
    e.preventDefault();
    bringToFront(item, el);
    item.x = Math.round(clamp(item.x+dx, 0, BIG));
    item.y = Math.round(clamp(item.y+dy, 0, BIG));
    el.style.left=item.x+'px'; el.style.top=item.y+'px';
    fitBoard(); save();
  });
}

/* ---------------- resizing (drag the bottom-right corner) ---------------- */
function attachResize(item, el, handle){
  handle.addEventListener('pointerdown', e=>{
    if(e.button!=null && e.button!==0) return;
    e.preventDefault(); e.stopPropagation();          // never start a drag
    bringToFront(item, el);
    const def = SIZE[item.type] || { minW:120, minH:90 };
    const z = state.zoom || 1;
    const startX=e.clientX, startY=e.clientY;
    const startW=el.offsetWidth, startH=el.offsetHeight;
    // Map the screen-space drag onto the card's own axes (divide by zoom first)
    // so resizing stays true even with the slight pinned rotation.
    const rad=(item.rot||0)*Math.PI/180, cos=Math.cos(rad), sin=Math.sin(rad);
    handle.setPointerCapture(e.pointerId);
    el.classList.add('lift');

    const move = ev=>{
      const dx=(ev.clientX-startX)/z, dy=(ev.clientY-startY)/z;
      const ldx = dx*cos + dy*sin;        // rotate the delta by -θ
      const ldy = -dx*sin + dy*cos;
      item.w = Math.round(clamp(startW + ldx, def.minW, BIG));
      item.h = Math.round(clamp(startH + ldy, def.minH, BIG));
      el.style.width  = item.w + 'px';
      el.style.height = item.h + 'px';
      fitBoard();
    };
    const up = ()=>{
      handle.releasePointerCapture(e.pointerId);
      handle.removeEventListener('pointermove', move);
      handle.removeEventListener('pointerup', up);
      handle.removeEventListener('pointercancel', up);
      el.classList.remove('lift');
      fitBoard(); save();
    };
    handle.addEventListener('pointermove', move);
    handle.addEventListener('pointerup', up);
    handle.addEventListener('pointercancel', up);
  });
}

/* ---------------- import / export / clear ---------------- */
function exportBoard(){
  if(!state.items.length){ toast('The board is empty — nothing to export.','err'); return; }
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='staff-board.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('Board exported.','ok');
}
function importBoard(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const s = JSON.parse(reader.result);
      if(!s || !Array.isArray(s.items)) throw new Error('not a board file');
      state = Object.assign({items:[],z:10,seq:1}, s);
      renderAll();
      save();
      toast('Loaded ' + state.items.length + ' item' + (state.items.length===1?'':'s') + '.','ok');
    }catch(err){ toast('Couldn’t read that file — is it a board export?','err'); }
  };
  reader.readAsText(file);
}
function clearBoard(){
  if(!state.items.length){ toast('The board is already empty.'); return; }
  if(!confirm('Clear the whole board? This removes every item on it.')) return;
  state.items = [];
  renderAll(); save();
  toast('Board cleared.','ok');
}

/* ---------------- render-all (load / import) ---------------- */
function renderAll(){
  els.forEach(el=>el.remove());
  els.clear();
  countdownEls.clear(); calEls.clear(); agendaEls.clear();
  // keep the z counter ahead of any restored item
  state.z = Math.max(10, ...state.items.map(i=>i.z||0));
  state.zoom = clamp(state.zoom||1, ZOOM_MIN, ZOOM_MAX);
  state.items.forEach(item=>{
    // backfill anything an older/partial file might be missing
    if(!item.pin) item.pin = pickPin();
    if(item.rot==null) item.rot = 0;
    const def = SIZE[item.type] || {};
    if(item.w==null) item.w = def.w;           // boards saved before resizing existed
    if(!('h' in item)) item.h = (def.h!==undefined ? def.h : null);
    if(item.type==='cal'){
      if(!item.dayNotes) item.dayNotes = {};
      // migrate older "marks" dots into notes so nothing is lost
      if(item.marks){ for(const k in item.marks){ if(item.marks[k] && !item.dayNotes[k]) item.dayNotes[k]='•'; } delete item.marks; }
    }
    item.x = Math.max(0, item.x||0); item.y = Math.max(0, item.y||0);
    mountCard(item, false);
  });
  applyZoom();
  fitBoard();
  refreshAgendas();
  updateEmpty();
}

/* ---------------- first-run seed ---------------- */
function seed(){
  const w = boardWrap.clientWidth;
  // welcome note (classic yellow for the first impression)
  addNote(28, 30,
    'Welcome to the staff-room board!\n\nGrab a pin to drag things around. Double-click the cork for a new note.',
    NOTE_COLORS[0]);
  // a starter checklist
  const list = addList();
  list.title = 'This week';
  list.items = [
    {text:'Photocopy Yr 9 worksheets', done:true},
    {text:'Email parents re: trip', done:false},
    {text:'Mark Set B essays', done:false},
    {text:'Book the hall', done:false},
  ];
  // a calendar, with a couple of sample day-notes so the agenda has content
  const cal = addCal();
  const t0 = new Date(); t0.setHours(0,0,0,0);
  const t2 = new Date(t0); t2.setDate(t2.getDate()+2);
  cal.dayNotes[dkey(t0)] = 'Staff meeting · 3:30';
  cal.dayNotes[dkey(t2)] = 'Fire drill';
  // a day countdown (instructional days to the last day of school)
  const count = addCount();
  count.title = 'Last day of school';
  // an agenda (lists the calendar's day-notes, iPhone-style)
  const agenda = addAgenda();
  // lay them out across the board
  els.get(list.id)   && place(list,   Math.min(w-260, 250), 26);
  els.get(cal.id)    && place(cal,    Math.min(w-360, 540), 22);
  els.get(count.id)  && place(count,  32, 250);
  els.get(agenda.id) && place(agenda, 250, 250);
  // rebuild the ones we mutated after creation
  rebuild(list); rebuild(cal); rebuild(count); rebuild(agenda);
  updateEmpty(); fitBoard(); refreshAgendas(); save();
}
function place(item, x, y){ item.x=x; item.y=y; const el=els.get(item.id); if(el){ el.style.left=x+'px'; el.style.top=y+'px'; } }
function rebuild(item){
  const old = els.get(item.id);
  if(old){ old.remove(); els.delete(item.id); }
  if(item._reg){ item._reg.set.delete(item._reg.entry); item._reg=null; }
  mountCard(item, false);
}

/* ---------------- wire up ---------------- */
$('addNote').addEventListener('click', ()=> addNote());
$('addList').addEventListener('click', ()=> addList());
$('addCal').addEventListener('click', ()=> addCal());
$('addCount').addEventListener('click', ()=> addCount());
$('addAgenda').addEventListener('click', ()=> addAgenda());
$('exportBtn').addEventListener('click', exportBoard);
$('importBtn').addEventListener('click', ()=> $('importFile').click());
$('importFile').addEventListener('change', e=>{ const f=e.target.files[0]; if(f) importBoard(f); e.target.value=''; });
$('clearBtn').addEventListener('click', clearBoard);

// zoom / view controls
$('zoomOut').addEventListener('click', ()=> setZoom((state.zoom||1) - 0.1));
$('zoomIn').addEventListener('click',  ()=> setZoom((state.zoom||1) + 0.1));
$('zoomLvl').addEventListener('click', ()=> setZoom(1));
$('fitBtn').addEventListener('click', fitToScreen);
$('fsBtn').addEventListener('click', toggleFullscreen);
window.addEventListener('resize', fitBoard);
document.addEventListener('fullscreenchange', ()=> setTimeout(fitBoard, 60));

// double-click the bare cork to drop a note where you clicked
surface.addEventListener('dblclick', e=>{
  if(e.target!==surface) return;
  const p = toSurface(e.clientX, e.clientY);
  addNote(Math.round(p.x-90), Math.round(p.y-20));
});

/* ---------------- boot ---------------- */
if(load()){ renderAll(); }
else { seed(); }
applyZoom();
fitBoard();

// keep day countdowns current if the board is left open across midnight
setInterval(()=>{ countdownEls.forEach(c=>c.render()); }, 60000);
</script>
